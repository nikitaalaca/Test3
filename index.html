<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="transparent">
    <title>Connecta Pro</title>
    <style>
        :root {
            --bg-main: #f4f6f9;
            --panel-bg: rgba(255, 255, 255, 0.65);
            --panel-border: rgba(255, 255, 255, 0.4);
            --inner-border: rgba(0, 0, 0, 0.05);
            --text-primary: #1c1c1e;
            --text-secondary: #8e8e93;
            --accent: #007aff;
            --accent-rgb: 0, 122, 255;
            --bubble-in: rgba(255, 255, 255, 0.85);
            --bubble-out: #007aff;
            --bubble-out-text: #ffffff;
            --shadow-premium: 0 20px 40px rgba(0, 0, 0, 0.08);
            --danger: #ff3b30;
            --success: #34c759;
            --warning: #ff9500;
            --input-bg: #fff;
            --hover-bg: rgba(0, 0, 0, 0.05);
            --verified-color: #007aff;
            --unread-badge: #007aff;
            --theme-transition: 0.3s ease;
            --voice-msg-bg: rgba(0, 122, 255, 0.12);
        }
        
        [data-theme="dark"] {
            --bg-main: #000000;
            --panel-bg: rgba(28, 28, 30, 0.7);
            --panel-border: rgba(255, 255, 255, 0.1);
            --inner-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #98989d;
            --bubble-in: rgba(44, 44, 46, 0.85);
            --bubble-out: #0a84ff;
            --input-bg: rgba(255, 255, 255, 0.1);
            --hover-bg: rgba(255, 255, 255, 0.08);
            --verified-color: #0a84ff;
            --unread-badge: #0a84ff;
            --voice-msg-bg: rgba(10, 132, 255, 0.2);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100dvh; background: var(--bg-main); color: var(--text-primary); overflow: hidden; position: relative; transition: background var(--theme-transition), color var(--theme-transition); }
        
        .bg-particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.3; }
        .particle { position: absolute; border-radius: 50%; animation: floatUp 8s infinite; }
        @keyframes floatUp { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-100px) scale(1); opacity: 0; } }
        
        @keyframes slideInRight { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideInLeft { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes slideUpMenu { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideToastDown { from { transform: translate3d(0, -100%, 0); opacity: 0; } to { transform: translate3d(0, 0, 0); opacity: 1; } }
        @keyframes slideToastUp { from { transform: translate3d(0, 0, 0); opacity: 1; } to { transform: translate3d(0, -120%, 0); opacity: 0; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .msg-container.outgoing { animation: slideInRight 0.3s ease; }
        .msg-container.incoming { animation: slideInLeft 0.3s ease; }
        
        .stories-bar { display: flex; gap: 12px; padding: 12px 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .stories-bar::-webkit-scrollbar { display: none; }
        .story-item { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; flex-shrink: 0; transition: transform 0.2s; }
        .story-item:active { transform: scale(0.95); }
        .story-ring { width: 64px; height: 64px; border-radius: 50%; padding: 3px; }
        .story-ring.has-story { background: linear-gradient(45deg, #ff9500, #ff2d55, #af52de, #007aff); }
        .story-ring.has-story.viewed { background: #ccc; }
        .story-ring.my-story { background: var(--hover-bg); border: 2px dashed var(--accent); padding: 1px; }
        .story-avatar { width: 100%; height: 100%; border-radius: 50%; background-size: cover; background-position: center; border: 2px solid var(--bg-main); }
        .story-add-icon { position: absolute; bottom: -2px; right: -2px; width: 24px; height: 24px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; font-weight: bold; border: 2px solid var(--bg-main); z-index: 2; }
        .story-name { font-size: 11px; color: var(--text-secondary); max-width: 64px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .story-viewer { position: fixed; inset: 0; background: #000; z-index: 4000; display: none; flex-direction: column; }
        .story-viewer.active { display: flex; }
        .story-viewer-header { display: flex; align-items: center; gap: 12px; padding: 16px; padding-top: max(16px, env(safe-area-inset-top)); color: white; z-index: 10; }
        .story-viewer-avatar { width: 40px; height: 40px; border-radius: 50%; background-size: cover; background-position: center; background-color: #333; }
        .story-viewer-info { flex: 1; }
        .story-viewer-name { font-weight: 600; font-size: 15px; }
        .story-viewer-time { font-size: 12px; opacity: 0.7; }
        .story-progress-bar { display: flex; gap: 4px; padding: 8px 16px; }
        .story-progress-segment { flex: 1; height: 3px; background: rgba(255,255,255,0.3); border-radius: 2px; overflow: hidden; }
        .story-progress-fill { height: 100%; background: white; width: 0%; }
        .story-content { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .story-image { max-width: 100%; max-height: 80vh; object-fit: contain; border-radius: 8px; }
        .story-nav { position: absolute; top: 0; bottom: 0; width: 50%; z-index: 5; }
        .story-nav-left { left: 0; }
        .story-nav-right { right: 0; }
        .story-close-btn { position: absolute; top: 20px; right: 20px; z-index: 50; color: white; background: rgba(0,0,0,0.5); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; }
        
        .attachment-menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3000; display: none; align-items: flex-end; }
        .attachment-menu-overlay.active { display: flex; }
        .attachment-menu { width: 100%; background: var(--panel-bg); backdrop-filter: blur(30px); border-radius: 16px 16px 0 0; padding: 20px; padding-bottom: max(20px, env(safe-area-inset-bottom)); animation: slideUpMenu 0.3s ease; }
        .attachment-menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
        .attachment-menu-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; padding: 12px; border-radius: 12px; transition: background 0.2s; }
        .attachment-menu-item:active { background: var(--hover-bg); }
        .attachment-menu-icon { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .attachment-menu-label { font-size: 12px; color: var(--text-secondary); text-align: center; }
        .attachment-menu-cancel { width: 100%; padding: 14px; border: none; background: var(--hover-bg); border-radius: 12px; font-size: 16px; font-weight: 600; color: var(--text-primary); cursor: pointer; }
        
        .verified-badge { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; min-width: 18px; background: var(--verified-color); border-radius: 50%; color: white; flex-shrink: 0; margin-left: 2px; }
        .verified-badge svg { width: 11px; height: 11px; }
        .verified-badge-large { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; min-width: 24px; background: var(--verified-color); border-radius: 50%; color: white; flex-shrink: 0; }
        .verified-badge-large svg { width: 15px; height: 15px; }
        
        .voice-msg-bubble { background: var(--voice-msg-bg) !important; color: var(--text-primary) !important; padding: 14px 18px !important; border-radius: 20px !important; }
        .voice-msg-player { display: flex; align-items: center; gap: 12px; min-width: 200px; }
        .voice-play-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--accent); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; flex-shrink: 0; }
        .voice-play-btn:active { transform: scale(0.9); }
        .voice-wave-container { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
        .voice-wave-bar { width: 100%; height: 4px; background: rgba(128,128,128,0.3); border-radius: 2px; cursor: pointer; position: relative; }
        .voice-wave-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.1s linear; }
        .voice-time-row { display: flex; justify-content: space-between; font-size: 11px; opacity: 0.8; }
        
        .swipe-action { width: 80px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; color: white; border-radius: var(--radius-md); cursor: pointer; font-size: 11px; font-weight: 600; }
        .swipe-action-icon { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.2); }
        .swipe-action.delete-action { background: var(--danger); }
        .swipe-action.pin-action { background: var(--warning); }
        
        .poll-container { background: var(--hover-bg); border-radius: 16px; padding: 16px; margin: 8px 0; }
        .poll-title { font-weight: 700; font-size: 16px; margin-bottom: 12px; }
        .poll-option { display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--input-bg); border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
        .poll-option.voted { border-color: var(--accent); background: rgba(var(--accent-rgb), 0.1); }
        .poll-option-bar { flex: 1; height: 28px; background: var(--hover-bg); border-radius: 14px; overflow: hidden; position: relative; }
        .poll-option-fill { height: 100%; background: var(--accent); border-radius: 14px; transition: width 0.5s ease; }
        .poll-option-text { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 13px; font-weight: 600; z-index: 1; }
        .poll-votes { font-size: 12px; color: var(--text-secondary); margin-top: 8px; text-align: center; }
        
        .pinned-chat { border-left: 3px solid var(--accent); background: rgba(var(--accent-rgb), 0.03); }
        .pin-icon { color: var(--accent); font-size: 14px; }
        
        #app-layout { display: flex; width: 100vw; height: 100dvh; position: relative; z-index: 2; overflow: hidden; }
        .glass-panel { background: var(--panel-bg); backdrop-filter: blur(25px) saturate(180%); -webkit-backdrop-filter: blur(25px) saturate(180%); border-right: 1px solid var(--panel-border); transition: background var(--theme-transition), border-color var(--theme-transition); }
        #sidebar-container { width: 360px; height: 100%; display: flex; flex-direction: column; z-index: 10; flex-shrink: 0; transition: transform 0.35s; position: relative; padding-bottom: 80px; }
        #main-chat-container { flex: 1; height: 100%; max-width: 100vw; display: flex; flex-direction: column; position: relative; z-index: 5; background: transparent; overflow-x: hidden; }
        @media (max-width: 768px) {
            #sidebar-container { width: 100vw; position: absolute; left: 0; top: 0; bottom: 0; }
            #main-chat-container { width: 100vw; position: absolute; left: 0; top: 0; bottom: 0; z-index: 20; transform: translate3d(100%, 0, 0); transition: transform 0.35s; background: var(--bg-main); }
            .chat-opened-mobile #sidebar-container { transform: translate3d(-30%, 0, 0); }
            .chat-opened-mobile #main-chat-container { transform: translate3d(0, 0, 0); box-shadow: -10px 0 30px rgba(0,0,0,0.1); }
            .mobile-back-btn { display: flex !important; }
        }
        .sidebar-header { padding: 20px 20px 12px; display: flex; align-items: center; justify-content: space-between; }
        .brand-title { font-size: 22px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        .dev-badge { font-size: 10px; background: var(--hover-bg); padding: 4px 6px; border-radius: 6px; font-weight: 700; color: var(--text-secondary); }
        .header-actions { display: flex; align-items: center; gap: 12px; }
        .btn-icon { width: 36px; height: 36px; border-radius: 50%; background: rgba(0, 122, 255, 0.1); color: var(--accent); border: none; cursor: pointer; transition: transform 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-icon:active { transform: scale(0.9); }
        .btn-icon svg { width: 20px; height: 20px; }
        .search-box { padding: 0 20px 12px; }
        .search-inner { display: flex; align-items: center; background: var(--hover-bg); padding: 10px 14px; border-radius: 14px; }
        .search-inner input { border: none; background: transparent; outline: none; width: 100%; margin-left: 8px; color: var(--text-primary); font-size: 15px; }
        .tab-bar { display: flex; padding: 0 16px 8px; gap: 4px; border-bottom: 1px solid var(--inner-border); }
        .tab-btn { flex: 1; padding: 8px; border: none; background: transparent; color: var(--text-secondary); font-size: 13px; font-weight: 600; border-radius: 10px; cursor: pointer; transition: all 0.2s; position: relative; }
        .tab-btn.active { background: var(--hover-bg); color: var(--text-primary); }
        .tab-badge { position: absolute; top: 2px; right: 2px; min-width: 18px; height: 18px; background: var(--danger); color: white; border-radius: 9px; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
        .scroller-content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 8px 12px; display: none; position: relative; z-index: 2; -webkit-overflow-scrolling: touch; }
        .scroller-content.active { display: block; animation: fadeIn 0.2s ease; }
        .item-row { position: relative; overflow: hidden; border-radius: var(--radius-md); margin-bottom: 4px; }
        .swipe-wrapper { display: flex; width: calc(100% + 160px); transition: transform 0.25s; }
        .swipe-content { width: calc(100% - 160px); flex-shrink: 0; display: flex; align-items: center; padding: 12px; cursor: pointer; border-radius: var(--radius-md); transition: background 0.15s; overflow: hidden; background: transparent; }
        .swipe-content:active { background: var(--hover-bg); }
        .item-row.active .swipe-content { background: rgba(0, 122, 255, 0.08); }
        .avatar-ui { width: 50px; height: 50px; border-radius: 50%; color: white; font-weight: 600; display: flex; align-items: center; justify-content: center; font-size: 18px; position: relative; flex-shrink: 0; background-size: cover; background-position: center; overflow: hidden; }
        .status-dot { position: absolute; bottom: 0; right: 0; width: 14px; height: 14px; background: var(--text-secondary); border: 2.5px solid var(--bg-main); border-radius: 50%; z-index: 5; }
        .status-dot.online { background: var(--success); }
        .unread-badge { position: absolute; top: -4px; right: -4px; min-width: 20px; height: 20px; background: var(--unread-badge); color: white; border-radius: 10px; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; padding: 0 6px; z-index: 6; border: 2px solid var(--bg-main); }
        .row-meta { flex: 1; margin-left: 14px; min-width: 0; overflow: hidden; }
        .row-title-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; gap: 8px; min-width: 0; }
        .row-title { font-weight: 600; font-size: 16px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }
        .row-time { font-size: 12px; color: var(--text-secondary); flex-shrink: 0; }
        .row-sub { font-size: 14px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }
        .msg-status-checks { display: inline-flex; gap: 2px; margin-left: 4px; }
        .msg-status-checks svg { width: 14px; height: 14px; }
        .chat-header { padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; background: var(--panel-bg); backdrop-filter: blur(25px); border-bottom: 1px solid var(--inner-border); z-index: 10; min-height: 56px; }
        .chat-header-left { display: flex; align-items: center; min-width: 0; flex: 1; }
        .chat-header-info { margin-left: 14px; min-width: 0; overflow: hidden; cursor: pointer; }
        .mobile-back-btn { display: none; background: transparent; border: none; color: var(--accent); padding-right: 14px; cursor: pointer; flex-shrink: 0; }
        .chat-messages-area { flex: 1; padding: 20px; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; gap: 14px; -webkit-overflow-scrolling: touch; }
        .msg-container { display: flex; flex-direction: column; max-width: 85%; position: relative; }
        .msg-container.incoming { align-self: flex-start; }
        .msg-container.outgoing { align-self: flex-end; }
        .msg-reply-preview { background: var(--hover-bg); padding: 8px 12px; border-radius: 12px; margin-bottom: 6px; font-size: 13px; border-left: 3px solid var(--accent); cursor: pointer; }
        .msg-bubble-main { padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.45; box-shadow: 0 1px 2px rgba(0,0,0,0.05); word-break: break-word; overflow: hidden; position: relative; cursor: pointer; }
        .incoming .msg-bubble-main { background: var(--bubble-in); color: var(--text-primary); border-bottom-left-radius: 6px; }
        .outgoing .msg-bubble-main { background: var(--bubble-out); color: var(--bubble-out-text); border-bottom-right-radius: 6px; }
        .msg-media-preview { max-width: 100%; max-height: 300px; height: auto; border-radius: 12px; margin-bottom: 6px; cursor: pointer; display: block; object-fit: cover; }
        .msg-time { font-size: 11px; margin-top: 4px; opacity: 0.7; text-align: right; display: flex; justify-content: flex-end; gap: 6px; align-items: center; }
        .msg-reactions { display: flex; gap: 6px; margin-top: 4px; font-size: 12px; flex-wrap: wrap; }
        .reaction-badge { background: var(--hover-bg); padding: 3px 8px; border-radius: 20px; cursor: pointer; font-size: 13px; }
        .reaction-picker { position: absolute; bottom: calc(100% + 8px); left: 0; background: var(--panel-bg); backdrop-filter: blur(20px); border-radius: 30px; padding: 10px 14px; display: flex; gap: 14px; z-index: 100; box-shadow: 0 5px 20px rgba(0,0,0,0.2); border: 1px solid var(--panel-border); animation: slideUp 0.2s ease; }
        .reaction-emoji { font-size: 26px; cursor: pointer; transition: transform 0.1s; }
        .chat-input-bar { padding: 12px 16px; background: var(--panel-bg); backdrop-filter: blur(25px); border-top: 1px solid var(--inner-border); display: flex; align-items: center; gap: 8px; width: 100%; position: relative; }
        .chat-input-bar input[type="text"] { flex: 1; height: 44px; padding: 0 16px; border: 1px solid var(--inner-border); border-radius: 22px; background: var(--input-bg); color: var(--text-primary); font-size: 15px; outline: none; }
        .circle-action-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: transparent; color: var(--accent); cursor: pointer; transition: transform 0.15s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .circle-action-btn:active { transform: scale(0.85); }
        .circle-action-btn.primary { background: var(--accent); color: white; }
        .circle-action-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
        .floating-dock { position: fixed; bottom: 20px; left: 50%; transform: translate3d(-50%, 0, 0); background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 40px; display: flex; gap: 4px; padding: 10px 18px; z-index: 1000; box-shadow: 0 8px 32px rgba(0,0,0,0.1); transition: transform 0.3s, opacity 0.3s; }
        .dock-item { display: flex; align-items: center; justify-content: center; background: transparent; border: none; color: var(--text-primary); padding: 10px 22px; cursor: pointer; border-radius: 24px; font-size: 16px; font-weight: 600; transition: all 0.25s; }
        .dock-item:active { transform: scale(0.94); background: rgba(255,255,255,0.4); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); z-index: 2000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-card { width: 90%; max-width: 400px; padding: 28px 24px; border-radius: 28px; box-shadow: var(--shadow-premium); background: var(--panel-bg); color: var(--text-primary); border: 1px solid var(--panel-border); transform: scale(0.95) translateY(10px); transition: transform 0.3s; max-height: 90vh; overflow-y: auto; }
        .modal-overlay.active .modal-card { transform: scale(1) translateY(0); }
        .premium-input { width: 100%; padding: 16px; background: var(--hover-bg); border: 1px solid var(--inner-border); border-radius: 16px; color: var(--text-primary); outline: none; margin-bottom: 16px; font-size: 16px; box-sizing: border-box; }
        .input-lbl { font-size: 12px; color: var(--text-secondary); font-weight: 700; display: block; margin-bottom: 8px; text-transform: uppercase; }
        .btn-full { width: 100%; padding: 16px; border-radius: 16px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.15s; margin-bottom: 10px; }
        .btn-full:active { transform: scale(0.98); }
        .btn-full.primary { background: var(--accent); color: white; }
        .btn-full.danger { background: var(--danger); color: white; }
        .btn-full.secondary { background: var(--hover-bg); color: var(--text-primary); }
        .member-list { max-height: 220px; overflow-y: auto; margin-bottom: 20px; background: var(--hover-bg); border-radius: 16px; padding: 8px; }
        .member-item { display: flex; align-items: center; padding: 12px 10px; border-bottom: 1px solid var(--inner-border); gap: 12px; }
        .member-item:last-child { border-bottom: none; }
        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); gap: 12px; }

        // Stories
        function createStory(img) {
            if(!currentUserId) return;
            const id='s_'+Date.now();
            db.ref(`stories/${currentUserId}/${id}`).set({id,image:img,time:Date.now(),authorId:currentUserId,viewedBy:{}});
            showInAppToast("История","Опубликована!");
        }
        function renderStories() {
            const bar=document.getElementById('stories-bar'); if(!bar) return;
            let users={};
            for(let uid in stories) {
                if(stories[uid]) {
                    const list=Object.values(stories[uid]).sort((a,b)=>b.time-a.time);
                    if(list.length) users[uid]={stories:list,user:allUsers.find(u=>u.id===uid)||{name:'?',color:'#007aff'}};
                }
            }
            let h='';
            const my=users[currentUserId]?.stories||[];
            h+=`<div class="story-item" onclick="openStoryCreator()"><div class="story-ring my-story"><div class="story-avatar" style="${my.length?`background-image:url('${my[0].image.replace(/'/g,"\\'")}');background-size:cover;`:'background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:24px;color:white;'}">${my.length?'':'+'}</div><div class="story-add-icon">+</div></div><div class="story-name">Моя</div></div>`;
            for(let uid in users) {
                if(uid===currentUserId) continue;
                const us=users[uid];
                const unviewed=us.stories.some(s=>!s.viewedBy||!s.viewedBy[currentUserId]);
                h+=`<div class="story-item" onclick="viewUserStories('${uid}')"><div class="story-ring has-story${unviewed?'':' viewed'}">${getAvatar(us.user,58)}</div><div class="story-name">${escapeHTML(us.user.name)}</div></div>`;
            }
            bar.innerHTML=h;
        }
        function openStoryCreator() {
            const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
            inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const fr=new FileReader();fr.onload=ev=>createStory(ev.target.result);fr.readAsDataURL(f);};
            inp.click();
        }
        function viewUserStories(uid) {
            if(!stories[uid]||!Object.keys(stories[uid]).length) return;
            currentStoryUser=uid; currentStoryIndex=0;
            document.getElementById('story-viewer').classList.add('active');
            showStorySlide();
        }
        function getCurrentStories() {
            if(!currentStoryUser||!stories[currentStoryUser]) return [];
            return Object.values(stories[currentStoryUser]).sort((a,b)=>a.time-b.time);
        }
        function showStorySlide() {
            const list=getCurrentStories();
            if(!list.length||currentStoryIndex>=list.length) { moveToNextUser(); return; }
            if(currentStoryIndex<0) currentStoryIndex=0;
            const story=list[currentStoryIndex];
            const content=document.getElementById('story-content');
            const bar=document.getElementById('story-progress-bar');
            const user=allUsers.find(u=>u.id===currentStoryUser);
            const av=document.getElementById('story-viewer-avatar');
            if(av) { av.style.backgroundImage=user?.img?`url('${user.img.replace(/'/g,"\\'")}')`:''; av.style.backgroundColor=user?.color||'#333'; }
            document.getElementById('story-viewer-name').textContent=user?.name||'Пользователь';
            document.getElementById('story-viewer-time').textContent=new Date(story.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
            content.innerHTML=story.image?`<img src="${story.image}" class="story-image">`:'';
            bar.innerHTML=list.map((s,i)=>`<div class="story-progress-segment"><div class="story-progress-fill" id="sp-${i}" style="width:${i<currentStoryIndex?'100%':'0%'}"></div></div>`).join('');
            if(!story.viewedBy) story.viewedBy={};
            if(!story.viewedBy[currentUserId]) { story.viewedBy[currentUserId]=true; db.ref(`stories/${currentStoryUser}/${story.id}/viewedBy/${currentUserId}`).set(true); }
            if(storyIntervalTimer) clearInterval(storyIntervalTimer);
            let p=0; const fill=document.getElementById('sp-'+currentStoryIndex);
            storyIntervalTimer=setInterval(()=>{p+=2;if(fill)fill.style.width=Math.min(p,100)+'%';if(p>=100){clearInterval(storyIntervalTimer);nextSlide();}},100);
            document.getElementById('story-nav-left').onclick=e=>{e.stopPropagation();prevSlide();};
            document.getElementById('story-nav-right').onclick=e=>{e.stopPropagation();nextSlide();};
        }
        function nextSlide() { if(storyIntervalTimer)clearInterval(storyIntervalTimer); currentStoryIndex++; const list=getCurrentStories(); if(currentStoryIndex>=list.length) moveToNextUser(); else showStorySlide(); }
        function prevSlide() { if(storyIntervalTimer)clearInterval(storyIntervalTimer); if(currentStoryIndex>0){currentStoryIndex--;showStorySlide();}else moveToPrevUser(); }
        function moveToNextUser() { let f=false,n=null; for(let uid in stories){if(f&&uid!==currentUserId&&stories[uid]&&Object.keys(stories[uid]).length){n=uid;break;}if(uid===currentStoryUser)f=true;} if(n){currentStoryUser=n;currentStoryIndex=0;showStorySlide();}else closeStoryViewer(); }
        function moveToPrevUser() { let p=null; for(let uid in stories){if(uid===currentStoryUser)break;if(uid!==currentUserId&&stories[uid]&&Object.keys(stories[uid]).length)p=uid;} if(p){currentStoryUser=p;currentStoryIndex=Object.values(stories[p]).length-1;showStorySlide();} }
        function closeStoryViewer() { document.getElementById('story-viewer').classList.remove('active'); if(storyIntervalTimer)clearInterval(storyIntervalTimer); currentStoryUser=null;currentStoryIndex=0;renderStories(); }

        function createPoll() { const q=document.getElementById('poll-question')?.value.trim(); const opts=[]; document.querySelectorAll('.poll-option-input').forEach(i=>{const v=i.value.trim();if(v)opts.push({text:v,votes:0,voters:{}});}); if(!q||opts.length<2)return; db.ref(`polls/${activeChatRealKey}`).push().set({question:q,options:opts,totalVotes:0,ts:Date.now()}); closeModals(); }

        // Swipe
        function attachSwipeActions(el,rk,id,isG) {
            const w=el.querySelector('.swipe-wrapper'); if(!w)return;
            let sx=0,sy=0,cx=0,ih=null,opened=false;
            const reset=()=>{w.style.transition='transform 0.25s';w.style.transform='translate3d(0,0,0)';opened=false;if(swipeAutoCloseTimers[rk]){clearTimeout(swipeAutoCloseTimers[rk]);delete swipeAutoCloseTimers[rk];}};
            w.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;ih=null;w.style.transition='none';if(swipeAutoCloseTimers[rk]){clearTimeout(swipeAutoCloseTimers[rk]);delete swipeAutoCloseTimers[rk];}},{passive:true});
            w.addEventListener('touchmove',e=>{if(ih===null)ih=Math.abs(e.touches[0].clientX-sx)>Math.abs(e.touches[0].clientY-sy);if(ih){const d=e.touches[0].clientX-sx;if(d<0){cx=Math.max(d,-160);w.style.transform=`translate3d(${cx}px,0,0)`;}else if(opened){cx=Math.min(-160+d,0);w.style.transform=`translate3d(${cx}px,0,0)`;}}},{passive:true});
            w.addEventListener('touchend',()=>{w.style.transition='transform 0.25s';if(cx<-120){w.style.transform='translate3d(-160px,0,0)';opened=true;swipeAutoCloseTimers[rk]=setTimeout(reset,2000);}else if(cx<-50){w.style.transform='translate3d(-80px,0,0)';opened=true;swipeAutoCloseTimers[rk]=setTimeout(reset,2000);}else reset();cx=0;});
            el.querySelectorAll('.swipe-action').forEach(b=>{b.addEventListener('click',e=>{e.stopPropagation();if(b.classList.contains('delete-action')){if(!confirm('Удалить?')){reset();return;}db.ref(`user_chats/${currentUserId}/${rk}`).remove();if(activeChatId===id&&isGroupMode===isG)closeChat();}else if(b.classList.contains('pin-action')){togglePinChat(rk);}reset();});});
            el.querySelector('.swipe-content').addEventListener('click',()=>{if(opened)reset();});
        }
        function togglePinChat(rk) { if(pinnedChats.has(rk))pinnedChats.delete(rk);else pinnedChats.add(rk); storage.set('pinned_chats',JSON.stringify([...pinnedChats])); renderLists(); }

        // Voice player
        function toggleVoiceMessage(k,src) {
            if(!src)return; const vp='vp_'+k;

                const a=new Audio(src); const o={audio:a,int:null}; window.voicePlayers[vp]=o;

                a.addEventListener('ended',()=>{const b=document.getElementById('vpb_'+k);if(b)b.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>';clearInterval(o.int);const f=document.getElementById('vwf_'+k);if(f)f.style.width='0%';});
                a.play().then(()=>{const b=document.getElementById('vpb_'+k);if(b)b.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';o.int=setInterval(()=>{const f=document.getElementById('vwf_'+k),c=document.getElementById('vwt_'+k);if(f&&a.duration)f.style.width=(a.currentTime/a.duration*100)+'%';if(c)c.textContent=formatTime(a.currentTime);},100);}).catch(()=>{});
            } else {

                if(o.audio.paused){o.audio.play();const b=document.getElementById('vpb_'+k);if(b)b.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';}
                else{o.audio.pause();const b=document.getElementById('vpb_'+k);if(b)b.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>';}

        // Reactions

        // Chat
        async function loadMoreMessages() { if(isLoadingMoreMessages||!activeChatRealKey)return; isLoadingMoreMessages=true; let q=db.ref(`messages/${activeChatRealKey}`).orderByKey(); if(lastLoadedMsgKey) q=q.endAt(lastLoadedMsgKey).limitToLast(21); else q=q.limitToLast(20); try{const sn=await q.once('value');const nm=sn.val()||{};const ks=Object.keys(nm).sort();if(ks.length>1){if(lastLoadedMsgKey)delete nm[ks[ks.length-1]];currentChatMessages={...nm,...currentChatMessages};lastLoadedMsgKey=ks[0];renderMessages(true);}}catch(e){} isLoadingMoreMessages=false; }
        function openChat(id,isG,rok=null) {
            if(activeChatRealKey){db.ref(`messages/${activeChatRealKey}`).off();db.ref(`typing/${activeChatRealKey}`).off();db.ref(`reactions/${activeChatRealKey}`).off();reactionListenersRefs.forEach(r=>db.ref(r).off());reactionListenersRefs=[];}
            activeChatId=id; isGroupMode=isG; activeChatRealKey=isG?id:(rok||[currentUserId,id].sort().join('_'));

            updateUI(); currentChatMessages={}; lastLoadedMsgKey=null; isLoadingMoreMessages=false;
            const mf=document.getElementById('messages-flow'); mf.innerHTML='<div style="text-align:center;padding:20px;"><div class="spinner" style="margin:0 auto;"></div></div>';
            db.ref(`messages/${activeChatRealKey}`).limitToLast(20).on('value',s=>{currentChatMessages=s.val()||{};const ks=Object.keys(currentChatMessages).sort();if(ks.length)lastLoadedMsgKey=ks[0];renderMessages();mf.scrollTop=mf.scrollHeight;});

        }

        function sendMessage() {
            if(!currentUserId)return;
            const inp=document.getElementById('msg-input'); if(!inp)return;
            const txt=inp.value.trim(); if(!txt&&!attachFile)return;
            const me=allUsers.find(u=>u.id===currentUserId); if(!me)return;
            const ts=Date.now(),tm=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

        function toggleVoiceRecord() {
            if(!activeChatId)return;
            const btn=document.getElementById('mic-btn'),inp=document.getElementById('msg-input'),sb=document.getElementById('send-msg-btn');
            if(!btn||!inp||!sb)return;
            if(!isRecording){
                let mime=''; if(MediaRecorder.isTypeSupported('audio/webm;codecs=opus'))mime='audio/webm;codecs=opus'; else if(MediaRecorder.isTypeSupported('audio/webm'))mime='audio/webm'; else mime='audio/mp4';
                navigator.mediaDevices.getUserMedia({audio:true}).then(s=>{
                    try{mediaRecorder=new MediaRecorder(s,{mimeType:mime});}catch(e){mediaRecorder=new MediaRecorder(s);}
                    audioChunks=[]; mediaRecorder.ondataavailable=e=>{if(e.data.size)audioChunks.push(e.data);};
                    mediaRecorder.onstop=()=>{const b=new Blob(audioChunks,{type:mediaRecorder.mimeType||'audio/webm'});const fr=new FileReader();fr.onload=ev=>{attachFile=ev.target.result;if(isSendingRecording){sendMessage();isSendingRecording=false;}else showAudioPreview(b);};fr.readAsDataURL(b);s.getTracks().forEach(t=>t.stop());};
                    mediaRecorder.start(1000); isRecording=true; recordingSeconds=0;
                    audioRecordingTimer=setInterval(()=>{recordingSeconds++;const m=Math.floor(recordingSeconds/60),sec=recordingSeconds%60;const ind=document.getElementById('recording-timer');if(ind)ind.textContent=`${m}:${sec<10?'0':''}${sec}`;},1000);
                    btn.style.color='var(--danger)'; btn.innerHTML='<svg width="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="6" y="4" width="12" height="16" rx="2"/></svg>';

                    inp.placeholder='Запись...';

            } else stopRecording();
        }

        function openAppSettings() { closeModals();document.getElementById('notif-toggle').classList.toggle('active',notificationsEnabled);document.getElementById('app-settings-modal').classList.add('active'); }

        // Calls (simplified)
        function listenForCalls() { if(!currentUserId)return; db.ref(`calls/${currentUserId}`).off(); db.ref(`calls/${currentUserId}`).on('value',sn=>{const d=sn.val();if(d&&d.status==='calling'&&d.callerId&&!isCallActive){showInAppToast("Звонок",d.callerName||"Входящий");}}); }
        async function startVideoCall() { if(isGroupMode||!activeChatId||isCallActive)return; showInAppToast("Звонок","Функция в разработке"); }
        function endVideoCall() { isCallActive=false; }
        async function cleanupCallResources() {}
        function acceptCall() {}
        function rejectCall() {}
        function toggleCallMute() {}

        // Init
        window.onload = () => {
            initParticles();
            const si=document.getElementById('search-input'); if(si)si.addEventListener('input',()=>{clearTimeout(searchTimeout);searchTimeout=setTimeout(renderLists,300);});
            auth.onAuthStateChanged(user => { if(user){currentUserId=user.uid;document.getElementById('auth-modal').classList.remove('active');initCore();} else renderAuth(false); });
        };
    </script>
</body>
</html>
