<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Connecta MESSENGER</title>
    <style>
        /* Светлая тема */
        :root {
            --bg-main: #f4f6f9;
            --panel-bg: rgba(255, 255, 255, 0.65);
            --panel-border: rgba(255, 255, 255, 0.4);
            --inner-border: rgba(0, 0, 0, 0.05);
            --text-primary: #1c1c1e;
            --text-secondary: #8e8e93;
            --accent: #007aff;
            --bubble-in: rgba(255, 255, 255, 0.85);
            --bubble-out: #007aff;
            --bubble-out-text: #ffffff;
            --shadow-premium: 0 20px 40px rgba(0, 0, 0, 0.08);
            --radius-lg: 24px;
            --radius-md: 18px;
            --danger: #ff3b30;
            --success: #34c759;
            --input-bg: #fff;
            --hover-bg: rgba(0, 0, 0, 0.05);
            --ambient-light: radial-gradient(circle, rgba(0,122,255,0.12) 0%, rgba(255,255,255,0) 70%);
        }

        /* Темная тема */
        [data-theme="dark"] {
            --bg-main: #000000;
            --panel-bg: rgba(28, 28, 30, 0.7);
            --panel-border: rgba(255, 255, 255, 0.1);
            --inner-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #98989d;
            --bubble-in: rgba(44, 44, 46, 0.85);
            --bubble-out: #0a84ff;
            --shadow-premium: 0 20px 40px rgba(0, 0, 0, 0.5);
            --input-bg: rgba(255, 255, 255, 0.1);
            --hover-bg: rgba(255, 255, 255, 0.08);
            --ambient-light: radial-gradient(circle, rgba(10,132,255,0.15) 0%, rgba(0,0,0,0) 70%);
        }

        * { 
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; 
            -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent;
        }
        
        body, html { 
            width: 100%;
            height: 100dvh; background: var(--bg-main); color: var(--text-primary); 
            overflow: hidden; position: relative; transition: background 0.3s ease, color 0.3s ease;
        }

        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); 
            z-index: 2000; display: none; align-items: center; justify-content: center; opacity: 0; 
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        
        .modal-card { 
            width: 90%; max-width: 400px; padding: 28px; border-radius: 28px; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            background: var(--panel-bg); color: var(--text-primary); border: 1px solid var(--panel-border);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .modal-overlay.active .modal-card { transform: scale(1) translateY(0); }

        .premium-input { 
            width: 100%; padding: 16px; background: var(--hover-bg); 
            border: 1px solid var(--inner-border); border-radius: 16px; 
            color: var(--text-primary); outline: none; margin-bottom: 16px; 
            font-size: 16px; transition: border-color 0.2s;
        }
        .premium-input:focus { border-color: var(--accent); }

        .btn-full { 
            width: 100%; padding: 16px; border-radius: 16px; border: none; 
            font-size: 16px; font-weight: 600; cursor: pointer; 
            transition: transform 0.15s, background 0.2s;
        }
        .btn-full:active { transform: scale(0.98); }
        .btn-full.primary { background: var(--accent); color: white; }
        .btn-full.secondary { background: var(--hover-bg); color: var(--text-primary); margin-top: 10px; }

        h2 { margin-bottom: 24px; text-align: center; }
        h3 { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 16px; }

        .toggle-link {
            text-align: center; margin-top: 16px; font-size: 14px; color: var(--text-secondary);
        }
        .toggle-link button {
            background: none; border: none; color: var(--accent); cursor: pointer; font-weight: 600;
        }
    </style>
</head>
<body>

    <div id="auth-modal" class="modal-overlay active" style="z-index: 9999;">
        <div class="modal-card" id="auth-card-content">
            <h3>Загрузка...</h3>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUbD08gGbhrkGIGgsIzHTEWeNMTTU_efY",
            authDomain: "yw-83b3e.firebaseapp.com",
            databaseURL: "https://yw-83b3e-default-rtdb.firebaseio.com",
            projectId: "yw-83b3e",
            storageBucket: "yw-83b3e.firebasestorage.app",
            messagingSenderId: "513977614231",
            appId: "1:513977614231:web:0a04427784e8259fdeced2",
            measurementId: "G-H4YJ6NC4E9"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let isRegistering = false;

        window.onload = () => {
            auth.onAuthStateChanged(user => {
                if (user) {
                    console.log('✓ Вход выполнен:', user.email);
                    document.getElementById('auth-modal').classList.remove('active');
                    renderApp();
                } else {
                    console.log('✗ Пользователь не авторизован');
                    renderAuthForm(false);
                }
            });
        };

        function renderAuthForm(isReg) {
            isRegistering = isReg;
            const modal = document.getElementById('auth-card-content');
            
            if (!isReg) {
                modal.innerHTML = `
                    <h2>ВХОД</h2>
                    <input type="email" id="login-email" class="premium-input" placeholder="Email" required>
                    <input type="password" id="login-pass" class="premium-input" placeholder="Пароль" required>
                    <button class="btn-full primary" onclick="handleLogin()">Войти</button>
                    <div class="toggle-link">
                        Нет аккаунта? <button onclick="renderAuthForm(true)">Зарегистрироваться</button>
                    </div>
                `;
            } else {
                modal.innerHTML = `
                    <h2>РЕГИСТРАЦИЯ</h2>
                    <input type="text" id="reg-name" class="premium-input" placeholder="Имя и фамилия" required>
                    <input type="email" id="reg-email" class="premium-input" placeholder="Email" required>
                    <input type="password" id="reg-pass" class="premium-input" placeholder="Пароль (минимум 6 символов)" required>
                    <button class="btn-full primary" onclick="handleRegister()">Зарегистрироваться</button>
                    <div class="toggle-link">
                        Уже есть аккаунт? <button onclick="renderAuthForm(false)">Войти</button>
                    </div>
                `;
            }
        }

        function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-pass').value.trim();

            if (!email || !password) {
                alert('❌ Заполните все поля');
                return;
            }

            if (!email.includes('@')) {
                alert('❌ Введите корректный email');
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .then(userCredential => {
                    console.log('✓ Успешный вход');
                })
                .catch(error => {
                    console.error('Ошибка входа:', error.code, error.message);
                    
                    if (error.code === 'auth/user-not-found') {
                        alert('❌ Пользователь не найден');
                    } else if (error.code === 'auth/wrong-password') {
                        alert('❌ Неверный пароль');
                    } else if (error.code === 'auth/invalid-email') {
                        alert('❌ Некорректный email');
                    } else {
                        alert('❌ Ошибка входа: ' + error.message);
                    }
                });
        }

        function handleRegister() {
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-pass').value.trim();

            if (!name || !email || !password) {
                alert('❌ Заполните все поля');
                return;
            }

            if (password.length < 6) {
                alert('❌ Пароль должен быть минимум 6 символов');
                return;
            }

            if (!email.includes('@')) {
                alert('❌ Введите корректный email');
                return;
            }

            auth.createUserWithEmailAndPassword(email, password)
                .then(userCredential => {
                    const uid = userCredential.user.uid;
                    const colors = ['#007aff', '#34c759', '#ff9500', '#af52de', '#ff2d55'];
                    const color = colors[Math.floor(Math.random() * colors.length)];

                    db.ref(`users/${uid}`).set({
                        id: uid,
                        name: name,
                        email: email,
                        color: color,
                        status: 'в сети',
                        img: ''
                    }).then(() => {
                        console.log('✓ Пользователь зарегистрирован');
                    }).catch(err => {
                        alert('❌ Ошибка при сохранении профиля: ' + err.message);
                    });
                })
                .catch(error => {
                    console.error('Ошибка регистрации:', error.code, error.message);
                    
                    if (error.code === 'auth/email-already-in-use') {
                        alert('❌ Email уже зарегистрирован');
                    } else if (error.code === 'auth/weak-password') {
                        alert('❌ Пароль слишком простой');
                    } else if (error.code === 'auth/invalid-email') {
                        alert('❌ Некорректный email');
                    } else {
                        alert('❌ Ошибка регистрации: ' + error.message);
                    }
                });
        }

        function renderApp() {
            document.body.innerHTML = `
                <div style="padding: 20px; text-align: center; margin-top: 50px;">
                    <h1>✓ Добро пожаловать в Connecta MESSENGER</h1>
                    <p>Авторизация выполнена успешно</p>
                    <button class="btn-full primary" style="max-width: 300px; margin: 20px auto;" onclick="logout()">
                        Выход
                    </button>
                </div>
            `;
        }

        function logout() {
            auth.signOut().then(() => {
                console.log('✓ Выход выполнен');
                location.reload();
            }).catch(err => {
                alert('❌ Ошибка при выходе: ' + err.message);
            });
        }
    </script>

</body>
</html>
