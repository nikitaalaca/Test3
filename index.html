<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Connecta MESSENGER</title>
    <style>
        :root {
            --bg-main: #f4f6f9;
            --panel-bg: rgba(255, 255, 255, 0.65);
            --panel-border: rgba(255, 255, 255, 0.4);
            --inner-border: rgba(0, 0, 0, 0.05);
            --text-primary: #1c1c1e;
            --text-secondary: #8e8e93;
            --accent: #007aff;
            --bubble-in: rgba(255, 255, 255, 0.85);
            --bubble-out: #007aff;
            --bubble-out-text: #ffffff;
            --shadow-premium: 0 20px 40px rgba(0, 0, 0, 0.08);
            --radius-lg: 24px;
            --radius-md: 18px;
            --danger: #ff3b30;
            --success: #34c759;
            --input-bg: #fff;
            --hover-bg: rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --bg-main: #000000;
            --panel-bg: rgba(28, 28, 30, 0.7);
            --panel-border: rgba(255, 255, 255, 0.1);
            --inner-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #98989d;
            --bubble-in: rgba(44, 44, 46, 0.85);
            --bubble-out: #0a84ff;
            --input-bg: rgba(255, 255, 255, 0.1);
            --hover-bg: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100vh;
            background: var(--bg-main);
            color: var(--text-primary);
            overflow: hidden;
        }

        #app-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }

        #sidebar-container {
            width: 360px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            border-right: 1px solid var(--panel-border);
            overflow: hidden;
        }

        #main-chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--inner-border);
        }

        .brand-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-primary);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0, 122, 255, 0.1);
            color: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .btn-icon:hover {
            background: rgba(0, 122, 255, 0.2);
        }

        .search-box {
            padding: 12px 16px;
            border-bottom: 1px solid var(--inner-border);
        }

        .search-inner {
            display: flex;
            align-items: center;
            background: var(--hover-bg);
            padding: 10px 14px;
            border-radius: 14px;
            gap: 8px;
        }

        .search-inner input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            color: var(--text-primary);
            font-size: 15px;
        }

        .tab-bar {
            display: flex;
            padding: 8px 12px;
            gap: 8px;
            border-bottom: 1px solid var(--inner-border);
        }

        .tab-btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .scroller-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: none;
        }

        .scroller-content.active {
            display: block;
        }

        .item-row {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 4px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.15s;
            background: transparent;
        }

        .item-row:hover {
            background: var(--hover-bg);
        }

        .item-row.active {
            background: rgba(0, 122, 255, 0.1);
        }

        .avatar-ui {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
            flex-shrink: 0;
            margin-right: 12px;
            position: relative;
        }

        .status-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 12px;
            height: 12px;
            background: var(--text-secondary);
            border: 2px solid var(--bg-main);
            border-radius: 50%;
        }

        .status-dot.online {
            background: var(--success);
        }

        .row-meta {
            flex: 1;
            min-width: 0;
        }

        .row-title {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .row-sub {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .chat-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--inner-border);
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .chat-messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-container {
            display: flex;
            max-width: 70%;
        }

        .msg-container.outgoing {
            align-self: flex-end;
        }

        .msg-bubble-main {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-break: break-word;
        }

        .msg-container.incoming .msg-bubble-main {
            background: var(--bubble-in);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .msg-container.outgoing .msg-bubble-main {
            background: var(--bubble-out);
            color: var(--bubble-out-text);
            border-bottom-right-radius: 4px;
        }

        .chat-input-bar {
            padding: 16px;
            background: var(--panel-bg);
            border-top: 1px solid var(--inner-border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-input-bar input {
            flex: 1;
            height: 44px;
            padding: 0 16px;
            border: 1px solid var(--inner-border);
            border-radius: 22px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
        }

        .circle-action-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--accent);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
        }

        .circle-action-btn:hover {
            background: rgba(0, 122, 255, 0.1);
        }

        .circle-action-btn.primary {
            background: var(--accent);
            color: white;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            gap: 16px;
        }

        .floating-dock {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 35px;
            padding: 10px 20px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 16px;
        }

        .dock-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 6px 12px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            transition: 0.2s;
        }

        .dock-item:hover {
            background: var(--hover-bg);
            color: var(--accent);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-card {
            background: var(--panel-bg);
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--panel-border);
        }

        .modal-card h3 {
            margin-bottom: 20px;
            font-size: 20px;
        }

        .premium-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--hover-bg);
            border: 1px solid var(--inner-border);
            border-radius: 12px;
            color: var(--text-primary);
            outline: none;
            margin-bottom: 12px;
            font-size: 15px;
            transition: 0.2s;
        }

        .premium-input:focus {
            border-color: var(--accent);
        }

        .btn-full {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }

        .btn-full.primary {
            background: var(--accent);
            color: white;
        }

        .btn-full.primary:hover {
            background: #0063d4;
        }

        .btn-full.secondary {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .btn-full.danger {
            background: var(--danger);
            color: white;
        }

        @media (max-width: 768px) {
            #sidebar-container {
                display: none;
                width: 100%;
            }
            
            #main-chat-container {
                width: 100%;
            }

            .sidebar-container.active {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <div id="app-layout">
        <aside id="sidebar-container">
            <div class="sidebar-header">
                <div class="brand-title">CONNECTA</div>
                <div class="header-actions">
                    <button class="btn-icon" id="theme-toggle-btn" onclick="toggleTheme()">🌙</button>
                    <button class="btn-icon" onclick="openCreateGroupModal()">➕</button>
                    <div class="avatar-ui" id="my-avatar" onclick="openProfileModal()" style="width: 36px; height: 36px; font-size: 14px; cursor: pointer;"></div>
                </div>
            </div>

            <div class="search-box">
                <div class="search-inner">
                    <span>🔍</span>
                    <input type="text" id="search-input" placeholder="Поиск..." oninput="renderLists()">
                </div>
            </div>

            <div class="tab-bar">
                <button class="tab-btn active" id="tab-chats" onclick="switchTab('chats')">Чаты</button>
                <button class="tab-btn" id="tab-groups" onclick="switchTab('groups')">Команды</button>
                <button class="tab-btn" id="tab-contacts" onclick="switchTab('contacts')">Люди</button>
            </div>

            <div id="content-chats" class="scroller-content active"></div>
            <div id="content-groups" class="scroller-content"></div>
            <div id="content-contacts" class="scroller-content"></div>
        </aside>

        <main id="main-chat-container">
            <div id="chat-subsystem" style="display: none; flex-direction: column; height: 100%; flex: 1;">
                <header class="chat-header">
                    <div class="chat-header-info">
                        <div class="avatar-ui" id="chat-avatar-slot" style="width: 44px; height: 44px;"></div>
                        <div>
                            <div class="row-title" id="chat-name-slot">...</div>
                            <div class="row-sub" id="chat-status-slot">...</div>
                        </div>
                    </div>
                </header>
                <div class="chat-messages-area" id="messages-flow"></div>
                <footer class="chat-input-bar">
                    <input type="text" id="msg-input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="circle-action-btn primary" onclick="sendMessage()">➤</button>
                </footer>
            </div>

            <div id="empty-stub" class="empty-state">
                <div style="font-size: 48px;">💬</div>
                <h3>Выберите диалог</h3>
            </div>
        </main>
    </div>

    <div id="auth-modal" class="modal-overlay active" style="z-index: 9999;">
        <div class="modal-card" id="auth-card-content">
            <h3 style="text-align: center;">Загрузка...</h3>
        </div>
    </div>

    <div id="profile-modal" class="modal-overlay" onclick="closeModals()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3>Мой Профиль</h3>
            <div id="profile-avatar-preview" style="width: 80px; height: 80px; border-radius: 50%; background-size: cover; margin: 0 auto 16px;"></div>
            <input type="text" id="profile-name" class="premium-input" placeholder="Имя">
            <input type="text" id="profile-role" class="premium-input" placeholder="Должность">
            <button class="btn-full primary" onclick="saveProfile()">Сохранить</button>
            <button class="btn-full danger" onclick="logout()">Выйти</button>
        </div>
    </div>

    <div class="floating-dock">
        <button class="dock-item" onclick="goHome()">🏠<span>Главная</span></button>
        <button class="dock-item" onclick="openAppSettings()">⚙️<span>Настройки</span></button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUbD08gGbhrkGIGgsIzHTEWeNMTTU_efY",
            authDomain: "yw-83b3e.firebaseapp.com",
            databaseURL: "https://yw-83b3e-default-rtdb.firebaseio.com",
            projectId: "yw-83b3e",
            storageBucket: "yw-83b3e.firebasestorage.app",
            messagingSenderId: "513977614231",
            appId: "1:513977614231:web:0a04427784e8259fdeced2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let currentUserId = null;
        let allUsers = [];
        let allGroups = [];
        let myChats = {};
        let currentChatId = null;
        let activeTab = 'chats';
        let currentUserData = null;

        const colors = ['#007aff', '#34c759', '#ff9500', '#af52de', '#ff2d55', '#ff3b30', '#a2845e'];

        function getColorForName(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            return colors[Math.abs(hash) % colors.length];
        }

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        }

        function createAvatarElement(user) {
            const avatar = document.createElement('div');
            avatar.className = 'avatar-ui';
            avatar.style.background = user.img || getColorForName(user.name);
            
            if (!user.img) {
                avatar.textContent = getInitials(user.name);
            } else {
                avatar.style.backgroundImage = `url('${user.img}')`;
            }

            if (user.status === 'в сети') {
                const statusDot = document.createElement('div');
                statusDot.className = 'status-dot online';
                avatar.appendChild(statusDot);
            }

            return avatar;
        }

        function renderLists() {
            const searchQuery = document.getElementById('search-input').value.toLowerCase();
            
            if (activeTab === 'chats') {
                renderChats(searchQuery);
            } else if (activeTab === 'groups') {
                renderGroups(searchQuery);
            } else if (activeTab === 'contacts') {
                renderContacts(searchQuery);
            }
        }

        function renderChats(searchQuery) {
            const container = document.getElementById('content-chats');
            container.innerHTML = '';

            if (Object.keys(myChats).length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-secondary);">Нет чатов</div>';
                return;
            }

            Object.entries(myChats).forEach(([key, chat]) => {
                const user = allUsers.find(u => u.id === chat.userId);
                if (!user) return;
                if (searchQuery && !user.name.toLowerCase().includes(searchQuery)) return;

                const row = document.createElement('div');
                row.className = 'item-row';
                if (currentChatId === key) row.classList.add('active');

                const avatar = createAvatarElement(user);
                
                const meta = document.createElement('div');
                meta.className = 'row-meta';
                meta.innerHTML = `
                    <div class="row-title">${user.name}</div>
                    <div class="row-sub">${chat.lastMsg?.substring(0, 30) || 'Начните разговор'}</div>
                `;

                row.appendChild(avatar);
                row.appendChild(meta);
                row.onclick = () => openChat(key, user);

                container.appendChild(row);
            });
        }

        function renderContacts(searchQuery) {
            const container = document.getElementById('content-contacts');
            container.innerHTML = '';

            let filteredUsers = allUsers.filter(u => u.id !== currentUserId);
            if (searchQuery) {
                filteredUsers = filteredUsers.filter(u => u.name.toLowerCase().includes(searchQuery));
            }

            if (filteredUsers.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-secondary);">Нет контактов</div>';
                return;
            }

            filteredUsers.forEach(user => {
                const row = document.createElement('div');
                row.className = 'item-row';

                const avatar = createAvatarElement(user);
                
                const meta = document.createElement('div');
                meta.className = 'row-meta';
                meta.innerHTML = `
                    <div class="row-title">${user.name}</div>
                    <div class="row-sub">${user.status === 'в сети' ? '🟢 В сети' : '⚪ Не в сети'}</div>
                `;

                row.appendChild(avatar);
                row.appendChild(meta);
                row.onclick = () => openChat(user.id, user);

                container.appendChild(row);
            });
        }

        function renderGroups(searchQuery) {
            const container = document.getElementById('content-groups');
            container.innerHTML = '';

            let filtered = allGroups;
            if (searchQuery) {
                filtered = filtered.filter(g => g.name.toLowerCase().includes(searchQuery));
            }

            if (filtered.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-secondary);">Нет групп</div>';
                return;
            }

            filtered.forEach(group => {
                const row = document.createElement('div');
                row.className = 'item-row';

                const avatar = document.createElement('div');
                avatar.className = 'avatar-ui';
                avatar.style.background = group.img || getColorForName(group.name);
                if (!group.img) {
                    avatar.textContent = getInitials(group.name);
                }

                const meta = document.createElement('div');
                meta.className = 'row-meta';
                meta.innerHTML = `<div class="row-title">${group.name}</div>`;

                row.appendChild(avatar);
                row.appendChild(meta);
                container.appendChild(row);
            });
        }

        function openChat(chatId, user) {
            currentChatId = chatId;
            document.getElementById('chat-subsystem').style.display = 'flex';
            document.getElementById('empty-stub').style.display = 'none';

            document.getElementById('chat-avatar-slot').innerHTML = '';
            document.getElementById('chat-avatar-slot').appendChild(createAvatarElement(user));
            document.getElementById('chat-name-slot').textContent = user.name;
            document.getElementById('chat-status-slot').textContent = user.status === 'в сети' ? '🟢 В сети' : '⚪ Не в сети';

            renderLists();
            loadChatMessages(chatId);
        }

        function loadChatMessages(chatId) {
            const messagesArea = document.getElementById('messages-flow');
            messagesArea.innerHTML = '<div style="text-align: center; color: var(--text-secondary);">Загрузка сообщений...</div>';

            db.ref(`messages/${chatId}`).once('value', snapshot => {
                const messages = snapshot.val() || {};
                messagesArea.innerHTML = '';

                Object.values(messages).forEach(msg => {
                    const container = document.createElement('div');
                    container.className = `msg-container ${msg.senderId === currentUserId ? 'outgoing' : 'incoming'}`;

                    const bubble = document.createElement('div');
                    bubble.className = 'msg-bubble-main';
                    bubble.textContent = msg.text;

                    container.appendChild(bubble);
                    messagesArea.appendChild(container);
                });

                messagesArea.scrollTop = messagesArea.scrollHeight;
            });
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();

            if (!text || !currentChatId) return;

            const messageKey = db.ref(`messages/${currentChatId}`).push().key;
            const timestamp = new Date().getTime();

            db.ref(`messages/${currentChatId}/${messageKey}`).set({
                text,
                senderId: currentUserId,
                timestamp
            }).then(() => {
                input.value = '';
                loadChatMessages(currentChatId);

                const chatPreview = myChats[currentChatId];
                if (chatPreview) {
                    chatPreview.lastMsg = text;
                    chatPreview.ts = timestamp;
                }

                db.ref(`user_chats/${currentUserId}/${currentChatId}`).update({
                    lastMsg: text,
                    ts: timestamp
                });
            }).catch(err => console.error('Ошибка отправки:', err));
        }

        function switchTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.scroller-content').forEach(content => content.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`content-${tab}`).classList.add('active');
            renderLists();
        }

        function toggleTheme() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.body.removeAttribute('data-theme');
            } else {
                document.body.setAttribute('data-theme', 'dark');
            }
        }

        function updateMyAvatar() {
            if (!currentUserData) return;
            const avatar = document.getElementById('my-avatar');
            avatar.style.background = currentUserData.color || getColorForName(currentUserData.name);
            avatar.textContent = getInitials(currentUserData.name);
        }

        function updateProfileUI() {
            if (!currentUserData) return;
            document.getElementById('profile-name').value = currentUserData.name || '';
            document.getElementById('profile-role').value = currentUserData.role || '';

            const preview = document.getElementById('profile-avatar-preview');
            preview.style.background = currentUserData.color || getColorForName(currentUserData.name);
            preview.textContent = getInitials(currentUserData.name);
        }

        function saveProfile() {
            const name = document.getElementById('profile-name').value.trim();
            const role = document.getElementById('profile-role').value.trim();

            if (!name) {
                alert('Введите имя');
                return;
            }

            db.ref(`users/${currentUserId}`).update({
                name,
                role
            }).then(() => {
                currentUserData.name = name;
                currentUserData.role = role;
                updateMyAvatar();
                closeModals();
                renderLists();
                alert('Профиль сохранён');
            }).catch(err => alert('Ошибка: ' + err.message));
        }

        function openProfileModal() {
            updateProfileUI();
            document.getElementById('profile-modal').classList.add('active');
        }

        function closeModals() {
            document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
        }

        function logout() {
            auth.signOut().then(() => {
                localStorage.clear();
                window.location.reload();
            });
        }

        function goHome() {
            currentChatId = null;
            document.getElementById('chat-subsystem').style.display = 'none';
            document.getElementById('empty-stub').style.display = 'flex';
        }

        function openAppSettings() {
            alert('Настройки: опция в разработке');
        }

        function openCreateGroupModal() {
            alert('Создание группы: опция в разработке');
        }

        function renderAuth(isReg) {
            const el = document.getElementById('auth-card-content');
            if (!isReg) {
                el.innerHTML = `
                    <h3>Вход</h3>
                    <input type="email" id="l-email" class="premium-input" placeholder="Email" onkeypress="if(event.key==='Enter') login()">
                    <input type="password" id="l-pas" class="premium-input" placeholder="Пароль" onkeypress="if(event.key==='Enter') login()">
                    <button class="btn-full primary" onclick="login()">Войти</button>
                    <button class="btn-full secondary" onclick="renderAuth(true)">Регистрация</button>
                `;
            } else {
                el.innerHTML = `
                    <h3>Регистрация</h3>
                    <input type="text" id="r-name" class="premium-input" placeholder="Имя" onkeypress="if(event.key==='Enter') register()">
                    <input type="email" id="r-email" class="premium-input" placeholder="Email" onkeypress="if(event.key==='Enter') register()">
                    <input type="password" id="r-pas" class="premium-input" placeholder="Пароль" onkeypress="if(event.key==='Enter') register()">
                    <button class="btn-full primary" onclick="register()">Зарегистрироваться</button>
                    <button class="btn-full secondary" onclick="renderAuth(false)">Уже есть аккаунт</button>
                `;
            }
        }

        function login() {
            const email = document.getElementById('l-email').value.trim();
            const pas = document.getElementById('l-pas').value.trim();
            if (!email || !pas) return alert('Заполните все поля');
            
            auth.signInWithEmailAndPassword(email, pas).catch(err => alert('Ошибка входа: ' + err.message));
        }

        function register() {
            const name = document.getElementById('r-name').value.trim();
            const email = document.getElementById('r-email').value.trim();
            const pas = document.getElementById('r-pas').value.trim();
            if (!name || !email || !pas) return alert('Заполните все поля');
            
            auth.createUserWithEmailAndPassword(email, pas).then(cred => {
                const uid = cred.user.uid;
                const color = colors[Math.floor(Math.random() * colors.length)];
                db.ref('users/' + uid).set({
                    id: uid,
                    name,
                    email,
                    color,
                    status: 'в сети'
                });
            }).catch(err => alert('Ошибка регистрации: ' + err.message));
        }

        window.onload = () => {
            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUserId = user.uid;
                    document.getElementById('auth-modal').classList.remove('active');
                    
                    db.ref(`users/${currentUserId}`).once('value', snapshot => {
                        currentUserData = snapshot.val() || {};
                        updateMyAvatar();
                    });

                    db.ref('users').on('value', s => {
                        allUsers = Object.values(s.val() || {});
                        renderLists();
                    });

                    db.ref('groups').on('value', s => {
                        allGroups = Object.values(s.val() || {});
                        renderLists();
                    });

                    db.ref(`user_chats/${currentUserId}`).on('value', s => {
                        myChats = s.val() || {};
                        renderLists();
                    });
                } else {
                    renderAuth(false);
                    document.getElementById('auth-modal').classList.add('active');
                }
            });
        };
    </script>
</body>
</html>
