<body>

    <!-- Firebase SDK с async загрузкой -->
    <script>
        // Немедленное отображение экрана загрузки
        const loadingScreen = document.getElementById('loading-screen');
        
        // Загружаем Firebase SDK параллельно
        const loadScripts = async () => {
            const scripts = [
                'https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js',
                'https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js',
                'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js'
            ];
            
            await Promise.all(scripts.map(src => {
                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = src;
                    script.onload = resolve;
                    script.onerror = reject;
                    script.async = true;
                    document.head.appendChild(script);
                });
            }));
            
            // Показываем приложение после загрузки скриптов
            document.getElementById('app-root').style.display = 'block';
            loadingScreen.style.opacity = '0';
            setTimeout(() => loadingScreen.remove(), 300);
            
            // Инициализируем приложение
            initApp();
        };

        // Основная инициализация
        const initApp = () => {
            // Оптимизированная конфигурация
            const firebaseConfig = {
                apiKey: "AIzaSyCUbD08gGbhrkGIGgsIzHTEWeNMTTU_efY",
                authDomain: "yw-83b3e.firebaseapp.com",
                databaseURL: "https://yw-83b3e-default-rtdb.firebaseio.com",
                projectId: "yw-83b3e",
                storageBucket: "yw-83b3e.firebasestorage.app",
                messagingSenderId: "513977614231",
                appId: "1:513977614231:web:0a04427784e8259fdeced2"
            };
            
            firebase.initializeApp(firebaseConfig);
            
            // Глобальные переменные
            window.db = firebase.database();
            window.auth = firebase.auth();
            
            // Запускаем приложение
            initializeApplication();
        };

        // Оптимизированное хранилище
        class OptimizedStorage {
            constructor() {
                this.cache = new Map();
                this.maxCacheSize = 100;
            }
            
            get(key) {
                if (this.cache.has(key)) return this.cache.get(key);
                const value = localStorage.getItem(key);
                if (value) this.cache.set(key, value);
                return value;
            }
            
            set(key, value) {
                this.cache.set(key, value);
                if (this.cache.size > this.maxCacheSize) {
                    const firstKey = this.cache.keys().next().value;
                    this.cache.delete(firstKey);
                }
                try {
                    localStorage.setItem(key, value);
                } catch (e) {
                    // localStorage переполнен, очищаем кэш
                    this.cache.clear();
                }
            }
        }
        
        window.storage = new OptimizedStorage();

        // Дебаунс функция для оптимизации частых вызовов
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Виртуальный скролл для больших списков
        class VirtualScroller {
            constructor(container, items, renderItem, itemHeight = 72) {
                this.container = container;
                this.items = items;
                this.renderItem = renderItem;
                this.itemHeight = itemHeight;
                this.visibleItems = new Map();
                this.observer = null;
            }
            
            init() {
                this.container.style.position = 'relative';
                this.container.style.height = `${this.items.length * this.itemHeight}px`;
                
                // Используем Intersection Observer вместо постоянного ререндера
                this.observer = new IntersectionObserver(
                    (entries) => this.handleIntersection(entries),
                    { root: this.container.parentElement, threshold: 0.1 }
                );
                
                this.render();
            }
            
            render() {
                // Рендерим только видимые элементы
                const scrollTop = this.container.parentElement.scrollTop;
                const startIndex = Math.floor(scrollTop / this.itemHeight);
                const endIndex = Math.min(
                    startIndex + Math.ceil(this.container.parentElement.clientHeight / this.itemHeight) + 1,
                    this.items.length
                );
                
                // Очищаем невидимые элементы
                this.visibleItems.forEach((element, index) => {
                    if (index < startIndex || index > endIndex) {
                        element.remove();
                        this.visibleItems.delete(index);
                    }
                });
                
                // Добавляем новые видимые элементы
                for (let i = startIndex; i < endIndex; i++) {
                    if (!this.visibleItems.has(i)) {
                        const element = this.renderItem(this.items[i], i);
                        element.style.position = 'absolute';
                        element.style.top = `${i * this.itemHeight}px`;
                        element.style.width = '100%';
                        this.container.appendChild(element);
                        this.visibleItems.set(i, element);
                    }
                }
            }
        }

        // Оптимизированная загрузка данных
        class DataLoader {
            constructor() {
                this.cache = new Map();
                this.pendingRequests = new Map();
            }
            
            async loadData(key) {
                // Проверяем кэш
                if (this.cache.has(key)) {
                    return this.cache.get(key);
                }
                
                // Проверяем, не загружается ли уже
                if (this.pendingRequests.has(key)) {
                    return this.pendingRequests.get(key);
                }
                
                // Создаем новый запрос
                const promise = new Promise((resolve) => {
                    db.ref(key).once('value', (snapshot) => {
                        const data = snapshot.val();
                        this.cache.set(key, data);
                        this.pendingRequests.delete(key);
                        resolve(data);
                        
                        // Удаляем из кэша через 5 минут
                        setTimeout(() => this.cache.delete(key), 300000);
                    });
                });
                
                this.pendingRequests.set(key, promise);
                return promise;
            }
        }

        window.dataLoader = new DataLoader();

        // Оптимизированная инициализация приложения
        function initializeApplication() {
            // Быстрая проверка авторизации
            auth.onAuthStateChanged((user) => {
                if (user) {
                    window.currentUserId = user.uid;
                    document.getElementById('auth-modal').classList.remove('active');
                    initCore();
                    // Скрываем экран загрузки
                    setTimeout(() => {
                        if (loadingScreen.style.opacity !== '0') {
                            document.getElementById('app-root').style.display = 'block';
                            loadingScreen.style.opacity = '0';
                            setTimeout(() => loadingScreen.remove(), 300);
                        }
                    }, 500);
                } else {
                    renderAuth(false);
                }
            });
        }

        // Оптимизированная версия initCore
        function initCore() {
            window.isFirstChatsLoad = true;
            
            // Загружаем данные параллельно
            Promise.all([
                new Promise(resolve => {
                    db.ref('users').on('value', s => {
                        window.allUsers = Object.values(s.val()||{}).map(v => ({...v, name:v.name||'Пользователь'}));
                        resolve();
                    });
                }),
                new Promise(resolve => {
                    db.ref('groups').on('value', s => {
                        window.allGroups = Object.values(s.val()||{}).map(v => ({...v, name:v.name||'Команда'}));
                        resolve();
                    });
                })
            ]).then(() => {
                // Загружаем чаты после загрузки пользователей и групп
                db.ref(`user_chats/${currentUserId}`).on('value', s => {
                    const nd = s.val()||{};
                    
                    // Оптимизированная проверка новых сообщений
                    if (!isFirstChatsLoad) {
                        const newMessages = [];
                        for (let k in nd) {
                            const ci = nd[k];
                            if (ci.ts > window.APP_START_TIME && 
                                (!window.myChats || !window.myChats[k] || ci.ts > window.myChats[k].ts) && 
                                ci.senderUid !== currentUserId && 
                                ci.senderUid !== 'system') {
                                newMessages.push({
                                    sender: ci.senderName,
                                    text: ci.lastMsg
                                });
                            }
                        }
                        
                        // Показываем уведомления с задержкой для производительности
                        newMessages.forEach((msg, index) => {
                            setTimeout(() => {
                                notifyNewMessage(msg.sender, msg.text);
                            }, index * 300);
                        });
                    } else {
                        window.isFirstChatsLoad = false;
                    }
                    
                    window.myChats = nd;
                    updateUI();
                });
                
                // Мониторинг статуса подключения
                db.ref('.info/connected').on('value', s => {
                    if (s.val() === true && currentUserId) {
                        const r = db.ref(`users/${currentUserId}/status`);
                        r.set('в сети');
                        r.onDisconnect().set(Date.now());
                    }
                });
                
                listenForCalls();
                updateUI();
            });
        }

        // Оптимизированный рендер списков с дебаунсом
        window.renderLists = debounce(() => {
            if (!window.allUsers || !window.allGroups) return;
            
            const search = document.getElementById('search-input')?.value.toLowerCase() || '';
            
            // Используем DocumentFragment для минимизации рефлоу
            const renderContactList = () => {
                const container = document.getElementById('content-contacts');
                if (!container || activeTab !== 'contacts') return;
                
                const fragment = document.createDocumentFragment();
                const filteredUsers = window.allUsers.filter(u => 
                    u.id !== currentUserId && 
                    (!search || u.name.toLowerCase().includes(search))
                );
                
                filteredUsers.slice(0, 50).forEach(u => { // Лимит для производительности
                    const div = document.createElement('div');
                    div.className = `item-row ${activeChatId === u.id && !isGroupMode ? 'active' : ''}`;
                    div.innerHTML = `
                        <div class="swipe-wrapper">
                            <div class="swipe-content" onclick="openChat('${u.id}', false)">
                                <div style="position:relative">
                                    ${getAvatar(u)}
                                    ${u.status === 'в сети' ? '<div class="status-dot online"></div>' : ''}
                                </div>
                                <div class="row-meta">
                                    <div class="row-title">${escapeHTML(u.name)}</div>
                                    <div class="row-sub">${escapeHTML(u.role || 'Коллега')}</div>
                                </div>
                            </div>
                        </div>`;
                    fragment.appendChild(div);
                });
                
                container.innerHTML = '';
                container.appendChild(fragment);
            };
            
            // Рендерим только активную вкладку
            requestAnimationFrame(() => {
                switch(activeTab) {
                    case 'chats':
                        renderChatList(search);
                        break;
                    case 'groups':
                        renderGroupList(search);
                        break;
                    case 'contacts':
                        renderContactList();
                        break;
                }
            });
        }, 150);

        // Запускаем загрузку скриптов
        loadScripts().catch(error => {
            console.error('Failed to load Firebase:', error);
            loadingScreen.innerHTML = '<div style="text-align:center;color:red;">Ошибка загрузки. Проверьте соединение.</div>';
        });
    </script>
