<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>КОЛЛАЖ CONNECTING</title>
    <style>
        :root {
            --bg-main: #f4f6f9;
            --panel-bg: rgba(255, 255, 255, 0.65);
            --panel-border: rgba(255, 255, 255, 0.4);
            --inner-border: rgba(0, 0, 0, 0.05);
            --text-primary: #1c1c1e;
            --text-secondary: #8e8e93;
            --accent: #007aff;
            --accent-gradient: linear-gradient(135deg, #007aff 0%, #34aadc 100%);
            --bubble-in: rgba(255, 255, 255, 0.85);
            --bubble-out: #007aff;
            --bubble-out-text: #ffffff;
            --shadow-premium: 0 20px 40px rgba(0, 0, 0, 0.08);
            --shadow-smooth: 0 8px 24px rgba(0, 0, 0, 0.04);
            --radius-lg: 24px;
            --radius-md: 18px;
            --radius-sm: 12px;
            --danger: #ff3b30;
            --success: #34c759;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; 
            -webkit-font-smoothing: antialiased; 
        }
        
        body, html { 
            width: 100%;
            height: 100dvh; 
            background: var(--bg-main); 
            color: var(--text-primary); 
            overflow: hidden; 
            position: relative;
        }

        .ambient-glow { 
            position: absolute; 
            width: 50vw; 
            height: 50vw;
            background: radial-gradient(circle, rgba(0,122,255,0.12) 0%, rgba(255,255,255,0) 70%); 
            top: -10vw; 
            left: -10vw; 
            z-index: 1; 
            pointer-events: none; 
        }

        #app-layout { 
            display: flex;
            width: 100vw; 
            height: 100dvh; 
            position: relative; 
            z-index: 2; 
            overflow: hidden;
        }
        
        .glass-panel { 
            background: var(--panel-bg); 
            backdrop-filter: blur(25px) saturate(180%); 
            -webkit-backdrop-filter: blur(25px) saturate(180%); 
            border-right: 1px solid var(--panel-border);
        }

        #sidebar-container { 
            width: 340px; 
            height: 100%; 
            display: flex; 
            flex-direction: column;
            z-index: 10; 
            flex-shrink: 0; 
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); 
        }
        
        #main-chat-container { 
            flex: 1; 
            height: 100%;
            display: flex; 
            flex-direction: column; 
            position: relative; 
            z-index: 5; 
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 768px) {
            #sidebar-container { 
                width: 100vw;
                position: absolute; 
                left: 0; top: 0; bottom: 0; 
                z-index: 10; 
            }
            #main-chat-container { 
                width: 100vw; 
                position: absolute; 
                left: 0; top: 0; bottom: 0; 
                z-index: 20; 
                transform: translateX(100vw); 
                transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            }
            #app-layout.chat-opened #sidebar-container { 
                transform: translateX(-30vw);
            }
            #app-layout.chat-opened #main-chat-container { 
                transform: translateX(0);
            }
            .mobile-back-btn { display: flex !important; }
        }

        /* Шапка сайдбара */
        .sidebar-header { 
            padding: 20px 16px 12px;
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }
        
        .brand-title { 
            font-size: 20px; 
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.5px; 
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dev-badge {
            font-size: 10px;
            background: rgba(0,0,0,0.05);
            padding: 4px 6px;
            border-radius: 6px;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Кнопка плюса */
        .btn-plus {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0, 122, 255, 0.1);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-plus:hover {
            background: var(--accent);
            color: white;
            transform: scale(1.05);
        }
        .btn-plus svg { width: 16px; height: 16px; stroke-width: 2.5px; }

        /* Поиск */
        .search-box { padding: 0 16px 12px; }
        .search-inner { 
            display: flex; 
            align-items: center; 
            background: rgba(0,0,0,0.05); 
            padding: 8px 12px;
            border-radius: 10px; 
        }
        .search-inner input { 
            border: none;
            background: transparent; 
            outline: none; 
            width: 100%; 
            margin-left: 8px; 
            color: var(--text-primary); 
            font-size: 15px;
        }

        /* Табы */
        .tab-bar { 
            display: flex; 
            padding: 0 16px 8px; 
            gap: 4px;
            border-bottom: 1px solid var(--inner-border); 
        }
        .tab-btn { 
            flex: 1; 
            padding: 8px; 
            border: none;
            background: transparent; 
            color: var(--text-secondary); 
            font-size: 13px; 
            font-weight: 600; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.2s ease;
        }
        .tab-btn.active { background: rgba(0,0,0,0.04); color: var(--text-primary); }

        /* Списки */
        .scroller-content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 8px 12px; 
            display: none;
        }
        .scroller-content.active { display: block; }

        .item-row { 
            display: flex;
            align-items: center; 
            padding: 10px; 
            border-radius: var(--radius-md); 
            cursor: pointer; 
            margin-bottom: 2px; 
            transition: background 0.2s;
        }
        .item-row:hover { background: rgba(0,0,0,0.03); }
        .item-row.active { background: rgba(0, 122, 255, 0.08); }
        
        .avatar-ui { 
            width: 48px;
            height: 48px; 
            border-radius: 50%; 
            color: white; 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 16px;
            position: relative; 
            object-fit: cover;
            flex-shrink: 0;
        }
        
        .status-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 14px;
            height: 14px;
            background: var(--text-secondary);
            border: 2.5px solid #fff;
            border-radius: 50%;
        }
        .status-dot.online { background: var(--success); }

        .row-meta { 
            flex: 1; 
            margin-left: 12px; 
            min-width: 0;
        }
        .row-title-container {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 2px;
        }
        .row-title { 
            font-weight: 600; 
            font-size: 15px; 
            color: var(--text-primary);
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
        }
        .row-time { font-size: 12px; color: var(--text-secondary); }
        .row-sub { 
            font-size: 13px; 
            color: var(--text-secondary); 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
        }

        /* Шапка чата */
        .chat-header { 
            padding: 12px 20px; 
            display: flex; 
            align-items: center;
            justify-content: space-between; 
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--inner-border); 
            z-index: 10;
        }
        
        .mobile-back-btn { 
            display: none; 
            background: transparent; 
            border: none; 
            color: var(--accent); 
            padding-right: 12px;
            cursor: pointer; 
        }

        /* Зона сообщений */
        .chat-messages-area { 
            flex: 1; 
            padding: 20px;
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        .msg-container { 
            display: flex;
            flex-direction: column; 
            max-width: 75%; 
        }
        .msg-container.incoming { align-self: flex-start; }
        .msg-container.outgoing { align-self: flex-end; }
        
        .msg-bubble-main { 
            padding: 10px 14px;
            border-radius: 18px; 
            font-size: 15px; 
            line-height: 1.4; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); 
            word-break: break-word; 
        }
        .incoming .msg-bubble-main { 
            background: var(--bubble-in); 
            color: var(--text-primary); 
            border-bottom-left-radius: 4px;
        }
        .outgoing .msg-bubble-main { 
            background: var(--accent); 
            color: var(--bubble-out-text);
            border-bottom-right-radius: 4px; 
        }
        
        .msg-media-preview { max-width: 100%; border-radius: 12px; margin-bottom: 6px; cursor: pointer; }
        .msg-time { font-size: 11px; margin-top: 4px; opacity: 0.7; text-align: right; }
        
        /* Ввод сообщения */
        .chat-input-bar { 
            padding: 12px 20px calc(12px + env(safe-area-inset-bottom));
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--inner-border); 
            display: flex; 
            align-items: center; 
            gap: 10px;
        }
        
        .chat-input-bar input[type="text"] { 
            flex: 1; 
            padding: 12px 16px; 
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 20px; 
            background: #fff; 
            color: var(--text-primary); 
            font-size: 15px; 
            outline: none; 
        }
        
        .circle-action-btn { 
            width: 38px;
            height: 38px; 
            border-radius: 50%; 
            border: none; 
            background: transparent; 
            color: var(--accent); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: all 0.2s;
        }
        .circle-action-btn:hover { background: rgba(0, 122, 255, 0.1); }
        .circle-action-btn.primary { background: var(--accent); color: white; }
        .circle-action-btn.primary:hover { background: #005bb5; }

        /* Модальные окна */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; 
            background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); 
            z-index: 1000; display: none; align-items: center; justify-content: center; 
            opacity: 0; transition: opacity 0.3s ease; 
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        
        .modal-card { 
            width: 90%; max-width: 380px; padding: 24px; 
            border-radius: 24px; box-shadow: var(--shadow-premium); 
            background: rgba(255,255,255,0.9); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); 
            transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); 
        }
        .modal-overlay.active .modal-card { transform: scale(1); }

        .premium-input { 
            width: 100%; padding: 14px; background: rgba(0,0,0,0.03); 
            border: 1px solid rgba(0,0,0,0.05); border-radius: 12px; 
            color: var(--text-primary); outline: none; margin-bottom: 12px; font-size: 15px; 
        }
        .premium-input:focus { background: white; border-color: var(--accent); }
        .input-lbl { font-size: 11px; color: var(--text-secondary); font-weight: 700; display: block; margin-bottom: 6px; letter-spacing: 0.5px; }

        .btn-full {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-full.primary { background: var(--accent); color: white; }
        .btn-full.danger { background: var(--danger); color: white; margin-top: 8px; }
        .btn-full.secondary { background: transparent; color: var(--text-primary); margin-top: 8px; }

        .member-list {
            max-height: 200px; overflow-y: auto; margin-bottom: 16px;
            background: rgba(0,0,0,0.02); border-radius: 12px; padding: 8px;
        }
        .member-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 4px; border-bottom: 1px solid rgba(0,0,0,0.03);
        }
        
        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); }

        #lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; }
        #lightbox.active { display: flex; }
        #lightbox img { max-width: 95%; max-height: 90%; border-radius: 16px; }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <div id="lightbox" onclick="this.classList.remove('active')"><img id="lightbox-img" src="" alt="Фото"></div>

    <!-- АВТОРИЗАЦИЯ -->
    <div id="auth-modal" class="modal-overlay active">
        <div class="modal-card" id="auth-card-content">
            <h3 style="text-align:center;">Загрузка...</h3>
        </div>
    </div>

    <!-- СОЗДАНИЕ ГРУППЫ -->
    <div id="create-group-modal" class="modal-overlay" onclick="closeModals()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3 style="margin-bottom: 16px; font-size: 20px;">Создать команду</h3>
            <label class="input-lbl">НАЗВАНИЕ КОМАНДЫ</label>
            <input type="text" id="new-group-name" class="premium-input" placeholder="Например: Разработка">
            <label class="input-lbl">ВЫБЕРИТЕ УЧАСТНИКОВ</label>
            <div id="create-group-members" class="member-list"></div>
            <button class="btn-full primary" onclick="createGroup()">Создать</button>
            <button class="btn-full secondary" onclick="closeModals()">Отмена</button>
        </div>
    </div>

    <!-- НАСТРОЙКИ ГРУППЫ -->
    <div id="edit-group-modal" class="modal-overlay" onclick="closeModals()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3 style="margin-bottom: 16px; font-size: 20px;">Управление командой</h3>
            <div style="display:flex; flex-direction:column; align-items:center; margin-bottom:16px;">
                <div id="edit-group-avatar-preview"></div>
                <button style="background:none; border:none; color:var(--accent); font-weight:600; margin-top:8px; cursor:pointer;" onclick="document.getElementById('group-img-upload').click()">Изменить фото</button>
                <input type="file" id="group-img-upload" accept="image/*" style="display:none;" onchange="handleGroupImgUpload(event)">
            </div>
            <label class="input-lbl">НАЗВАНИЕ</label>
            <input type="text" id="edit-group-name" class="premium-input">
            <label class="input-lbl">УЧАСТНИКИ</label>
            <div id="edit-group-members" class="member-list"></div>
            <button class="btn-full primary" onclick="saveGroupSettings()">Применить</button>
            <button class="btn-full danger" onclick="deleteGroup()">Удалить команду</button>
        </div>
    </div>

    <!-- НАСТРОЙКИ ПРОФИЛЯ -->
    <div id="profile-modal" class="modal-overlay" onclick="closeModals()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3 style="margin-bottom: 16px; font-size: 20px;">Профиль</h3>
            <div style="display:flex; flex-direction:column; align-items:center; margin-bottom:16px;">
                <div id="profile-avatar-preview"></div>
                <button style="background:none; border:none; color:var(--accent); font-weight:600; margin-top:8px; cursor:pointer;" onclick="document.getElementById('profile-img-upload').click()">Загрузить фото</button>
                <input type="file" id="profile-img-upload" accept="image/*" style="display:none;" onchange="handleProfileImgUpload(event)">
            </div>
            <label class="input-lbl">ИМЯ И ФАМИЛИЯ</label>
            <input type="text" id="profile-name" class="premium-input">
            <label class="input-lbl">ДОЛЖНОСТЬ</label>
            <input type="text" id="profile-role" class="premium-input">
            <button class="btn-full primary" onclick="saveProfile()">Сохранить</button>
            <button class="btn-full secondary" style="color:var(--danger);" onclick="logout()">Выйти из аккаунта</button>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="app-layout">
        <aside id="sidebar-container" class="glass-panel">
            <div class="sidebar-header">
                <div class="brand-title">
                    <span>COLLAGE</span>
                    <span class="dev-badge">CONNECTING</span>
                </div>
                <div class="header-actions">
                    <button class="btn-plus" onclick="openCreateGroupModal()" title="Новая группа">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                    <div id="my-avatar-anchor" style="cursor:pointer;" onclick="openProfileModal()"></div>
                </div>
            </div>
            
            <div class="search-box">
                <div class="search-inner">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search-input" placeholder="Поиск..." oninput="renderLists()">
                </div>
            </div>

            <nav class="tab-bar">
                <button class="tab-btn active" id="tab-chats" onclick="switchTab('chats')">Чаты</button>
                <button class="tab-btn" id="tab-groups" onclick="switchTab('groups')">Команды</button>
                <button class="tab-btn" id="tab-contacts" onclick="switchTab('contacts')">Коллеги</button>
            </nav>

            <div id="content-chats" class="scroller-content active"></div>
            <div id="content-groups" class="scroller-content"></div>
            <div id="content-contacts" class="scroller-content"></div>
        </aside>

        <main id="main-chat-container" class="glass-panel">
            <div id="chat-subsystem" style="display:none; flex-direction:column; height:100%;">
                <header class="chat-header">
                    <div style="display:flex; align-items:center; min-width:0;">
                        <button class="mobile-back-btn" onclick="closeChat()">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        </button>
                        <div id="chat-avatar-slot"></div>
                        <div style="margin-left:12px; min-width:0;">
                            <div class="row-title" id="chat-name-slot" style="font-size:16px;">...</div>
                            <div class="row-sub" id="chat-status-slot" style="font-size:12px;">...</div>
                        </div>
                    </div>
                    <div id="chat-actions-slot"></div>
                </header>

                <div class="chat-messages-area" id="messages-flow"></div>

                <div id="attach-preview" style="display:none; padding:10px 20px; background:#fff; border-top:1px solid var(--inner-border); align-items:center; gap:10px;">
                    <span style="font-size:14px; font-weight:600;" id="attach-name">Файл</span>
                    <button style="border:none; background:none; color:var(--danger); cursor:pointer;" onclick="clearAttach()">Удалить</button>
                </div>

                <footer class="chat-input-bar">
                    <button class="circle-action-btn" onclick="document.getElementById('file-upload').click()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                    </button>
                    <input type="file" id="file-upload" style="display:none;" onchange="handleFileSelect(event)">
                    
                    <input type="text" id="msg-input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                    
                    <button class="circle-action-btn primary" onclick="sendMessage()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </footer>
            </div>

            <div id="empty-stub" class="empty-state">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="1.5" style="opacity:0.3; margin-bottom:16px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <h3>Выберите чат для общения</h3>
            </div>
        </main>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUbD08gGbhrkGIGgsIZhTEWNTTU_efY",
            authDomain: "yw-83b3e.firebaseapp.com",
            databaseURL: "https://yw-83b3e-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUserId = localStorage.getItem('hax_uid') || null;
        let allUsers = [];
        let allGroups = [];
        let globalMessages = {};
        
        let activeTab = 'chats';
        let activeChatId = null;
        let isGroupMode = false;
        let tempProfileImg = "";
        let tempGroupImg = "";
        let editGroupId = null;
        let attachFile = null;

        // ПРОВЕРКА ПРИ ЗАГРУЗКЕ
        window.onload = () => {
            if (currentUserId) {
                // Строгая проверка: существует ли пользователь в базе?
                db.ref(`users/${currentUserId}`).once('value').then(s => {
                    if (s.exists()) {
                        document.getElementById('auth-modal').classList.remove('active');
                        initCore();
                    } else {
                        // Если юзера удалили, но он остался в памяти
                        forceReset(); 
                    }
                }).catch(e => {
                    alert('Ошибка подключения к базе: ' + e.message);
                    renderAuth(false);
                });
            } else {
                renderAuth(false);
            }
        };

        // АВАРИЙНЫЙ СБРОС (Если система зависла)
        function forceReset() {
            localStorage.removeItem('hax_uid');
            localStorage.clear();
            currentUserId = null;
            renderAuth(false);
        }

        // --- АВТОРИЗАЦИЯ ---
        function renderAuth(isReg) {
            document.getElementById('auth-modal').classList.add('active');
            const el = document.getElementById('auth-card-content');
            if(!isReg) {
                el.innerHTML = `
                    <h2 style="margin-bottom:20px;">ВХОД</h2>
                    <input type="text" id="l-log" class="premium-input" placeholder="Логин" onkeypress="if(event.key==='Enter') login()">
                    <input type="password" id="l-pas" class="premium-input" placeholder="Пароль" onkeypress="if(event.key==='Enter') login()">
                    <button class="btn-full primary" onclick="login()">Войти</button>
                    <button class="btn-full secondary" onclick="renderAuth(true)">Создать аккаунт</button>
                    <button class="btn-full secondary" style="color:var(--danger); font-size:12px; margin-top:20px;" onclick="forceReset()">Очистить кэш (если зависло)</button>
                `;
            } else {
                el.innerHTML = `
                    <h2 style="margin-bottom:20px;">РЕГИСТРАЦИЯ</h2>
                    <input type="text" id="r-name" class="premium-input" placeholder="Имя Фамилия">
                    <input type="text" id="r-log" class="premium-input" placeholder="Логин">
                    <input type="password" id="r-pas" class="premium-input" placeholder="Пароль">
                    <button class="btn-full primary" onclick="register()">Регистрация</button>
                    <button class="btn-full secondary" onclick="renderAuth(false)">Назад ко входу</button>
                `;
            }
        }

        function login() {
            const log = document.getElementById('l-log').value.trim().toLowerCase();
            const pas = document.getElementById('l-pas').value.trim();
            if(!log||!pas) return alert('Введите логин и пароль');
            
            db.ref('users').once('value').then(s => {
                const users = Object.values(s.val()||{}).filter(Boolean);
                const u = users.find(x => (x.login||'').toLowerCase()===log && (x.password===pas || x.pass===pas));
                if(u) {
                    currentUserId = u.id;
                    localStorage.setItem('hax_uid', u.id);
                    document.getElementById('auth-modal').classList.remove('active');
                    initCore();
                } else {
                    alert('Неверный логин или пароль');
                }
            }).catch(e => alert('Сбой базы данных: ' + e.message));
        }

        function register() {
            const name = document.getElementById('r-name').value.trim();
            const log = document.getElementById('r-log').value.trim().toLowerCase();
            const pas = document.getElementById('r-pas').value.trim();
            if(!name||!log||!pas) return alert('Заполните все поля');

            db.ref('users').once('value').then(s => {
                const users = Object.values(s.val()||{}).filter(Boolean);
                if(users.find(x => (x.login||'').toLowerCase()===log)) return alert('Логин уже занят');
                
                const uid = 'u_' + Date.now();
                const colors = ['#007aff', '#34c759', '#ff9500', '#af52de', '#ff2d55'];
                const c = colors[Math.floor(Math.random() * colors.length)];
                
                db.ref('users/'+uid).set({ id:uid, name:name, login:log, password:pas, color:c, status:'в сети' }).then(() => {
                    currentUserId = uid;
                    localStorage.setItem('hax_uid', uid);
                    document.getElementById('auth-modal').classList.remove('active');
                    initCore();
                });
            }).catch(e => alert('Сбой базы данных: ' + e.message));
        }

        function logout() {
            if(currentUserId) db.ref(`users/${currentUserId}/status`).setValue(Date.now());
            forceReset();
        }

        // --- ЯДРО ДАННЫХ ---
        function initCore() {
            db.ref('users').on('value', s => { allUsers = Object.values(s.val()||{}).filter(Boolean); updateUI(); });
            db.ref('groups').on('value', s => { allGroups = Object.values(s.val()||{}).filter(Boolean); updateUI(); });
            db.ref('messages').on('value', s => { 
                globalMessages = s.val()||{}; 
                updateUI(); 
                if(activeChatId) renderMessages();
            });

            db.ref('.info/connected').on('value', s => {
                if(s.val()===true && currentUserId) {
                    const r = db.ref(`users/${currentUserId}/status`);
                    r.setValue('в сети');
                    r.onDisconnect().setValue(Date.now());
                }
            });
        }

        function updateUI() {
            const me = allUsers.find(u => u.id === currentUserId);
            if(me) document.getElementById('my-avatar-anchor').innerHTML = getAvatar(me, 36);
            renderLists();
            if(activeChatId) updateChatHeader();
        }

        // --- УТИЛИТЫ ---
        function getAvatar(obj, size=48) {
            if(!obj) return '';
            const st = `width:${size}px; height:${size}px; font-size:${size*0.4}px;`;
            if(obj.img) return `<img src="${obj.img}" class="avatar-ui" style="${st}">`;
            const name = obj.name || 'ГР';
            const init = name.substring(0,2).toUpperCase();
            const bg = obj.color || 'var(--accent-gradient)';
            return `<div class="avatar-ui" style="background:${bg}; ${st}">${init}</div>`;
        }

        function getStatusText(val) {
            if(val === 'в сети') return '<span style="color:var(--success)">в сети</span>';
            if(!val || isNaN(val)) return 'был(а) недавно';
            const d = new Date(val), n = new Date();
            const t = d.toLocaleTimeString([],{hour:'2-digit', minute:'2-digit'});
            if(d.toDateString() === n.toDateString()) return `сегодня в ${t}`;
            return `${d.toLocaleDateString()} в ${t}`;
        }

        function switchTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+tab).classList.add('active');
            document.querySelectorAll('.scroller-content').forEach(c => c.classList.remove('active'));
            document.getElementById('content-'+tab).classList.add('active');
            renderLists();
        }

        function renderLists() {
            const search = document.getElementById('search-input').value.toLowerCase().trim();
            
            // Контакты
            const cRoot = document.getElementById('content-contacts'); cRoot.innerHTML = '';
            allUsers.filter(u => u.id !== currentUserId && (!search || u.name.toLowerCase().includes(search))).forEach(u => {
                const div = document.createElement('div');
                div.className = `item-row ${activeChatId===u.id?'active':''}`;
                div.onclick = () => openChat(u.id, false);
                div.innerHTML = `
                    <div style="position:relative">${getAvatar(u)}${u.status==='в сети'?'<div class="status-dot online"></div>':''}</div>
                    <div class="row-meta"><div class="row-title">${u.name}</div><div class="row-sub">${u.role||'Коллега'}</div></div>
                `;
                cRoot.appendChild(div);
            });

            // Группы
            const gRoot = document.getElementById('content-groups'); gRoot.innerHTML = '';
            allGroups.filter(g => g.members && g.members[currentUserId] && (!search || g.name.toLowerCase().includes(search))).forEach(g => {
                const div = document.createElement('div');
                div.className = `item-row ${activeChatId===g.id?'active':''}`;
                div.onclick = () => openChat(g.id, true);
                div.innerHTML = `
                    ${getAvatar(g)}
                    <div class="row-meta"><div class="row-title">${g.name}</div><div class="row-sub">${Object.keys(g.members).length} участников</div></div>
                `;
                gRoot.appendChild(div);
            });

            // Чаты
            const chRoot = document.getElementById('content-chats'); chRoot.innerHTML = '';
            let chatArr = [];
            allUsers.filter(u=>u.id!==currentUserId).forEach(u => {
                const key = [currentUserId, u.id].sort().join('_');
                const msgs = globalMessages[key];
                if(msgs) {
                    const last = Object.values(msgs).pop();
                    if(!search || u.name.toLowerCase().includes(search)) chatArr.push({id:u.id, isG:false, obj:u, last:last});
                }
            });
            chatArr.sort((a,b) => b.last.ts - a.last.ts);
            
            chatArr.forEach(c => {
                const div = document.createElement('div');
                div.className = `item-row ${activeChatId===c.id?'active':''}`;
                div.onclick = () => openChat(c.id, false);
                let txt = c.last.text || (c.last.file ? '📎 Файл' : '🎤 Голосовое');
                div.innerHTML = `
                    <div style="position:relative">${getAvatar(c.obj)}${c.obj.status==='в сети'?'<div class="status-dot online"></div>':''}</div>
                    <div class="row-meta">
                        <div class="row-title-container"><div class="row-title">${c.obj.name}</div><div class="row-time">${c.last.time||''}</div></div>
                        <div class="row-sub">${txt}</div>
                    </div>
                `;
                chRoot.appendChild(div);
            });
        }

        // --- ЧАТ ---
        function openChat(id, isG) {
            activeChatId = id; isGroupMode = isG;
            document.getElementById('empty-stub').style.display = 'none';
            document.getElementById('chat-subsystem').style.display = 'flex';
            document.getElementById('app-layout').classList.add('chat-opened');
            updateUI();
            renderMessages();
        }

        function closeChat() {
            activeChatId = null;
            document.getElementById('app-layout').classList.remove('chat-opened');
            document.getElementById('chat-subsystem').style.display = 'none';
            document.getElementById('empty-stub').style.display = 'flex';
            updateUI();
        }

        function updateChatHeader() {
            const slotActions = document.getElementById('chat-actions-slot');
            if(isGroupMode) {
                const g = allGroups.find(x => x.id === activeChatId); if(!g) return;
                document.getElementById('chat-name-slot').innerText = g.name;
                document.getElementById('chat-status-slot').innerText = `${Object.keys(g.members||{}).length} участников`;
                document.getElementById('chat-avatar-slot').innerHTML = getAvatar(g, 42);
                slotActions.innerHTML = `<button class="circle-action-btn" onclick="openEditGroup()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>`;
            } else {
                const u = allUsers.find(x => x.id === activeChatId); if(!u) return;
                document.getElementById('chat-name-slot').innerText = u.name;
                document.getElementById('chat-status-slot').innerHTML = getStatusText(u.status);
                document.getElementById('chat-avatar-slot').innerHTML = getAvatar(u, 42);
                slotActions.innerHTML = '';
            }
        }

        function renderMessages() {
            const flow = document.getElementById('messages-flow');
            flow.innerHTML = '';
            const key = isGroupMode ? activeChatId : [currentUserId, activeChatId].sort().join('_');
            const msgs = Object.values(globalMessages[key]||{});
            
            msgs.forEach(m => {
                const isMe = m.uid === currentUserId;
                const div = document.createElement('div');
                div.className = `msg-container ${isMe?'outgoing':'incoming'}`;
                
                let html = '';
                if(isGroupMode && !isMe) html += `<div style="font-size:11px; font-weight:700; color:var(--accent); margin-bottom:4px;">${m.uname}</div>`;
                
                if(m.file) {
                    if(m.file.startsWith('data:image')) html += `<img src="${m.file}" class="msg-media-preview" onclick="document.getElementById('lightbox-img').src='${m.file}'; document.getElementById('lightbox').classList.add('active');">`;
                    else html += `<a href="${m.file}" download="file" style="color:inherit; font-weight:bold;">📎 Файл</a>`;
                } else {
                    html += `<div>${m.text}</div>`;
                }
                
                html += `<div class="msg-time">${m.time}</div>`;
                div.innerHTML = `<div class="msg-bubble-main">${html}</div>`;
                flow.appendChild(div);
            });
            flow.scrollTop = flow.scrollHeight;
        }

        function sendMessage() {
            const i = document.getElementById('msg-input');
            const txt = i.value.trim();
            if(!txt && !attachFile) return;

            const key = isGroupMode ? activeChatId : [currentUserId, activeChatId].sort().join('_');
            const me = allUsers.find(u=>u.id===currentUserId);
            
            const payload = {
                uid: currentUserId, uname: me.name,
                text: txt, time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), ts: Date.now()
            };
            if(attachFile) { payload.file = attachFile; attachFile = null; document.getElementById('attach-preview').style.display='none'; }
            
            db.ref(`messages/${key}`).push(payload);
            i.value = '';
        }

        // --- ВЛОЖЕНИЯ ---
        function handleFileSelect(e) {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = ev => {
                attachFile = ev.target.result;
                document.getElementById('attach-preview').style.display = 'flex';
                document.getElementById('attach-name').innerText = f.name;
            };
            r.readAsDataURL(f);
        }
        function clearAttach() { attachFile=null; document.getElementById('attach-preview').style.display='none'; document.getElementById('file-upload').value=''; }

        // --- ГРУППЫ И ПРОФИЛЬ ---
        function openCreateGroupModal() {
            document.getElementById('new-group-name').value = '';
            const list = document.getElementById('create-group-members'); list.innerHTML = '';
            allUsers.filter(u=>u.id!==currentUserId).forEach(u => {
                list.innerHTML += `<div class="member-item"><label style="display:flex; align-items:center; gap:10px; cursor:pointer; width:100%;"><input type="checkbox" id="cgm_${u.id}"> ${getAvatar(u, 32)} ${u.name}</label></div>`;
            });
            document.getElementById('create-group-modal').classList.add('active');
        }

        function createGroup() {
            const name = document.getElementById('new-group-name').value.trim();
            if(!name) return alert('Введите имя');
            const members = {[currentUserId]:true};
            allUsers.forEach(u => { const cb = document.getElementById('cgm_'+u.id); if(cb && cb.checked) members[u.id] = true; });
            
            const r = db.ref('groups').push();
            r.set({ id:r.key, name:name, creator:currentUserId, members:members }).then(() => { closeModals(); openChat(r.key, true); });
        }

        function openEditGroup() {
            editGroupId = activeChatId;
            const g = allGroups.find(x=>x.id===editGroupId); if(!g) return;
            document.getElementById('edit-group-name').value = g.name;
            tempGroupImg = g.img || '';
            document.getElementById('edit-group-avatar-preview').innerHTML = getAvatar(g, 64);
            
            const list = document.getElementById('edit-group-members'); list.innerHTML = '';
            allUsers.filter(u=>u.id!==currentUserId).forEach(u => {
                const isM = g.members && g.members[u.id];
                list.innerHTML += `<div class="member-item"><label style="display:flex; align-items:center; gap:10px; cursor:pointer; width:100%;"><input type="checkbox" id="egm_${u.id}" ${isM?'checked':''}> ${getAvatar(u, 32)} ${u.name}</label></div>`;
            });
            document.getElementById('edit-group-modal').classList.add('active');
        }

        function handleGroupImgUpload(e) {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = ev => { tempGroupImg = ev.target.result; document.getElementById('edit-group-avatar-preview').innerHTML = `<img src="${tempGroupImg}" class="avatar-ui" style="width:64px;height:64px;">`; }; r.readAsDataURL(f);
        }

        function saveGroupSettings() {
            const n = document.getElementById('edit-group-name').value.trim(); if(!n) return;
            const m = {[currentUserId]:true};
            allUsers.forEach(u => { const cb = document.getElementById('egm_'+u.id); if(cb && cb.checked) m[u.id] = true; });
            db.ref(`groups/${editGroupId}`).update({ name:n, img:tempGroupImg, members:m }).then(closeModals);
        }

        function deleteGroup() {
            if(!confirm('Удалить?')) return;
            db.ref(`groups/${editGroupId}`).remove().then(() => { db.ref(`messages/${editGroupId}`).remove(); closeModals(); closeChat(); });
        }

        function openProfileModal() {
            const me = allUsers.find(u=>u.id===currentUserId); if(!me) return;
            document.getElementById('profile-name').value = me.name;
            document.getElementById('profile-role').value = me.role || '';
            tempProfileImg = me.img || '';
            document.getElementById('profile-avatar-preview').innerHTML = getAvatar(me, 70);
            document.getElementById('profile-modal').classList.add('active');
        }

        function handleProfileImgUpload(e) {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = ev => { tempProfileImg = ev.target.result; document.getElementById('profile-avatar-preview').innerHTML = `<img src="${tempProfileImg}" class="avatar-ui" style="width:70px;height:70px;">`; }; r.readAsDataURL(f);
        }

        function saveProfile() {
            const n = document.getElementById('profile-name').value.trim();
            const rl = document.getElementById('profile-role').value.trim();
            if(!n) return;
            db.ref(`users/${currentUserId}`).update({ name:n, role:rl, img:tempProfileImg }).then(closeModals);
        }

        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); }
    </script>
</body>
</html>
