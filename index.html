<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Connecta MESSENGER</title>
    <style>
        /* Светлая тема */
        :root {
            --bg-main: #f4f6f9;
            --panel-bg: rgba(255, 255, 255, 0.65);
            --panel-border: rgba(255, 255, 255, 0.4);
            --inner-border: rgba(0, 0, 0, 0.05);
            --text-primary: #1c1c1e;
            --text-secondary: #8e8e93;
            --accent: #007aff;
            --bubble-in: rgba(255, 255, 255, 0.85);
            --bubble-out: #007aff;
            --bubble-out-text: #ffffff;
            --shadow-premium: 0 20px 40px rgba(0, 0, 0, 0.08);
            --radius-lg: 24px;
            --radius-md: 18px;
            --danger: #ff3b30;
            --success: #34c759;
            --input-bg: #fff;
            --hover-bg: rgba(0, 0, 0, 0.05);
            --ambient-light: radial-gradient(circle, rgba(0,122,255,0.12) 0%, rgba(255,255,255,0) 70%);
        }

        /* Темная тема */
        [data-theme="dark"] {
            --bg-main: #000000;
            --panel-bg: rgba(28, 28, 30, 0.7);
            --panel-border: rgba(255, 255, 255, 0.1);
            --inner-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #98989d;
            --bubble-in: rgba(44, 44, 46, 0.85);
            --bubble-out: #0a84ff;
            --shadow-premium: 0 20px 40px rgba(0, 0, 0, 0.5);
            --input-bg: rgba(255, 255, 255, 0.1);
            --hover-bg: rgba(255, 255, 255, 0.08);
            --ambient-light: radial-gradient(circle, rgba(10,132,255,0.15) 0%, rgba(0,0,0,0) 70%);
        }

        * { 
            box-sizing: border-box;
            margin: 0; 
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; 
            -webkit-font-smoothing: antialiased; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body, html { 
            width: 100%;
            height: 100dvh; 
            background: var(--bg-main); 
            color: var(--text-primary); 
            overflow: hidden; 
            position: relative; 
            transition: background 0.3s ease, color 0.3s ease;
        }

        .ambient-glow { 
            position: absolute;
            width: 60vw; 
            height: 60vw; 
            background: var(--ambient-light); 
            top: -15vw; 
            left: -15vw; 
            z-index: 1; 
            pointer-events: none; 
            transition: background 0.3s ease;
        }

        #app-layout { 
            display: flex;
            width: 100vw; 
            height: 100dvh; 
            position: relative; 
            z-index: 2; 
            overflow: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .glass-panel { 
            background: var(--panel-bg);
            backdrop-filter: blur(25px) saturate(180%); 
            -webkit-backdrop-filter: blur(25px) saturate(180%); 
            border-right: 1px solid var(--panel-border); 
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        #sidebar-container { 
            width: 360px;
            height: 100%; 
            display: flex; 
            flex-direction: column;
            z-index: 10; 
            flex-shrink: 0; 
            transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            padding-bottom: 80px;
        }
        
        #main-chat-container { 
            flex: 1;
            height: 100%; 
            max-width: 100vw; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            z-index: 5; 
            background: transparent; 
            overflow-x: hidden;
        }

        @media (max-width: 768px) {
            #sidebar-container { 
                width: 100vw;
                position: absolute; 
                left: 0; 
                top: 0; 
                bottom: 0; 
            }
            #main-chat-container { 
                width: 100vw;
                position: absolute; 
                left: 0; 
                top: 0; 
                bottom: 0; 
                z-index: 20; 
                transform: translate3d(100%, 0, 0);
                transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1);
                background: var(--bg-main);
            }
            .chat-opened-mobile #sidebar-container { 
                transform: translate3d(-30%, 0, 0);
            }
            .chat-opened-mobile #main-chat-container { 
                transform: translate3d(0, 0, 0);
                box-shadow: -10px 0 30px rgba(0,0,0,0.1); 
            }
            .mobile-back-btn { 
                display: flex !important;
            }
            .chat-opened-mobile .floating-dock { 
                transform: translate3d(-50%, 150%, 0);
                opacity: 0; 
                pointer-events: none; 
            }
        }

        .sidebar-header { 
            padding: 20px 20px 12px;
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }
        
        .brand-title { 
            font-size: 22px; 
            font-weight: 800;
            color: var(--text-primary); 
            letter-spacing: -0.5px; 
            display: flex; 
            align-items: center; 
            gap: 8px;
        }
        
        .dev-badge { 
            font-size: 10px; 
            background: var(--hover-bg); 
            padding: 4px 6px; 
            border-radius: 6px;
            font-weight: 700; 
            color: var(--text-secondary); 
            letter-spacing: 0.5px; 
        }

        .header-actions { 
            display: flex; 
            align-items: center;
            gap: 12px; 
        }
        
        .btn-icon { 
            width: 36px; 
            height: 36px; 
            border-radius: 50%;
            background: rgba(0, 122, 255, 0.1); 
            color: var(--accent); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: none; 
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1), background 0.2s; 
        }
        
        .btn-icon:active { 
            transform: scale(0.9);
        }
        
        .btn-icon svg { 
            width: 18px; 
            height: 18px; 
            stroke-width: 2.5px;
        }

        .search-box { 
            padding: 0 20px 12px;
        }
        
        .search-inner { 
            display: flex; 
            align-items: center; 
            background: var(--hover-bg); 
            padding: 10px 14px;
            border-radius: 14px; 
        }
        
        .search-inner input { 
            border: none; 
            background: transparent; 
            outline: none;
            width: 100%; 
            margin-left: 8px; 
            color: var(--text-primary); 
            font-size: 15px; 
        }

        .tab-bar { 
            display: flex;
            padding: 0 16px 8px; 
            gap: 4px; 
            border-bottom: 1px solid var(--inner-border);
        }
        
        .tab-btn { 
            flex: 1; 
            padding: 8px; 
            border: none; 
            background: transparent; 
            color: var(--text-secondary);
            font-size: 13px; 
            font-weight: 600; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.2s ease;
        }
        
        .tab-btn.active { 
            background: var(--hover-bg); 
            color: var(--text-primary);
        }

        #ptr-wrapper { 
            overflow: hidden; 
            height: 0; 
            display: flex; 
            justify-content: center; 
            align-items: flex-end;
            transition: height 0s; 
        }
        
        .ptr-content { 
            padding-bottom: 15px; 
            display: flex; 
            align-items: center;
            gap: 8px; 
            font-size: 13px; 
            font-weight: 600; 
            color: var(--text-secondary); 
        }

        .scroller-content { 
            flex: 1;
            overflow-y: auto; 
            overflow-x: hidden; 
            padding: 8px 12px; 
            display: none; 
            position: relative; 
            z-index: 2; 
            -webkit-overflow-scrolling: touch;
        }
        
        .scroller-content.active { 
            display: block; 
            animation: fadeIn 0.2s ease;
        }
        
        @keyframes fadeIn { 
            from { 
                opacity: 0; 
                transform: translateY(5px);
            } 
            to { 
                opacity: 1; 
                transform: translateY(0); 
            } 
        }

        .item-row { 
            position: relative;
            overflow: hidden; 
            border-radius: var(--radius-md); 
            margin-bottom: 4px; 
        }
        
        .swipe-wrapper { 
            display: flex;
            width: calc(100% + 80px); 
            transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .swipe-content { 
            width: calc(100% - 80px); 
            flex-shrink: 0; 
            display: flex; 
            align-items: center;
            padding: 12px; 
            cursor: pointer; 
            border-radius: var(--radius-md); 
            transition: background 0.15s; 
        }
        
        .swipe-content:active { 
            background: var(--hover-bg);
        }
        
        .item-row.active .swipe-content { 
            background: rgba(0, 122, 255, 0.08);
        }
        
        .swipe-action { 
            width: 80px;
            flex-shrink: 0; 
            background: var(--danger); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            border-radius: var(--radius-md); 
            cursor: pointer;
        }
        
        .avatar-ui { 
            width: 50px;
            height: 50px; 
            border-radius: 50%; 
            color: white; 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 18px; 
            position: relative; 
            object-fit: cover;
            flex-shrink: 0; 
            background-size: cover; 
            background-position: center; 
        }
        
        .status-dot { 
            position: absolute; 
            bottom: 0;
            right: 0; 
            width: 14px; 
            height: 14px; 
            background: var(--text-secondary); 
            border: 2.5px solid var(--bg-main); 
            border-radius: 50%; 
            z-index: 5;
        }
        
        .status-dot.online { 
            background: var(--success);
        }

        .row-meta { 
            flex: 1; 
            margin-left: 14px; 
            min-width: 0;
        }
        
        .row-title-container { 
            display: flex; 
            justify-content: space-between; 
            align-items: baseline; 
            margin-bottom: 4px;
        }
        
        .row-title { 
            font-weight: 600; 
            font-size: 16px; 
            color: var(--text-primary); 
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis; 
        }
        
        .row-time { 
            font-size: 12px; 
            color: var(--text-secondary); 
            flex-shrink: 0;
        }
        
        .row-sub { 
            font-size: 14px; 
            color: var(--text-secondary); 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
        }

        .chat-header { 
            padding: 12px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            background: var(--panel-bg); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px); 
            border-bottom: 1px solid var(--inner-border); 
            z-index: 10;
        }
        
        .mobile-back-btn { 
            display: none; 
            background: transparent; 
            border: none; 
            color: var(--accent); 
            padding-right: 14px;
            cursor: pointer; 
        }
        
        .swipe-back-indicator { 
            position: absolute; 
            left: 0; 
            top: 0; 
            bottom: 0;
            width: 25px; 
            z-index: 100; 
        }
        
        .chat-avatar-btn { 
            cursor: pointer;
            transition: opacity 0.15s; 
        }
        
        .chat-avatar-btn:active { 
            opacity: 0.6;
        }

        .chat-messages-area { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            overflow-x: hidden; 
            display: flex;
            flex-direction: column; 
            gap: 14px; 
            -webkit-overflow-scrolling: touch; 
        }
        
        .msg-container { 
            display: flex; 
            flex-direction: column;
            max-width: 85%; 
        }
        
        .msg-container.incoming { 
            align-self: flex-start;
        }
        
        .msg-container.outgoing { 
            align-self: flex-end;
        }
        
        .msg-bubble-main { 
            padding: 12px 16px;
            border-radius: 20px; 
            font-size: 15px; 
            line-height: 1.45; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); 
            word-break: break-word; 
            overflow: hidden;
        }
        
        .incoming .msg-bubble-main { 
            background: var(--bubble-in); 
            color: var(--text-primary); 
            border-bottom-left-radius: 6px;
        }
        
        .outgoing .msg-bubble-main { 
            background: var(--bubble-out); 
            color: var(--bubble-out-text); 
            border-bottom-right-radius: 6px;
        }
        
        .msg-media-preview { 
            max-width: 100%;
            height: auto; 
            border-radius: 12px; 
            margin-bottom: 6px; 
            cursor: pointer; 
            display: block; 
            object-fit: cover;
        }
        
        .msg-time { 
            font-size: 11px; 
            margin-top: 4px; 
            opacity: 0.7; 
            text-align: right;
        }
        
        .chat-input-bar { 
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
            background: var(--panel-bg); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px); 
            border-top: 1px solid var(--inner-border); 
            display: flex; 
            align-items: center; 
            gap: 8px;
        }
        
        .chat-input-bar input[type="text"] { 
            -webkit-appearance: none;
            appearance: none; 
            flex: 1 1 auto; 
            min-width: 0; 
            height: 44px; 
            padding: 0 16px; 
            margin: 0; 
            border: 1px solid var(--inner-border);
            border-radius: 22px; 
            background: var(--input-bg); 
            color: var(--text-primary); 
            font-size: 15px; 
            outline: none; 
            transition: background 0.3s;
        }
        
        .circle-action-btn { 
            flex: 0 0 44px;
            width: 44px; 
            height: 44px; 
            margin: 0; 
            padding: 0; 
            border-radius: 50%; 
            border: none; 
            background: transparent; 
            color: var(--accent); 
            display: flex; 
            align-items: center;
            justify-content: center; 
            cursor: pointer; 
            transition: transform 0.15s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .circle-action-btn:active { 
            transform: scale(0.85); 
            background: rgba(0, 122, 255, 0.1);
        }
        
        .circle-action-btn.primary { 
            background: var(--accent); 
            color: white;
        }
        
        .circle-action-btn.primary:active { 
            background: #005bb5;
        }

        .floating-dock { 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translate3d(-50%, 0, 0);
            background: var(--panel-bg); 
            backdrop-filter: blur(35px) saturate(200%); 
            -webkit-backdrop-filter: blur(35px) saturate(200%); 
            border: 1px solid var(--panel-border); 
            border-radius: 35px;
            padding: 10px 20px; 
            z-index: 1000; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.15); 
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s;
        }
        
        .dock-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: transparent;
            border: none; 
            color: var(--text-secondary); 
            padding: 6px 16px; 
            cursor: pointer; 
            border-radius: 18px; 
            gap: 6px; 
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .dock-item:active { 
            transform: scale(0.9);
        }
        
        .dock-item:hover, .dock-item.active { 
            background: var(--hover-bg); 
            color: var(--accent);
        }
        
        .dock-item svg { 
            width: 24px; 
            height: 24px; 
            stroke-width: 2px;
        }
        
        .dock-item span { 
            font-size: 11px; 
            font-weight: 700; 
            letter-spacing: 0.5px; 
            text-transform: uppercase;
        }

        .modal-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100dvh;
            background: rgba(0,0,0,0.4); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            z-index: 2000; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            opacity: 0; 
            transition: opacity 0.3s ease;
        }
        
        .modal-overlay.active { 
            display: flex; 
            opacity: 1;
        }
        
        .modal-card { 
            width: 90%;
            max-width: 400px; 
            padding: 28px; 
            border-radius: 28px; 
            box-shadow: var(--shadow-premium); 
            background: var(--panel-bg); 
            color: var(--text-primary); 
            border: 1px solid var(--panel-border);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); 
        }
        
        .modal-overlay.active .modal-card { 
            transform: scale(1) translateY(0);
        }

        .premium-input { 
            width: 100%; 
            padding: 16px; 
            background: var(--hover-bg); 
            border: 1px solid var(--inner-border);
            border-radius: 16px; 
            color: var(--text-primary); 
            outline: none; 
            margin-bottom: 16px; 
            font-size: 16px; 
            transition: border-color 0.2s;
        }
        
        .premium-input:focus { 
            border-color: var(--accent);
        }
        
        .input-lbl { 
            font-size: 12px; 
            color: var(--text-secondary); 
            font-weight: 700; 
            display: block; 
            margin-bottom: 6px;
            letter-spacing: 0.5px; 
            text-transform: uppercase;
        }

        .btn-full { 
            width: 100%; 
            padding: 16px; 
            border-radius: 16px;
            border: none; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: transform 0.15s, background 0.2s;
        }
        
        .btn-full:active { 
            transform: scale(0.98);
        }
        
        .btn-full.primary { 
            background: var(--accent); 
            color: white;
        }
        
        .btn-full.danger { 
            background: var(--danger); 
            color: white; 
            margin-top: 10px;
        }
        
        .btn-full.secondary { 
            background: var(--hover-bg); 
            color: var(--text-primary); 
            margin-top: 10px;
        }

        .member-list { 
            max-height: 220px; 
            overflow-y: auto; 
            margin-bottom: 20px; 
            background: var(--hover-bg); 
            border-radius: 16px;
            padding: 8px; 
        }
        
        .member-item { 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            padding: 10px 8px; 
            border-bottom: 1px solid var(--inner-border); 
        }
        
        .member-item:last-child { 
            border-bottom: none;
        }
        
        .empty-state { 
            flex: 1;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: var(--text-secondary);
        }

        #lightbox { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100dvh;
            background: rgba(0,0,0,0.95); 
            z-index: 3000; 
            display: none; 
            align-items: center; 
            justify-content: center;
        }
        
        #lightbox.active { 
            display: flex;
        }
        
        #lightbox img { 
            max-width: 95%; 
            max-height: 90%; 
            border-radius: 16px; 
            object-fit: contain;
        }

        .toggle-switch { 
            position: relative; 
            width: 50px; 
            height: 30px; 
            background: var(--hover-bg); 
            border-radius: 15px;
            cursor: pointer; 
            transition: background 0.3s; 
            border: 1px solid var(--inner-border); 
        }
        
        .toggle-switch.active { 
            background: var(--success);
            border-color: var(--success); 
        }
        
        .toggle-knob { 
            position: absolute; 
            top: 2px; 
            left: 2px; 
            width: 24px;
            height: 24px; 
            background: white; 
            border-radius: 50%; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
            transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .toggle-switch.active .toggle-knob { 
            transform: translateX(20px);
        }

        #toast-container { 
            position: fixed; 
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 9999;
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            pointer-events: none; 
            width: 90%; 
            max-width: 360px;
        }
        
        .in-app-toast { 
            background: rgba(255,255,255,0.85); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px); 
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.15); 
            padding: 14px 18px; 
            color: #1c1c1e; 
            display: flex; 
            align-items: center; 
            gap: 12px;
            animation: slideToastDown 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards; 
            pointer-events: auto;
        }
        
        [data-theme="dark"] .in-app-toast { 
            background: rgba(30,30,30,0.85); 
            color: #fff; 
            border-color: rgba(255,255,255,0.1);
        }
        
        .toast-icon { 
            width: 40px;
            height: 40px; 
            border-radius: 50%; 
            background: var(--accent); 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-shrink: 0; 
            font-weight: bold; 
            font-size: 16px;
        }
        
        .toast-text { 
            flex: 1; 
            min-width: 0;
        }
        
        @keyframes slideToastDown { 
            from { 
                transform: translate3d(0, -100%, 0);
                opacity: 0; 
            } 
            to { 
                transform: translate3d(0, 0, 0); 
                opacity: 1;
            } 
        }
        
        @keyframes slideToastUp { 
            from { 
                transform: translate3d(0, 0, 0); 
                opacity: 1;
            } 
            to { 
                transform: translate3d(0, -120%, 0); 
                opacity: 0; 
            } 
        }

        .profile-view-header { 
            display: flex;
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            padding-bottom: 24px;
        }

        @keyframes spin { 
            100% { 
                transform: rotate(360deg); 
            } 
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>
    <div id="toast-container"></div>
    <div id="lightbox" onclick="this.classList.remove('active')"><img id="lightbox-img" src="" alt="Фото"></div>

    <div id="auth-modal" class="modal-overlay active" style="z-index: 9999;">
        <div class="modal-card" id="auth-card-content">
            <h3 style="text-align:center; display:flex; flex-direction:column; align-items:center; gap:16px;">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const APP_START_TIME = Date.now();
        const storage = {
            get: (key) => { try { return localStorage.getItem(key); } catch(e) { return null; } },
            set: (key, val) => { try { localStorage.setItem(key, val); } catch(e) {} },
            remove: (key) => { try { localStorage.removeItem(key); } catch(e) {} }
        };

        const firebaseConfig = {
            apiKey: "AIzaSyCUbD08gGbhrkGIGgsIzHTEWeNMTTU_efY",
            authDomain: "yw-83b3e.firebaseapp.com",
            databaseURL: "https://yw-83b3e-default-rtdb.firebaseio.com",
            projectId: "yw-83b3e",
            storageBucket: "yw-83b3e.firebasestorage.app",
            messagingSenderId: "513977614231",
            appId: "1:513977614231:web:0a04427784e8259fdeced2",
            measurementId: "G-H4YJ6NC4E9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let currentUserId = null;
        let allUsers = [];
        let allGroups = [];
        let myChats = {};
        let currentChatMessages = {};
        
        let activeTab = 'chats';
        let activeChatId = null;
        let activeChatRealKey = null;
        let isGroupMode = false;
        let tempProfileImg = "";
        let tempGroupImg = "";
        let editGroupId = null;
        let attachFile = null;

        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let peerConnection = null;
        let localStream = null;
        let callAudioMuted = false;
        const rtcConfig = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        let uiRenderTimer = null;
        let notificationsEnabled = storage.get('notifications_enabled') !== 'false';

        window.onload = () => {
            initTheme();
            setupMobileSwipeBack();
            setupTabSwiping();
            setupPullToRefresh();

            const loadingTimeout = setTimeout(() => {
                const modal = document.getElementById('auth-card-content');
                if (document.getElementById('auth-modal').classList.contains('active')) {
                    modal.innerHTML = `<h3 style="text-align:center;color:red">Ошибка загрузки системы</h3><button class="btn-full primary" onclick="location.reload()">Перезагрузить</button>`;
                }
            }, 10000);

            auth.onAuthStateChanged(user => {
                clearTimeout(loadingTimeout);
                if (user) {
                    currentUserId = user.uid;
                    document.getElementById('auth-modal').classList.remove('active');
                    initCore();
                } else {
                    renderAuth(false);
                }
            });
        };

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function initTheme() {
            if(storage.get('collage_theme') === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
                updateThemeIcon(true);
            }
        }

        function toggleTheme() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            if(isDark) {
                document.body.removeAttribute('data-theme');
                storage.set('collage_theme', 'light');
                updateThemeIcon(false);
            } else {
                document.body.setAttribute('data-theme', 'dark');
                storage.set('collage_theme', 'dark');
                updateThemeIcon(true);
            }
        }

        function updateThemeIcon(isDark) {
            const btn = document.getElementById('theme-toggle-btn');
            if(isDark) btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
            else btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
        }

        function goHome() { closeModals(); closeChat(); }
        function openAppSettings() { closeModals(); updateSettingsUI(); document.getElementById('app-settings-modal').classList.add('active'); }

        function showInAppToast(title, body) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'in-app-toast';
            toast.innerHTML = `<div class="toast-icon">${title.substring(0,1).toUpperCase()}</div><div class="toast-text"><div style="font-weight:700; font-size:15px; margin-bottom:2px;">${escapeHTML(title)}</div><div>${escapeHTML(body)}</div></div>`;
            container.appendChild(toast);
            if(navigator.vibrate) { try { navigator.vibrate([100]); } catch(e){} }
            setTimeout(() => {
                toast.style.animation = 'slideToastUp 0.35s cubic-bezier(0.25, 1, 0.5, 1) forwards';
                setTimeout(() => toast.remove(), 350);
            }, 3000);
        }

        function updateSettingsUI() {
            const toggle = document.getElementById('notif-toggle');
            if (notificationsEnabled) toggle.classList.add('active');
            else toggle.classList.remove('active');
        }

        function toggleNotifications() {
            if (!notificationsEnabled) {
                notificationsEnabled = true;
                storage.set('notifications_enabled', 'true');
                if (window.Notification && Notification.permission !== "granted") Notification.requestPermission();
                showInAppToast("Уведомления", "Уведомления включены");
            } else {
                notificationsEnabled = false;
                storage.set('notifications_enabled', 'false');
                showInAppToast("Уведомления", "Уведомления выключены");
            }
            updateSettingsUI();
        }

        function notifyNewMessage(senderName, text) {
            if (!notificationsEnabled) return;
            showInAppToast(senderName || "Новое сообщение", text);
            if (window.Notification && Notification.permission === "granted" && document.hidden) {
                new Notification(senderName || "Новое сообщение", { body: text });
            }
        }

        function setupMobileSwipeBack() {
            let startX = 0;
            const chatContainer = document.getElementById('main-chat-container');
            const zone = document.getElementById('mobile-swipe-zone'); 
            zone.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive: true});
            chatContainer.addEventListener('touchend', e => {
                if(startX === 0) return;
                if(e.changedTouches[0].clientX - startX > 80 && startX < 40) { closeChat(); }
                startX = 0;
            }, {passive: true});
        }

        function setupTabSwiping() {
            let startX = 0, startY = 0, isHorizontalSwipe = null;
            const sidebar = document.getElementById('sidebar-container');
            
            sidebar.addEventListener('touchstart', e => {
                if (e.target.closest('.item-row')) { isHorizontalSwipe = false; return; } 
                isHorizontalSwipe = null; startX = e.touches[0].clientX; startY = e.touches[0].clientY;
            }, {passive: true});
            sidebar.addEventListener('touchmove', e => {
                if(isHorizontalSwipe === null) isHorizontalSwipe = Math.abs(startX - e.touches[0].clientX) > Math.abs(startY - e.touches[0].clientY);
            }, {passive: true});
            sidebar.addEventListener('touchend', e => {
                if (!isHorizontalSwipe || startX === 0) return;
                const diffX = startX - e.changedTouches[0].clientX;
                if (Math.abs(diffX) > 60) {
                    const tabs = ['chats', 'groups', 'contacts'];
                    const currentIndex = tabs.indexOf(activeTab);
                    if (diffX > 0 && currentIndex < tabs.length - 1) switchTab(tabs[currentIndex + 1]);
                    else if (diffX < 0 && currentIndex > 0) switchTab(tabs[currentIndex - 1]);
                }
                startX = 0;
            }, {passive: true});
        }

        function setupPullToRefresh() {
            let startY = 0, currentY = 0, isRefreshing = false;
            const wrapper = document.getElementById('ptr-wrapper');
            const indicator = document.getElementById('ptr-indicator');
            const scrollers = document.querySelectorAll('.scroller-content');
            scrollers.forEach(scroller => {
                scroller.addEventListener('touchstart', e => {
                    if (scroller.scrollTop <= 0 && !isRefreshing) startY = e.touches[0].clientY;
                }, {passive: true});
                scroller.addEventListener('touchmove', e => {
                    if (startY === 0 || isRefreshing) return;
                    const diff = e.touches[0].clientY - startY;
                    if (diff > 0 && scroller.scrollTop <= 0) {
                        currentY = Math.min(diff / 2.5, 60); 
                        wrapper.style.height = `${currentY}px`;
                        if(currentY > 50) indicator.innerHTML = '↑ Отпустите для обновления';
                        else indicator.innerHTML = '↓ Потяните для обновления';
                    }
                }, {passive: true});
                scroller.addEventListener('touchend', e => {
                    if (currentY >= 50 && !isRefreshing) {
                        isRefreshing = true;
                        indicator.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" style="animation: spin 1s linear infinite;"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>';
                        wrapper.style.transition = 'height 0.3s ease';
                        wrapper.style.height = '40px';
                        forceDataRefresh(() => {
                            wrapper.style.height = '0px';
                            setTimeout(() => {
                                isRefreshing = false; 
                                wrapper.style.transition = 'height 0s';
                                indicator.innerHTML = '↓ Потяните для обновления';
                            }, 300);
                        });
                    } else if(currentY > 0) {
                        wrapper.style.transition = 'height 0.3s ease';
                        wrapper.style.height = '0px';
                        setTimeout(() => { wrapper.style.transition = 'height 0s'; }, 300);
                    }
                    startY = 0;
                    currentY = 0;
                }, {passive: true});
            });
        }

        function forceDataRefresh(callback) {
            db.ref('users').off();
            db.ref('groups').off(); 
            db.ref(`user_chats/${currentUserId}`).off();
            initCore();
            setTimeout(() => { if(callback) callback(); }, 600);
        }

        function renderAuth(isReg) {
            document.getElementById('auth-modal').classList.add('active');
            const el = document.getElementById('auth-card-content');
            if(!isReg) {
                el.innerHTML = `<h2 style="margin-bottom:24px; text-align:center;">ВХОД</h2><input type="email" id="l-email" class="premium-input" placeholder="Email" onkeypress="if(event.key==='Enter') login()"><input type="password" id="l-pas" class="premium-input" placeholder="Пароль" onkeypress="if(event.key==='Enter') login()"><button class="btn-full primary" onclick="login()">Войти</button><button class="btn-full secondary" onclick="renderAuth(true)">Создать аккаунт</button>`;
            } else {
                el.innerHTML = `<h2 style="margin-bottom:24px; text-align:center;">РЕГИСТРАЦИЯ</h2><input type="text" id="r-name" class="premium-input" placeholder="Имя Фамилия" onkeypress="if(event.key==='Enter') register()"><input type="email" id="r-email" class="premium-input" placeholder="Email" onkeypress="if(event.key==='Enter') register()"><input type="password" id="r-pas" class="premium-input" placeholder="Пароль" onkeypress="if(event.key==='Enter') register()"><button class="btn-full primary" onclick="register()">Зарегистрироваться</button><button class="btn-full secondary" onclick="renderAuth(false)">Уже есть аккаунт</button>`;
            }
        }

        function login() {
            const email = document.getElementById('l-email').value.trim();
            const pas = document.getElementById('l-pas').value.trim();
            if(!email||!pas) return alert('Введите данные');
            auth.signInWithEmailAndPassword(email, pas).catch(err => alert('Ошибка входа: ' + err.message));
        }

        function register() {
            const name = document.getElementById('r-name').value.trim();
            const email = document.getElementById('r-email').value.trim(); 
            const pas = document.getElementById('r-pas').value.trim();
            if(!name||!email||!pas) return alert('Заполните все поля');
            auth.createUserWithEmailAndPassword(email, pas).then((cred) => {
                const uid = cred.user.uid;
                const colors = ['#007aff', '#34c759', '#ff9500', '#af52de', '#ff2d55']; 
                const c = colors[Math.floor(Math.random() * colors.length)];
                db.ref('users/'+uid).set({ id:uid, name:name, email:email, color:c, status:'в сети' });
            }).catch(err => alert('Ошибка регистрации: ' + err.message));
        }

        function logout() {
            if(currentUserId) {
                db.ref(`users/${currentUserId}/status`).setValue(null).then(() => {
                    auth.signOut().then(() => { 
                        localStorage.clear(); 
                        window.location.reload(); 
                    });
                }).catch(() => {
                    auth.signOut().then(() => { 
                        localStorage.clear(); 
                        window.location.reload(); 
                    });
                });
            } else { 
                localStorage.clear(); 
                window.location.reload(); 
            }
        }

        function initCore() {
            db.ref('users').on('value', s => {
                const data = s.val() || {};
                allUsers = Object.keys(data).map(key => ({ id: key, ...data[key], name: data[key].name || 'Пользователь', img: data[key].img || '' }));
                updateUI();
            });
            db.ref('groups').on('value', s => {
                const data = s.val() || {};
                allGroups = Object.keys(data).map(key => ({ id: key, ...data[key], name: data[key].name || 'Команда', img: data[key].img || '' }));
                updateUI();
            });
            db.ref(`user_chats/${currentUserId}`).on('value', s => { 
                const newData = s.val()||{};
                for(let key in newData) {
                    const chatInfo = newData[key];
                    if (chatInfo.ts > APP_START_TIME && (!myChats[key] || chatInfo.ts > myChats[key].ts)) {
                        if (chatInfo.senderUid !== currentUserId && chatInfo.senderUid !== 'system') {
                            notifyNewMessage(chatInfo.senderName, chatInfo.lastMsg);
                        }
                    }
                }
                myChats = newData; 
                updateUI(); 
            });
            db.ref('.info/connected').on('value', s => {
                if(s.val()===true && currentUserId) {
                    const r = db.ref(`users/${currentUserId}/status`);
                    r.setValue('в сети'); 
                    r.onDisconnect().setValue(Date.now());
                }
            });
            listenForCalls();
        }
