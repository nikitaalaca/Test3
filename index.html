<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>КОЛЛАЖ КОНЕКТ — ФИНАЛЬНАЯ СБОРКА</title>
    <style>
        :root {
            --bg-main: #f5f7fa;
            --panel-bg: rgba(255, 255, 255, 0.45);
            --panel-border: rgba(255, 255, 255, 0.6);
            --inner-border: rgba(0, 0, 0, 0.06);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent: #0071e3;
            --accent-gradient: linear-gradient(135deg, #0071e3 0%, #34aadc 100%);
            --bubble-in: rgba(255, 255, 255, 0.8);
            --bubble-out: #0071e3;
            --bubble-out-text: #ffffff;
            --shadow-premium: 0 20px 50px rgba(0, 0, 0, 0.05);
            --shadow-smooth: 0 8px 32px rgba(31, 38, 135, 0.07);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --spring-transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --smooth-transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            --sidebar-width: 360px;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            -webkit-font-smoothing: antialiased; 
        }
        
        body, html { 
            width: 100%; 
            height: 100%; 
            background: var(--bg-main); 
            color: var(--text-primary); 
            overflow: hidden; 
            position: relative;
        }

        .ambient-glow { 
            position: absolute; 
            width: 600px; 
            height: 600px;
            background: radial-gradient(circle, rgba(0,113,227,0.12) 0%, rgba(52,170,220,0) 70%); 
            top: -200px; 
            left: -200px; 
            z-index: 1; 
            pointer-events: none; 
            animation: floatGlow 12s infinite alternate ease-in-out;
            will-change: transform;
        }
        
        @keyframes floatGlow { 
            0% { transform: translate(0, 0) scale(1); } 
            100% { transform: translate(60px, 40px) scale(1.1); } 
        }

        #app-layout { 
            display: flex; 
            width: 100vw; 
            height: 100vh; 
            position: relative; 
            z-index: 2; 
            overflow: hidden;
        }
        
        .glass-panel { 
            background: var(--panel-bg); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px); 
            border: 1px solid var(--panel-border);
            box-shadow: var(--shadow-smooth); 
            will-change: backdrop-filter;
        }

        #sidebar-container { 
            width: var(--sidebar-width); 
            height: 100%; 
            display: flex; 
            flex-direction: column;
            z-index: 10; 
            flex-shrink: 0; 
            transition: var(--smooth-transition); 
        }
        
        #main-chat-container { 
            flex: 1; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            z-index: 5; 
            border-left: 1px solid var(--inner-border);
        }

        .sidebar-header { 
            padding: 24px 20px 16px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }
        
        .brand-title { 
            font-size: 22px; 
            font-weight: 800; 
            background: var(--accent-gradient); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            letter-spacing: -0.5px; 
        }
        
        .search-box { padding: 0 16px 16px; }
        .search-inner { 
            display: flex; 
            align-items: center; 
            background: rgba(0,0,0,0.04); 
            padding: 10px 14px;
            border-radius: var(--radius-sm); 
            border: 1px solid transparent; 
            transition: var(--smooth-transition); 
        }
        .search-inner:focus-within { 
            background: rgba(255,255,255,0.8);
            border-color: rgba(0,113,227,0.3); 
        }
        .search-inner input { 
            border: none; 
            background: transparent; 
            outline: none; 
            width: 100%; 
            margin-left: 8px; 
            color: var(--text-primary); 
            font-size: 14px;
        }

        .tab-bar { 
            display: flex; 
            padding: 0 16px 12px; 
            gap: 4px;
            border-bottom: 1px solid var(--inner-border); 
        }
        .tab-btn { 
            flex: 1; 
            padding: 8px 4px; 
            border: none;
            background: transparent; 
            color: var(--text-secondary); 
            font-size: 13px; 
            font-weight: 600; 
            border-radius: var(--radius-sm); 
            cursor: pointer; 
            transition: var(--smooth-transition);
        }
        .tab-btn.active { 
            background: rgba(0,113,227,0.08); 
            color: var(--accent);
        }

        .scroller-content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px 16px; 
            display: none;
        }
        .scroller-content.active { display: block; }

        .item-row { 
            display: flex; 
            align-items: center; 
            padding: 12px; 
            border-radius: var(--radius-md); 
            cursor: pointer; 
            transition: var(--smooth-transition); 
            margin-bottom: 4px; 
            border: 1px solid transparent;
            position: relative;
        }
        .item-row:hover { 
            background: rgba(255,255,255,0.5); 
            transform: translateY(-1px); 
        }
        .item-row.active { 
            background: rgba(255,255,255,0.85); 
            border-color: rgba(0,113,227,0.12); 
        }
        
        .avatar-ui { 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            color: white; 
            font-weight: 700; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        }

        .row-meta { 
            flex: 1; 
            margin-left: 12px; 
            min-width: 0; 
        }
        .row-title { 
            font-weight: 600; 
            font-size: 14.5px; 
            color: var(--text-primary); 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .row-sub { 
            font-size: 12.5px; 
            color: var(--text-secondary); 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
            margin-top: 2px; 
        }

        .badge-unread {
            background: var(--accent);
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        .chat-header { 
            padding: 16px 24px; 
            display: flex; 
            align-items: center;
            justify-content: space-between; 
            border-bottom: 1px solid var(--inner-border); 
        }
        
        .chat-messages-area { 
            flex: 1; 
            padding: 24px;
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
        }

        .msg-container { 
            display: flex; 
            flex-direction: column; 
            max-width: 75%; 
            position: relative;
        }
        .msg-container.incoming { align-self: flex-start; }
        .msg-container.outgoing { align-self: flex-end; }
        
        .msg-bubble-main { 
            padding: 12px 16px;
            border-radius: var(--radius-md); 
            font-size: 14.5px; 
            line-height: 1.4; 
            box-shadow: var(--shadow-premium); 
            word-break: break-word; 
            cursor: pointer;
            transition: var(--smooth-transition);
        }
        .incoming .msg-bubble-main { 
            background: var(--bubble-in); 
            color: var(--text-primary); 
            border-top-left-radius: 4px;
            border: 1px solid var(--panel-border); 
        }
        .outgoing .msg-bubble-main { 
            background: var(--accent-gradient); 
            color: var(--bubble-out-text);
            border-top-right-radius: 4px; 
        }

        .msg-meta-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
            font-size: 10px;
            opacity: 0.6;
        }
        
        /* Панель опций сообщения */
        .msg-options-panel {
            display: none;
            gap: 6px;
            margin-top: 6px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--panel-border);
            padding: 6px;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-smooth);
        }
        .msg-options-panel.active {
            display: flex;
            flex-wrap: wrap;
        }
        .opt-btn {
            background: rgba(0,0,0,0.04);
            border: none;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-primary);
            transition: var(--smooth-transition);
        }
        .opt-btn:hover { background: rgba(0,0,0,0.08); }
        .opt-btn.danger { color: #ff3b30; }

        /* Контейнер реакций */
        .reactions-flow {
            display: flex;
            gap: 4px;
            margin-top: 4px;
            flex-wrap: wrap;
        }
        .reaction-pill {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid var(--panel-border);
            padding: 2px 6px;
            font-size: 10px;
            font-weight: 700;
            border-radius: 8px;
            color: var(--text-primary);
        }
        .outgoing .reaction-pill {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border-color: rgba(255, 255, 255, 0.3);
        }

        .chat-input-bar { 
            padding: 16px 24px;
            border-top: 1px solid var(--inner-border); 
            display: flex; 
            align-items: center; 
            gap: 12px;
        }
        .chat-input-bar input[type="text"] { 
            flex: 1; 
            padding: 12px 16px; 
            border: 1px solid transparent;
            border-radius: var(--radius-md); 
            background: rgba(0,0,0,0.04); 
            color: var(--text-primary); 
            font-size: 14.5px; 
            outline: none; 
            transition: var(--smooth-transition);
        }
        .chat-input-bar input[type="text"]:focus { 
            background: rgba(255,255,255,0.9); 
            border-color: rgba(0,113,227,0.2); 
        }
        
        .circle-action-btn { 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            border: none; 
            background: rgba(0,0,0,0.04); 
            color: var(--text-primary); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: var(--spring-transition); 
        }
        .circle-action-btn:hover { transform: scale(1.05); }
        .circle-action-btn.primary { 
            background: var(--accent-gradient); 
            color: white; 
        }

        /* Системные Модальные Окна */
        .modal-layer {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-layer.active { display: flex; }
        .modal-card {
            width: 90%;
            max-width: 400px;
            background: rgba(255,255,255,0.85);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-premium);
        }
        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 14px;
            letter-spacing: -0.3px;
        }

        .premium-input { 
            width: 100%; 
            padding: 12px;
            background: rgba(0,0,0,0.04); 
            border: 1px solid transparent; 
            border-radius: var(--radius-sm); 
            color: var(--text-primary); 
            outline: none; 
            margin-bottom: 12px; 
            font-size: 14.5px; 
        }
        .premium-input:focus { background: white; border-color: var(--accent); }

        .sys-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--inner-border);
        }
        .sys-label { font-size: 14px; font-weight: 500; }
        
        .member-list-scroller {
            max-height: 160px;
            overflow-y: auto;
            margin-bottom: 14px;
            background: rgba(0,0,0,0.02);
            border-radius: var(--radius-sm);
            padding: 6px;
        }

        .member-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            font-size: 13px;
        }

        .text-action-link {
            color: var(--accent);
            cursor: pointer;
            font-weight: 600;
        }
        .text-action-link.danger { color: #ff3b30; }

        .empty-stub { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: var(--text-secondary); 
            text-align: center; 
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <div id="auth-screen-layer" class="modal-layer active">
        <div class="modal-card" id="auth-main-card-node">
            <h2 class="modal-title">ВХОД</h2>
            <input type="text" id="f-login" class="premium-input" placeholder="Логин">
            <input type="password" id="f-pass" class="premium-input" placeholder="Пароль">
            <button class="premium-input primary" style="background:var(--accent-gradient); color:white; font-weight:600; border:none; cursor:pointer;" onclick="executeLoginFlow()">Войти</button>
            <div style="text-align:center; font-size:13px; color:var(--accent); cursor:pointer;" onclick="toggleAuthModeRegister(true)">Создать новый аккаунт</div>
        </div>
    </div>

    <div id="modal-create-group" class="modal-layer" onclick="closeGroupCreationModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3 class="modal-title">Создание группы</h3>
            <input type="text" id="new-group-name-input" class="premium-input" placeholder="Название группы">
            <button class="premium-input primary" style="background:var(--accent-gradient); color:white; font-weight:600; border:none; cursor:pointer;" onclick="submitCreateGroupPipeline()">Создать команду</button>
        </div>
    </div>

    <div id="modal-manage-group" class="modal-layer" onclick="closeGroupManagementModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3 class="modal-title" id="manage-group-title">Управление группой</h3>
            
            <div style="font-size:11px; font-weight:700; color:var(--text-secondary); margin-bottom:6px;">ТЕКУЩИЕ УЧАСТНИКИ</div>
            <div class="member-list-scroller" id="group-current-members-list"></div>

            <div style="font-size:11px; font-weight:700; color:var(--text-secondary); margin-bottom:6px;">ДОБАВИТЬ КОЛЛЕГ</div>
            <div class="member-list-scroller" id="group-available-colleagues-list"></div>

            <button class="premium-input" style="background:#ff3b30; color:white; font-weight:600; border:none; cursor:pointer; margin-top:8px;" onclick="pipelineDeleteCurrentGroup()">Удалить группу полностью</button>
        </div>
    </div>

    <div id="app-layout">
        <aside id="sidebar-container" class="glass-panel">
            <div class="sidebar-header">
                <span class="brand-title">HAX MAX</span>
                <div id="developer-tag" style="font-size: 10px; font-weight: 700; color: var(--text-secondary); letter-spacing: 1px;">EGORKIN</div>
            </div>
            
            <nav class="tab-bar">
                <button class="tab-btn active" id="tab-btn-chats" onclick="switchSidebarTab('chats')">Чаты</button>
                <button class="tab-btn" id="tab-btn-contacts" onclick="switchSidebarTab('contacts')">Коллеги</button>
                <button class="tab-btn" id="tab-btn-settings" onclick="switchSidebarTab('settings')">Настройки</button>
            </nav>

            <div id="tab-content-chats" class="scroller-content active">
                <button class="premium-input" style="background:rgba(0,113,227,0.08); border:1px dashed rgba(0,113,227,0.3); color:var(--accent); font-weight:600; cursor:pointer; margin-bottom:10px;" onclick="openGroupCreationModal()">Создать группу</button>
                <div id="chats-render-target"></div>
            </div>
            
            <div id="tab-content-contacts" class="scroller-content">
                <div id="contacts-render-target"></div>
            </div>
            
            <div id="tab-content-settings" class="scroller-content">
                <div style="padding:4px 0;">
                    <div class="sys-row">
                        <span class="sys-label">Интеграция уведомлений</span>
                        <span class="text-action-link" onclick="triggerSystemNotificationCheck()">Тест</span>
                    </div>
                    <div class="sys-row">
                        <span class="sys-label">Локальный кэш</span>
                        <span class="text-action-link danger" onclick="clearApplicationLocalCache()">Очистить</span>
                    </div>
                    <div class="sys-row" style="margin-top:20px; border-bottom:none;">
                        <button class="premium-input" style="background:#ff3b30; color:white; border:none; font-weight:600; cursor:pointer;" onclick="executeSystemLogout()">Выйти из профиля</button>
                    </div>
                </div>
            </div>
        </aside>

        <main id="main-chat-container" class="glass-panel">
            <div id="active-chat-subsystem" style="display:none; flex-direction:column; height:100%;">
                <header class="chat-header">
                    <div style="display:flex; align-items:center; min-width:0;">
                        <div id="active-chat-avatar-slot"></div>
                        <div style="margin-left:12px; min-width:0;">
                            <div class="row-title" id="active-chat-name-target">...</div>
                            <div class="row-sub" id="active-chat-status-target">...</div>
                        </div>
                    </div>
                    <div id="group-management-header-action" style="display:none;">
                        <span class="text-action-link" onclick="openGroupManagementModal()">Управление группой</span>
                    </div>
                </header>

                <div class="chat-messages-area" id="chat-messages-flow-root"></div>

                <footer class="chat-input-bar">
                    <input type="text" id="chat-core-input-field" placeholder="Новое сообщение..." onkeypress="if(event.key==='Enter') dispatchMessagePacket()">
                    <button class="circle-action-btn primary" onclick="dispatchMessagePacket()">➔</button>
                </footer>
            </div>

            <div id="empty-chat-stub-layer" class="empty-stub">
                <h3 style="font-weight:600; color:var(--text-secondary); font-size:15px;">Выберите диалог для начала общения</h3>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // Инициализация Firebase с оригинальной конфигурацией
        const firebaseConfig = {
            apiKey: "AIzaSyCUbD08gGbhrkGIGgsIZhTEWNTTU_efY",
            authDomain: "yw-83b3e.firebaseapp.com",
            databaseURL: "https://yw-83b3e-default-rtdb.firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Системные переменные состояния
        let currentUserId = localStorage.getItem('hax_uid') || null;
        let activeTab = 'chats';
        let activeChatTargetId = null;
        let isGroupChatMode = false;
        
        let allUsers = [];
        let allGroups = [];
        let globalMessagesCache = {};
        let unreadCounters = {};
        let activeMessageListenerRef = null;

        window.addEventListener('DOMContentLoaded', () => {
            if (currentUserId) {
                document.getElementById('auth-screen-layer').classList.remove('active');
                initializeCoreSyncEcosystem();
            } else {
                toggleAuthModeRegister(false);
            }
        });

        function toggleAuthModeRegister(isReg) {
            const container = document.getElementById('auth-main-card-node');
            if (!isReg) {
                container.innerHTML = `
                    <h2 class="modal-title">ВХОД</h2>
                    <input type="text" id="f-login" class="premium-input" placeholder="Логин">
                    <input type="password" id="f-pass" class="premium-input" placeholder="Пароль">
                    <button class="premium-input primary" style="background:var(--accent-gradient); color:white; font-weight:600; border:none; cursor:pointer;" onclick="executeLoginFlow()">Войти</button>
                    <div style="text-align:center; font-size:13px; color:var(--accent); cursor:pointer; margin-top:10px;" onclick="toggleAuthModeRegister(true)">Создать новый аккаунт</div>
                `;
            } else {
                container.innerHTML = `
                    <h2 class="modal-title">РЕГИСТРАЦИЯ</h2>
                    <input type="text" id="f-reg-name" class="premium-input" placeholder="Имя и Фамилия">
                    <input type="text" id="f-login" class="premium-input" placeholder="Придумайте логин">
                    <input type="password" id="f-pass" class="premium-input" placeholder="Придумайте пароль">
                    <button class="premium-input primary" style="background:var(--accent-gradient); color:white; font-weight:600; border:none; cursor:pointer;" onclick="executeRegisterFlow()">Зарегистрироваться</button>
                    <div style="text-align:center; font-size:13px; color:var(--accent); cursor:pointer; margin-top:10px;" onclick="toggleAuthModeRegister(false)">Уже есть аккаунт? Войти</div>
                `;
            }
        }

        function executeLoginFlow() {
            const log = document.getElementById('f-login').value.trim();
            const pas = document.getElementById('f-pass').value.trim();
            if(!log || !pas) return;

            database.ref('users').once('value', (snap) => {
                const users = snap.val() || {};
                const found = Object.values(users).find(u => u.login === log && u.password === pas);
                if(found) {
                    currentUserId = found.id;
                    localStorage.setItem('hax_uid', currentUserId);
                    document.getElementById('auth-screen-layer').classList.remove('active');
                    initializeCoreSyncEcosystem();
                } else {
                    alert("Неверные учетные данные.");
                }
            });
        }

        function executeRegisterFlow() {
            const name = document.getElementById('f-reg-name').value.trim();
            const log = document.getElementById('f-login').value.trim();
            const pas = document.getElementById('f-pass').value.trim();
            if(!name || !log || !pas) return;

            const colors = ['#0071e3', '#34c759', '#ff9500', '#af52de', '#ff2d55'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            const newUid = 'usr_' + Date.now();

            const userNode = {
                id: newUid,
                name: name,
                login: log,
                password: pas,
                color: randomColor,
                status: 'В сети'
            };

            database.ref('users/' + newUid).set(userNode, (err) => {
                if(!err) {
                    currentUserId = newUid;
                    localStorage.setItem('hax_uid', currentUserId);
                    document.getElementById('auth-screen-layer').classList.remove('active');
                    initializeCoreSyncEcosystem();
                }
            });
        }

        function initializeCoreSyncEcosystem() {
            // Синхронизация пользователей
            database.ref('users').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                allUsers = Object.values(data);
                renderInterfaceContainers();
            });

            // Синхронизация групп
            database.ref('groups').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                allGroups = Object.values(data);
                renderInterfaceContainers();
            });

            // Глобальное прослушивание изменений сообщений для счетчиков и сниппетов
            database.ref('messages').on('value', (snapshot) => {
                globalMessagesCache = snapshot.val() || {};
                calculateUnreadIndicators();
                renderInterfaceContainers();
            });
        }

        function calculateUnreadIndicators() {
            // Упрощенная стабильная бизнес-логика счетчиков непрочитанных во время сессии
            Object.keys(globalMessagesCache).forEach(chatKey => {
                if (chatKey === currentActiveChatKey()) {
                    unreadCounters[chatKey] = 0;
                    return;
                }
                const msgs = Object.values(globalMessagesCache[chatKey] || {});
                if(msgs.length > 0) {
                    const lastMsg = msgs[msgs.length - 1];
                    if(lastMsg.senderId !== currentUserId) {
                        unreadCounters[chatKey] = 1; // Маркер наличия свежего входящего сообщения
                    }
                }
            });
        }

        function currentActiveChatKey() {
            if (!activeChatTargetId) return null;
            if (isGroupChatMode) return activeChatTargetId;
            return [currentUserId, activeChatTargetId].sort().join('__');
        }

        function switchSidebarTab(target) {
            activeTab = target;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-btn-' + target).classList.add('active');
            
            document.getElementById('tab-content-chats').className = "scroller-content" + (target === 'chats' ? " active" : "");
            document.getElementById('tab-content-contacts').className = "scroller-content" + (target === 'contacts' ? " active" : "");
            document.getElementById('tab-content-settings').className = "scroller-content" + (target === 'settings' ? " active" : "");
            
            renderInterfaceContainers();
        }

        function renderInterfaceContainers() {
            if (activeTab === 'chats') renderChatsTabProcessor();
            if (activeTab === 'contacts') renderContactsTabProcessor();
        }

        function renderChatsTabProcessor() {
            const root = document.getElementById('chats-render-target');
            root.innerHTML = '';

            // 1. Сначала выводим группы, в которых состоит пользователь
            const myGroups = allGroups.filter(g => g.members && g.members[currentUserId]);
            myGroups.forEach(g => {
                const chatKey = g.id;
                const msgs = Object.values(globalMessagesCache[chatKey] || {});
                let snippet = "Нет сообщений";
                if(msgs.length > 0) {
                    const last = msgs[msgs.length - 1];
                    snippet = (last.text || "Файл").substring(0, 30);
                }
                
                const count = unreadCounters[chatKey] || 0;
                const isActive = (activeChatTargetId === g.id && isGroupChatMode);

                const row = document.createElement('div');
                row.className = `item-row ${isActive ? 'active' : ''}`;
                row.onclick = () => selectActiveConversation(g.id, true);
                
                row.innerHTML = `
                    <div class="avatar-ui" style="background:#8e8e93;">ГР</div>
                    <div class="row-meta">
                        <div class="row-title"><span>${g.name}</span> ${count > 0 ? `<span class="badge-unread">${count}</span>` : ''}</div>
                        <div class="row-sub">${snippet}</div>
                    </div>
                `;
                root.appendChild(row);
            });

            // 2. Затем выводим личные активные чаты
            allUsers.filter(u => u.id !== currentUserId).forEach(u => {
                const chatKey = [currentUserId, u.id].sort().join('__');
                if (!globalMessagesCache[chatKey]) return; // Показываем только активные диалоги в этой вкладке

                const msgs = Object.values(globalMessagesCache[chatKey] || {});
                let snippet = "Нет сообщений";
                if(msgs.length > 0) {
                    const last = msgs[msgs.length - 1];
                    snippet = (last.text || "Файл").substring(0, 30);
                }

                const count = unreadCounters[chatKey] || 0;
                const isActive = (activeChatTargetId === u.id && !isGroupChatMode);

                const row = document.createElement('div');
                row.className = `item-row ${isActive ? 'active' : ''}`;
                row.onclick = () => selectActiveConversation(u.id, false);

                row.innerHTML = `
                    <div class="avatar-ui" style="background:${u.color};">${u.name.substring(0,2).toUpperCase()}</div>
                    <div class="row-meta">
                        <div class="row-title"><span>${u.name}</span> ${count > 0 ? `<span class="badge-unread">${count}</span>` : ''}</div>
                        <div class="row-sub">${snippet}</div>
                    </div>
                `;
                root.appendChild(row);
            });
        }

        function renderContactsTabProcessor() {
            const root = document.getElementById('contacts-render-target');
            root.innerHTML = '';

            allUsers.filter(u => u.id !== currentUserId).forEach(u => {
                const isActive = (activeChatTargetId === u.id && !isGroupChatMode);
                const row = document.createElement('div');
                row.className = `item-row ${isActive ? 'active' : ''}`;
                row.onclick = () => selectActiveConversation(u.id, false);

                row.innerHTML = `
                    <div class="avatar-ui" style="background:${u.color};">${u.name.substring(0,2).toUpperCase()}</div>
                    <div class="row-meta">
                        <div class="row-title">${u.name}</div>
                        <div class="row-sub">${u.status || 'Коллега'}</div>
                    </div>
                `;
                root.appendChild(row);
            });
        }

        function selectActiveConversation(targetId, isGroup) {
            activeChatTargetId = targetId;
            isGroupChatMode = isGroup;

            document.getElementById('empty-chat-stub-layer').style.display = 'none';
            document.getElementById('active-chat-subsystem').style.display = 'flex';

            const chatKey = currentActiveChatKey();
            unreadCounters[chatKey] = 0; // Сброс счетчика при открытии

            if (activeMessageListenerRef) {
                activeMessageListenerRef.off();
            }

            // Переключение интерфейсных блоков заголовка
            if (isGroupChatMode) {
                document.getElementById('group-management-header-action').style.display = 'block';
                const group = allGroups.find(g => g.id === targetId);
                document.getElementById('active-chat-name-target').innerText = group ? group.name : "Группа";
                document.getElementById('active-chat-status-target').innerText = "Командный чат";
                document.getElementById('active-chat-avatar-slot').innerHTML = `<div class="avatar-ui" style="background:#8e8e93;">ГР</div>`;
            } else {
                document.getElementById('group-management-header-action').style.display = 'none';
                const user = allUsers.find(u => u.id === targetId);
                document.getElementById('active-chat-name-target').innerText = user ? user.name : "Пользователь";
                document.getElementById('active-chat-status-target').innerText = user ? user.status : "В сети";
                document.getElementById('active-chat-avatar-slot').innerHTML = `<div class="avatar-ui" style="background:${user?.color};">${user?.name.substring(0,2).toUpperCase()}</div>`;
            }

            // Вешаем изолированное слушание сообщений для текущего открытого чата
            activeMessageListenerRef = database.ref('messages/' + chatKey);
            activeMessageListenerRef.on('value', (snapshot) => {
                renderMessagesStream(snapshot.val() || {});
            });

            renderInterfaceContainers();
        }

        function renderMessagesStream(messagesObj) {
            const flow = document.getElementById('chat-messages-flow-root');
            flow.innerHTML = '';

            Object.keys(messagesObj).forEach(msgId => {
                const m = messagesObj[msgId];
                const isOwn = m.senderId === currentUserId;

                const container = document.createElement('div');
                container.className = `msg-container ${isOwn ? 'outgoing' : 'incoming'}`;

                // Парсинг реакций
                let reactionsHTML = '';
                if (m.reactions) {
                    const summary = {};
                    Object.values(m.reactions).forEach(rText => {
                        summary[rText] = (summary[rText] || 0) + 1;
                    });
                    reactionsHTML = `<div class="reactions-flow">`;
                    Object.keys(summary).forEach(text => {
                        reactionsHTML += `<div class="reaction-pill">${text} ${summary[text]}</div>`;
                    });
                    reactionsHTML += `</div>`;
                }

                // Сборка контейнера опций управления (Удаление / Реакции)
                const optionsPanelHTML = `
                    <div class="msg-options-panel" id="opt-${msgId}">
                        <button class="opt-btn" onclick="submitMessageReaction('${msgId}', 'ВАЖНО')">ВАЖНО</button>
                        <button class="opt-btn" onclick="submitMessageReaction('${msgId}', 'ПЛЮС')">ПЛЮС</button>
                        <button class="opt-btn" onclick="submitMessageReaction('${msgId}', 'ОК')">ОК</button>
                        ${isOwn ? `<button class="opt-btn danger" onclick="pipelineDeleteMessage('${msgId}')">Удалить</button>` : ''}
                    </div>
                `;

                container.innerHTML = `
                    <div class="msg-bubble-main" onclick="toggleMessageOptionsOverlay('${msgId}')">
                        <div>${m.text || ''}</div>
                        ${reactionsHTML}
                        <div class="msg-meta-line">
                            <span>${m.senderId === currentUserId ? 'Вы' : (allUsers.find(u=>u.id===m.senderId)?.name || 'Коллега')}</span>
                            <span>${m.time || ''}</span>
                        </div>
                    </div>
                    ${optionsPanelHTML}
                `;

                flow.appendChild(container);
            });

            flow.scrollTop = flow.scrollHeight;
        }

        function toggleMessageOptionsOverlay(msgId) {
            const el = document.getElementById('opt-' + msgId);
            if(el) {
                const current = el.classList.contains('active');
                document.querySelectorAll('.msg-options-panel').forEach(p => p.classList.remove('active'));
                if(!current) el.classList.add('active');
            }
        }

        function submitMessageReaction(msgId, reactionText) {
            const chatKey = currentActiveChatKey();
            database.ref('messages/' + chatKey + '/' + msgId + '/reactions/' + currentUserId).set(reactionText);
        }

        function pipelineDeleteMessage(msgId) {
            const chatKey = currentActiveChatKey();
            database.ref('messages/' + chatKey + '/' + msgId).remove();
        }

        function dispatchMessagePacket() {
            const input = document.getElementById('chat-core-input-field');
            const txt = input.value.trim();
            if(!txt || !activeChatTargetId) return;

            const chatKey = currentActiveChatKey();
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            const msgNode = {
                senderId: currentUserId,
                text: txt,
                time: time
            };

            database.ref('messages/' + chatKey).push(msgNode);
            input.value = '';
        }

        // Логика создания групп
        function openGroupCreationModal() { document.getElementById('modal-create-group').classList.add('active'); }
        function closeGroupCreationModal() { document.getElementById('modal-create-group').classList.remove('active'); }

        function submitCreateGroupPipeline() {
            const input = document.getElementById('new-group-name-input');
            const name = input.value.trim();
            if(!name) return;

            const gId = 'grp_' + Date.now();
            const membersNode = {};
            membersNode[currentUserId] = true; // Автоматически добавляем создателя

            const groupData = {
                id: gId,
                name: name,
                creatorId: currentUserId,
                members: membersNode
            };

            database.ref('groups/' + gId).set(groupData, (err) => {
                if(!err) {
                    input.value = '';
                    closeGroupCreationModal();
                    selectActiveConversation(gId, true);
                }
            });
        }

        // Логика редактирования и управления группами (Добавление / Удаление участников)
        function openGroupManagementModal() {
            if(!isGroupChatMode || !activeChatTargetId) return;
            document.getElementById('modal-manage-group').classList.add('active');
            
            const group = allGroups.find(g => g.id === activeChatTargetId);
            document.getElementById('manage-group-title').innerText = group ? group.name : "Управление";

            const currentMembersList = document.getElementById('group-current-members-list');
            const availableColleaguesList = document.getElementById('group-available-colleagues-list');
            
            currentMembersList.innerHTML = '';
            availableColleaguesList.innerHTML = '';

            allUsers.forEach(u => {
                const isMember = group && group.members && group.members[u.id];
                
                const div = document.createElement('div');
                div.className = 'member-item';
                
                if (isMember) {
                    div.innerHTML = `
                        <span>${u.name}</span>
                        ${u.id !== group.creatorId ? `<span class="text-action-link danger" onclick="pipelineRemoveUserFromGroup('${u.id}')">Исключить</span>` : '<span style="font-size:11px; opacity:0.5;">Владелец</span>'}
                    `;
                    currentMembersList.appendChild(div);
                } else {
                    div.innerHTML = `
                        <span>${u.name}</span>
                        <span class="text-action-link" onclick="pipelineAddUserToGroup('${u.id}')">Добавить</span>
                    `;
                    availableColleaguesList.appendChild(div);
                }
            });
        }

        function closeGroupManagementModal() { document.getElementById('modal-manage-group').classList.remove('active'); }

        function pipelineAddUserToGroup(userId) {
            if(!activeChatTargetId) return;
            database.ref('groups/' + activeChatTargetId + '/members/' + userId).set(true, () => {
                openGroupManagementModal(); // Обновляем списки в модальном окне
            });
        }

        function pipelineRemoveUserFromGroup(userId) {
            if(!activeChatTargetId) return;
            database.ref('groups/' + activeChatTargetId + '/members/' + userId).remove(() => {
                if(userId === currentUserId) {
                    // Если пользователь исключил сам себя, закрываем чат
                    closeGroupManagementModal();
                    exitActiveChatInterfaceStub();
                } else {
                    openGroupManagementModal();
                }
            });
        }

        function pipelineDeleteCurrentGroup() {
            if(!activeChatTargetId || !confirm("Вы уверены, что хотите полностью удалить эту группу?")) return;
            const target = activeChatTargetId;
            exitActiveChatInterfaceStub();
            closeGroupManagementModal();
            
            database.ref('groups/' + target).remove();
            database.ref('messages/' + target).remove(); // Каскадное удаление переписки группы
        }

        function exitActiveChatInterfaceStub() {
            activeChatTargetId = null;
            document.getElementById('active-chat-subsystem').style.display = 'none';
            document.getElementById('empty-chat-stub-layer').style.display = 'flex';
            if (activeMessageListenerRef) activeMessageListenerRef.off();
            renderInterfaceContainers();
        }

        // Раздел управления настройками
        function triggerSystemNotificationCheck() {
            if (!("Notification" in window)) {
                alert("Системные уведомления не поддерживаются текущим веб-браузером.");
                return;
            }
            if (Notification.permission === "granted") {
                new Notification("HAX MAX", { body: "Уведомления успешно подключены и работают стабильно." });
            } else if (Notification.permission !== "denied") {
                Notification.requestPermission().then(p => {
                    if (p === "granted") {
                        new Notification("HAX MAX", { body: "Доступ предоставлен." });
                    }
                });
            } else {
                alert("Доступ к уведомлениям заблокирован в настройках вашего браузера.");
            }
        }

        function clearApplicationLocalCache() {
            localStorage.clear();
            alert("Локальный кэш приложения успешно очищен.");
            location.reload();
        }

        function executeSystemLogout() {
            localStorage.removeItem('hax_uid');
            location.reload();
        }
    </script>
</body>
</html>
