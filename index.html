<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Collage Premium Ecosystem</title>
    <style>
        :root {
            --bg-main: #f5f7fa;
            --panel-bg: rgba(255, 255, 255, 0.45);
            --panel-border: rgba(255, 255, 255, 0.6);
            --inner-border: rgba(0, 0, 0, 0.06);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent: #0071e3;
            --accent-gradient: linear-gradient(135deg, #0071e3 0%, #34aadc 100%);
            --bubble-in: rgba(255, 255, 255, 0.8);
            --bubble-out: #0071e3;
            --bubble-out-text: #ffffff;
            --shadow-premium: 0 20px 50px rgba(0, 0, 0, 0.05);
            --shadow-smooth: 0 8px 32px rgba(31, 38, 135, 0.04);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --spring-transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --smooth-transition: all 0.25s ease;
            --sidebar-width: 360px;
            --base-font-size: 15px;
        }

        body.theme-dark-glass {
            --bg-main: #0a0a0c;
            --panel-bg: rgba(20, 20, 25, 0.6);
            --panel-border: rgba(255, 255, 255, 0.06);
            --inner-border: rgba(255, 255, 255, 0.06);
            --text-primary: #f5f5f7;
            --text-secondary: #8e8e93;
            --bubble-in: rgba(28, 28, 32, 0.7);
            --shadow-premium: 0 25px 60px rgba(0, 0, 0, 0.4);
        }

        body.theme-cyber-neon {
            --bg-main: #040209;
            --panel-bg: rgba(10, 5, 20, 0.75);
            --panel-border: rgba(0, 255, 204, 0.15);
            --inner-border: rgba(188, 0, 221, 0.2);
            --text-primary: #39ff14;
            --text-secondary: #bc00dd;
            --accent: #00ffcc;
            --accent-gradient: linear-gradient(135deg, #00ffcc 0%, #bc00dd 100%);
            --bubble-in: rgba(18, 10, 36, 0.7);
            --bubble-out: #bc00dd;
            --bubble-out-text: #040209;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
        body, html { width: 100%; height: 100%; background: var(--bg-main); color: var(--text-primary); overflow: hidden; position: relative; transition: background 0.3s ease; }

        #ptr-indicator { position: absolute; top: -60px; left: 0; width: 100%; height: 60px; display: flex; align-items: center; justify-content: center; z-index: 999; pointer-events: none; transition: transform 0.2s ease, opacity 0.2s ease; opacity: 0; }
        .ptr-spinner { width: 24px; height: 24px; border: 2.5px solid var(--text-secondary); border-top-color: var(--accent); border-radius: 50%; animation: ptrRotate 0.6s linear infinite; }
        @keyframes ptrRotate { to { transform: rotate(360deg); } }

        .ambient-glow { position: absolute; width: 700px; height: 700px; background: radial-gradient(circle, rgba(0,113,227,0.08) 0%, rgba(52,170,220,0) 70%); top: -250px; left: -250px; z-index: 1; pointer-events: none; }
        
        #app-layout { display: flex; width: 100vw; height: 100vh; height: 100dvh; position: relative; z-index: 2; overflow: hidden; }
        .glass-panel { background: var(--panel-bg); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid var(--panel-border); }

        #sidebar-container { width: var(--sidebar-width); height: 100%; display: flex; flex-direction: column; z-index: 10; flex-shrink: 0; }
        #main-chat-container { flex: 1; height: 100%; display: flex; flex-direction: column; position: relative; z-index: 5; border-left: 1px solid var(--inner-border); }

        @media (max-width: 768px) {
            #sidebar-container { width: 100vw; position: absolute; left: 0; top: 0; bottom: 0; z-index: 10; transform: translateX(0); transition: var(--spring-transition); }
            #main-chat-container { width: 100vw; position: absolute; left: 0; top: 0; bottom: 0; z-index: 20; transform: translateX(100vw); transition: var(--spring-transition); }
            #app-layout.chat-opened #sidebar-container { transform: translateX(-30vw); filter: blur(8px); opacity: 0.5; }
            #app-layout.chat-opened #main-chat-container { transform: translateX(0); }
            .mobile-back-btn { display: flex !important; }
        }

        .sidebar-header { padding: 24px 24px 16px; display: flex; align-items: center; justify-content: space-between; }
        .brand-title { font-size: 26px; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.8px; }
        .header-actions { display: flex; gap: 10px; }
        
        .search-box { padding: 0 24px 16px; }
        .search-inner { display: flex; align-items: center; background: rgba(0,0,0,0.04); padding: 12px 16px; border-radius: var(--radius-sm); border: 1px solid transparent; transition: var(--smooth-transition); }
        body.theme-dark-glass .search-inner { background: rgba(255,255,255,0.04); }
        .search-inner:focus-within { background: rgba(255,255,255,0.06); border-color: rgba(0,113,227,0.3); }
        .search-inner input { border: none; background: transparent; outline: none; width: 100%; margin-left: 10px; color: var(--text-primary); font-size: 15px; }

        .tab-bar { display: flex; padding: 0 24px 12px; gap: 8px; border-bottom: 1px solid var(--inner-border); }
        .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-secondary); font-size: 14px; font-weight: 700; border-radius: var(--radius-sm); cursor: pointer; transition: var(--smooth-transition); }
        .tab-btn.active { background: rgba(0,113,227,0.08); color: var(--accent); }

        .scroller-content { flex: 1; overflow-y: auto; padding: 12px 16px; display: none; }
        .scroller-content.active { display: block; }

        .item-row { display: flex; align-items: center; padding: 14px; border-radius: var(--radius-md); cursor: pointer; transition: var(--smooth-transition); margin-bottom: 6px; border: 1px solid transparent; }
        .item-row:hover { background: rgba(255,255,255,0.03); transform: translateY(-1px); }
        .item-row.active { background: rgba(255,255,255,0.06); border-color: rgba(0,113,227,0.12); }
        
        .avatar-ui { width: 48px; height: 48px; border-radius: 50%; color: white; font-weight: 700; display: flex; align-items: center; justify-content: center; font-size: 15px; position: relative; flex-shrink: 0; }

        .row-meta { flex: 1; margin-left: 14px; min-width: 0; }
        .row-title { font-weight: 600; font-size: 16px; color: var(--text-primary); letter-spacing: -0.2px; }
        .row-sub { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 3px; }

        .chat-header { padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--inner-border); }
        .chat-messages-area { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }

        .msg-container { display: flex; flex-direction: column; max-width: 68%; animation: springIn 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes springIn { from { opacity: 0; transform: translateY(12px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .msg-container.incoming { align-self: flex-start; }
        .msg-container.outgoing { align-self: flex-end; }
        
        .msg-bubble-main { padding: 12px 18px; border-radius: var(--radius-md); font-size: var(--base-font-size); line-height: 1.5; word-break: break-word; }
        .incoming .msg-bubble-main { background: var(--bubble-in); color: var(--text-primary); border-top-left-radius: 4px; border: 1px solid var(--panel-border); }
        .outgoing .msg-bubble-main { background: var(--bubble-out); background-image: var(--accent-gradient); color: var(--bubble-out-text); border-top-right-radius: 4px; }
        .msg-time { font-size: 10px; margin-top: 5px; opacity: 0.5; text-align: right; }

        .chat-input-bar { padding: 16px 24px calc(16px + env(safe-area-inset-bottom)); border-top: 1px solid var(--inner-border); display: flex; flex-direction: column; gap: 10px; }
        .input-row-container { display: flex; align-items: center; gap: 12px; }
        .chat-input-bar input[type="text"] { flex: 1; padding: 14px 18px; border: 1px solid transparent; border-radius: var(--radius-md); background: rgba(0,0,0,0.04); color: var(--text-primary); font-size: var(--base-font-size); outline: none; transition: var(--smooth-transition); }
        body.theme-dark-glass .chat-input-bar input[type="text"] { background: rgba(255,255,255,0.04); }
        .chat-input-bar input[type="text"]:focus { background: rgba(255,255,255,0.06); border-color: rgba(0,113,227,0.2); }
        
        .circle-action-btn { width: 42px; height: 42px; border-radius: 50%; border: none; background: rgba(0,0,0,0.04); color: var(--text-primary); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: var(--smooth-transition); }
        body.theme-dark-glass .circle-action-btn { background: rgba(255,255,255,0.04); }
        .circle-action-btn:hover { background: rgba(255,255,255,0.08); transform: scale(1.04); }
        .circle-action-btn.primary { background: var(--accent); background-image: var(--accent-gradient); color: white; }
        .mobile-back-btn { display: none; background: transparent; border: none; color: var(--accent); padding-right: 12px; cursor: pointer; }

        /* ЭКОСИСТЕМА МОДАЛЬНЫХ ОКОН (PREMIUM GLASSMORPHISM) */
        .universal-modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.3); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 850; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.25s ease; }
        .universal-modal-overlay.active { display: flex; opacity: 1; }
        .premium-popup-card { width: 90%; max-width: 400px; background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: var(--radius-lg); padding: 28px; box-shadow: var(--shadow-premium); transform: scale(0.94); transition: var(--spring-transition); }
        .universal-modal-overlay.active .premium-popup-card { transform: scale(1); }

        .modal-headline { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
        .modal-paragraph { color: var(--text-secondary); font-size: 14px; margin-bottom: 20px; line-height: 1.4; }
        
        .premium-input { width: 100%; padding: 14px; background: rgba(0,0,0,0.04); border: 1px solid transparent; border-radius: var(--radius-sm); color: var(--text-primary); outline: none; margin-bottom: 16px; font-size: 15px; }
        body.theme-dark-glass .premium-input { background: rgba(255,255,255,0.04); }
        .premium-input:focus { border-color: var(--accent); }

        .popup-action-row { display: flex; gap: 12px; margin-top: 20px; }
        .popup-btn { flex: 1; padding: 14px; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 700; cursor: pointer; transition: var(--smooth-transition); text-align: center; }
        .popup-btn.cancel { background: rgba(0,0,0,0.04); color: var(--text-primary); }
        body.theme-dark-glass .popup-btn.cancel { background: rgba(255,255,255,0.04); }
        .popup-btn.confirm { background: var(--accent); background-image: var(--accent-gradient); color: white; }

        .member-selection-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--inner-border); }

        .fullscreen-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-main); z-index: 999; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        .fullscreen-overlay.active { opacity: 1; pointer-events: auto; }
        .auth-card { width: 92%; max-width: 420px; padding: 32px; border-radius: var(--radius-lg); box-shadow: var(--shadow-premium); background: var(--panel-bg); backdrop-filter: blur(40px); border: 1px solid var(--panel-border); }
        
        .empty-chat-stub { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); text-align: center; }

        #video-call-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #09090b; z-index: 900; display: none; flex-direction: column; justify-content: space-between; }
        #video-call-overlay.active { display: flex; }
        .remote-video-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .local-video-frame { position: absolute; top: calc(20px + env(safe-area-inset-top)); right: 20px; width: 120px; height: 180px; object-fit: cover; z-index: 5; border-radius: var(--radius-md); border: 2px solid rgba(255,255,255,0.25); }
        .call-controls-bar { position: absolute; bottom: calc(40px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 20px; background: rgba(255,255,255,0.15); padding: 14px 28px; border-radius: 40px; backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.2); }
        .call-btn { width: 56px; height: 56px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; }
        .call-btn.hangup { background: #ff3b30; }
        .call-btn.toggle { background: rgba(255,255,255,0.2); font-weight: 600; font-size: 13px; }
        
        #incoming-call-modal { position: fixed; top: calc(20px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%) translateY(-180%); width: 92%; max-width: 420px; background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: var(--radius-lg); box-shadow: var(--shadow-premium); z-index: 950; padding: 20px; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(30px); transition: var(--spring-transition); }
        #incoming-call-modal.active { transform: translateX(-50%) translateY(0); }
        .inc-btn { border: none; padding: 10px 20px; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; color: white; }
        .inc-btn.accept { background: #34c759; }
        .inc-btn.decline { background: #ff3b30; }
    </style>
</head>
<body class="theme-dark-glass">

    <div id="ptr-indicator"><div class="ptr-spinner"></div></div>
    <div class="ambient-glow"></div>

    <div id="auth-screen-layer" class="fullscreen-overlay active">
        <div class="auth-card" id="auth-main-card-node"></div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО: СОЗДАНИЕ КОМАНДНОГО ЧАТА (Вместо prompt) -->
    <div id="modal-create-group" class="universal-modal-overlay" onclick="closeCustomModal('modal-create-group')">
        <div class="premium-popup-card" onclick="event.stopPropagation()">
            <div class="modal-headline">Новая команда</div>
            <div class="modal-paragraph">Введите название пространства для совместной работы сотрудников.</div>
            <input type="text" id="new-group-name-input" class="premium-input" placeholder="Название команды">
            <div class="popup-action-row">
                <button class="popup-btn cancel" onclick="closeCustomModal('modal-create-group')">Отмена</button>
                <button class="popup-btn confirm" onclick="finalizeGroupCreationDB()">Создать</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО: ДОБАВЛЕНИЕ ЛЮДЕЙ В КОМАНДУ -->
    <div id="modal-add-members" class="universal-modal-overlay" onclick="closeCustomModal('modal-add-members')">
        <div class="premium-popup-card" onclick="event.stopPropagation()">
            <div class="modal-headline">Добавить коллег</div>
            <div class="modal-paragraph">Выберите сотрудников для включения в рабочую группу чата.</div>
            <div id="members-inclusion-list" style="max-height: 240px; overflow-y: auto; margin-bottom: 10px;"></div>
            <div class="popup-action-row">
                <button class="popup-btn cancel" onclick="closeCustomModal('modal-add-members')">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО: ПРОСМОТР КАРТОЧКИ/ПРОФИЛЯ ПОЛЬЗОВАТЕЛЯ -->
    <div id="modal-view-profile" class="universal-modal-overlay" onclick="closeCustomModal('modal-view-profile')">
        <div class="premium-popup-card" onclick="event.stopPropagation()" style="text-align: center;">
            <div id="profile-card-avatar-target" style="display: flex; justify-content: center; margin-bottom: 16px;"></div>
            <div class="modal-headline" id="profile-card-name-target" style="margin-bottom: 4px;">...</div>
            <div class="modal-paragraph" id="profile-card-role-target" style="margin-bottom: 20px; font-weight: 600; color: var(--accent);">...</div>
            <div style="border-top: 1px solid var(--inner-border); padding-top: 16px; display: flex; gap: 10px;">
                <button class="popup-btn confirm" style="width: 100%;" onclick="closeCustomModal('modal-view-profile')">Закрыть карточку</button>
            </div>
        </div>
    </div>

    <!-- ЕДИНАЯ СИСТЕМА НАСТРОЕК СОБСТВЕННОГО ПРОФИЛЯ -->
    <div id="settings-modal-overlay" class="universal-modal-overlay" onclick="closeCustomModal('settings-modal-overlay')">
        <div class="premium-popup-card" onclick="event.stopPropagation()" style="max-width: 460px;">
            <div style="display: flex; gap: 6px; margin-bottom: 20px; border-bottom: 1px solid var(--inner-border); padding-bottom: 8px;">
                <button class="tab-btn active" id="set-tab-prof" onclick="switchSettingsTab('profile')">Профиль</button>
                <button class="tab-btn" id="set-tab-view" onclick="switchSettingsTab('view')">Внешний вид</button>
            </div>

            <div id="set-block-profile" style="display: block;">
                <input type="text" id="settings-name-input" class="premium-input" placeholder="Ваше имя">
                <input type="text" id="settings-role-input" class="premium-input" placeholder="Отдел / Должность">
            </div>

            <div id="set-block-view" style="display: none;">
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
                    <label style="font-size:14px; font-weight:600;">Тема</label>
                    <select id="ui-theme-selector" class="premium-input" style="width:180px; margin-bottom:0;" onchange="applySelectedThemeEngine(this.value)">
                        <option value="theme-dark-glass">Тёмный глянец</option>
                        <option value="theme-light-premium">Светлый минимализм</option>
                        <option value="theme-cyber-neon">Кибер-неон</option>
                    </select>
                </div>
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
                    <label style="font-size:14px; font-weight:600;">Акцент</label>
                    <input type="color" id="ui-accent-picker" value="#0071e3" style="border:none; width:44px; height:32px; background:transparent; cursor:pointer;" oninput="applyDynamicAccentColor(this.value)">
                </div>
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
                    <label style="font-size:14px; font-weight:600;">Шрифт</label>
                    <input type="range" id="ui-font-slider" min="13" max="19" value="15" style="width:150px;" oninput="applyDynamicFontSize(this.value)">
                </div>
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
                    <label style="font-size:14px; font-weight:600;">Уведомления</label>
                    <input type="checkbox" id="ui-notification-toggle" style="width:20px; height:20px; cursor:pointer;" onchange="toggleWebNotificationsSystem(this)">
                </div>
            </div>

            <button class="popup-btn confirm" style="width:100%; margin-top:16px;" onclick="saveProfileSettingsChanges()">Сохранить</button>
            <button class="tab-btn" style="width:100%; margin-top:12px; color:#ff3b30; font-weight: 700;" onclick="executeLogoutSystem()">Выйти</button>
        </div>
    </div>

    <!-- ОКНО ВИДЕОЗВОНКА -->
    <div id="video-call-overlay">
        <video id="remote-video-node" class="remote-video-frame" autoplay playsinline></video>
        <video id="local-video-node" class="local-video-frame" autoplay playsinline muted></video>
        <div class="call-controls-bar">
            <button class="call-btn toggle" onclick="toggleLocalVideoMute()" id="call-cam-toggle">CAM</button>
            <button class="call-btn hangup" onclick="endCurrentActiveCallSession()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transform: rotate(135deg);"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
            </button>
        </div>
    </div>

    <!-- ВХОДЯЩИЙ ЗВОНОК -->
    <div id="incoming-call-modal">
        <div>
            <div style="font-weight:700; font-size:16px; color:var(--text-primary);" id="incoming-caller-name">Вызов...</div>
            <div style="font-size:12px; color:var(--text-secondary); margin-top:2px; font-weight: 500;">Входящий видеовызов</div>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="inc-btn decline" onclick="declineIncomingCallSession()">Отклонить</button>
            <button class="inc-btn accept" onclick="acceptIncomingCallSession()">Ответить</button>
        </div>
    </div>

    <!-- ОСНОВНАЯ СЕТКА ПРИЛОЖЕНИЯ -->
    <div id="app-layout">
        <aside id="sidebar-container" class="glass-panel">
            <div class="sidebar-header">
                <span class="brand-title">Коллаж</span>
                <div class="header-actions">
                    <button class="circle-action-btn" onclick="openCustomModal('modal-create-group')" title="Создать команду">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                    <div id="my-avatar-anchor" style="cursor:pointer;" onclick="openProfileSettingsModal()" title="Профиль"></div>
                </div>
            </div>
            <div class="search-box">
                <div class="search-inner">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="global-search-input" placeholder="Поиск..." oninput="triggerLocalSearchFilter()">
                </div>
            </div>
            <nav class="tab-bar">

        function setupSwipeToRefreshEngine() {
            const layout = document.getElementById('app-layout');
            const ptr = document.getElementById('ptr-indicator');
            const activationThreshold = 65;

            window.addEventListener('touchstart', (e) => {
                const scroller = document.querySelector('.scroller-content.active');
                if (scroller && scroller.scrollTop === 0) {
                    touchStartClientY = e.touches[0].clientY;
                    isPTRActivePull = true;
                }
            }, { passive: true });

            window.addEventListener('touchmove', (e) => {
                if (!isPTRActivePull) return;
                const pullDelta = e.touches[0].clientY - touchStartClientY;
                if (pullDelta > 0) {
                    const damping = Math.min(pullDelta * 0.4, 100);
                    ptr.style.opacity = Math.min(damping / activationThreshold, 1);
                    ptr.style.transform = `translateY(${damping}px)`;
                    layout.style.transform = `translateY(${damping}px)`;
                }
            }, { passive: true });

            window.addEventListener('touchend', async () => {
                if (!isPTRActivePull) return;
                isPTRActivePull = false;
                ptr.style.transform = 'translateY(0)';
                ptr.style.opacity = '0';
                layout.style.transform = 'none';
                await database.ref('/').once('value');
            });
        }

        // =========================================================================

        function executeAddUserToGroupDB(userId) {
            if (!activeChatTargetId) return;
            database.ref(`groups/${activeChatTargetId}/members/${userId}`).set(true).then(() => {
                openAddMembersModal(); // Обновляем список исключений внутри модалки

        // =========================================================================
        // 🪪 ПРОСМОТР КАРТОЧЕК ПРОФИЛЕЙ
        // =========================================================================
        function showUserProfileCard(userId) {
            const target = allUsers.find(u => u.id === userId);
            if (!target) return;

            document.getElementById('profile-card-avatar-target').innerHTML = `
                <div class="avatar-ui" style="background:${target.color}; width:72px; height:72px; font-size:24px; box-shadow:var(--shadow-premium);">${target.name.substring(0,2).toUpperCase()}</div>

            document.getElementById('profile-card-name-target').innerText = target.name;
            document.getElementById('profile-card-role-target').innerText = target.role;

            openCustomModal('modal-view-profile');
        }

        function resolveChatDatabasePath(targetId) {
            if (targetId.startsWith('group_')) return 'group_messages/' + targetId;
            return 'messages/' + [currentUserId, targetId].sort().join('__');
        }

        // =========================================================================
        // 🔔 СИСТЕМНЫЕ УВЕДОМЛЕНИЯ
        // =========================================================================
        let isPushObserverActive = false;
        function setupGlobalMessagesPushObserver() {
            if (isPushObserverActive || !currentUserId || !isSystemPushEnabled) return;
            isPushObserverActive = true;

            database.ref('messages').on('child_changed', (snapshot) => triggerPushNotificationParser(snapshot.val()));
            database.ref('group_messages').on('child_changed', (snapshot) => triggerPushNotificationParser(snapshot.val()));
        }

        function triggerPushNotificationParser(chatNode) {
            if (!document.hidden || !isSystemPushEnabled) return;
            const packets = Object.values(chatNode || {});
            if (packets.length === 0) return;

            const last = packets[packets.length - 1];
            if (last.senderId === currentUserId) return;

            const sender = allUsers.find(u => u.id === last.senderId);
            new Notification(sender ? sender.name : "Коллега", { body: last.text || "Отправил файл..." });
        }

        function toggleWebNotificationsSystem(checkbox) {
            if (checkbox.checked) {
                Notification.requestPermission().then(p => {
                    isSystemPushEnabled = (p === 'granted');
                    checkbox.checked = isSystemPushEnabled;
                    localStorage.setItem('premium_push_state', isSystemPushEnabled ? 'true' : 'false');
                    if (isSystemPushEnabled) setupGlobalMessagesPushObserver();
                });
            } else {
                isSystemPushEnabled = false;
                localStorage.setItem('premium_push_state', 'false');
            }
        }

        // =========================================================================
        // 🎨 ВНЕШНИЙ ВИД & НАСТРОЙКИ ПАНЕЛИ
        // =========================================================================

            document.getElementById('set-block-view').style.display = tabKey === 'view' ? 'block' : 'none';

            localStorage.setItem('ui_saved_accent', hexColor);

            document.documentElement.style.setProperty('--base-font-size', pxValue + 'px');

            applySelectedThemeEngine(theme);
            applyDynamicAccentColor(accent);

        // =========================================================================
        // 🔐 АУТЕНТИФИКАЦИЯ

            const container = document.getElementById('auth-main-card-node');

        function finalizeUserRegistrationDB() {
            const login = document.getElementById('f-reg-login').value.trim().toLowerCase();
            const name = document.getElementById('f-reg-name').value.trim();
            const role = document.getElementById('f-reg-role').value.trim();
            const pass = document.getElementById('f-reg-pass').value.trim();
            if(!login || !name || !role || !pass) return;

            const uid = "uid_" + Date.now();
            const colors = ["#0071e3", "#ff2d55", "#34c759", "#ff9500", "#af52de"];
            const color = colors[Math.floor(Math.random() * colors.length)];

            database.ref('users/' + uid).set({ id: uid, login, name, role, pass, color }).then(() => {
                currentUserId = uid;
                localStorage.setItem('premium_session_uid', uid);
                document.getElementById('auth-screen-layer').classList.remove('active');
                initializeEcosystemCore();

                    <div class="avatar-ui" style="background:${g.avatarColor || '#af52de'};">

        let msgListener = null;
        function openChatWithUser(id) {
            activeChatTargetId = id;
            document.getElementById('empty-chat-stub-layer').style.display = 'none';
            document.getElementById('active-chat-subsystem').style.display = 'flex';
            document.getElementById('app-layout').classList.add('chat-opened');
            buildAppUIRenderers();

            const isGroup = id.startsWith('group_');
            document.getElementById('add-user-to-group-trigger').style.display = isGroup ? 'flex' : 'none';
            document.getElementById('call-action-trigger').style.display = isGroup ? 'none' : 'flex';

            const path = resolveChatDatabasePath(id);
            if(msgListener) msgListener.off();

            msgListener = database.ref(path);
            msgListener.on('value', (snapshot) => {
                const data = snapshot.val() || {};
                renderMessagesFlow(Object.keys(data).map(k => data[k]));
            });
        }

        function renderMessagesFlow(list) {
            const flow = document.getElementById('chat-messages-flow-root');
            flow.innerHTML = '';
            list.forEach(m => {
                const isMe = m.senderId === currentUserId;
                const container = document.createElement('div');
                container.className = `msg-container ${isMe ? 'outgoing' : 'incoming'}`;
                
                let fileHTML = '';
                if(m.fileData && m.fileType && m.fileType.startsWith('image/')) {
                    fileHTML = `<img src="${m.fileData}" style="max-width:100%; border-radius:12px; margin-bottom:6px; display:block;">`;
                }

                let authorLabel = '';
                if (!isMe) {
                    const u = allUsers.find(usr => usr.id === m.senderId);
                    if (u) {
                        authorLabel = `<div style="font-size:11px; font-weight:800; color:var(--accent); margin-bottom:4px; cursor:pointer;" onclick="showUserProfileCard('${u.id}')">${u.name}</div>`;
                    }
                }

                container.innerHTML = `
                    <div class="msg-bubble-main">
                        ${authorLabel}
                        ${fileHTML}
                        <div style="${m.text ? '' : 'display:none;'}">${m.text || ''}</div>
                        <div class="msg-time">${m.time}</div>
                    </div>
                `;
                flow.appendChild(container);
            });
            flow.scrollTop = flow.scrollHeight;
        }

        function dispatchMessagePacket() {
            const input = document.getElementById('chat-core-input-field');
            const txt = input.value.trim();
            if(!txt && !currentSelectedFileBase64) return;

            const path = resolveChatDatabasePath(activeChatTargetId);
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            const node = { senderId: currentUserId, text: txt, time: time };
            if (currentSelectedFileBase64) {
                node.fileData = currentSelectedFileBase64;
                node.fileType = currentSelectedFileType;
            }

            database.ref(path).push(node);
            input.value = '';
            currentSelectedFileBase64 = null;
        }

        function handleFileSelectionPipeline(event) {
            const file = event.target.files[0];
            if (!file) return;
            currentSelectedFileType = file.type;

            const r = new FileReader();
            r.onload = (e) => { currentSelectedFileBase64 = e.target.result; dispatchMessagePacket(); };
            r.readAsDataURL(file);
        }

        function updateActiveChatHeader() {
            const slot = document.getElementById('active-chat-avatar-slot');
            if (activeChatTargetId.startsWith('group_')) {
                const g = allGroups.find(group => group.id === activeChatTargetId);
                if (!g) return;
                document.getElementById('active-chat-name-target').innerText = g.name;
                document.getElementById('active-chat-status-target').innerText = "Рабочая группа";
                slot.innerHTML = `<div class="avatar-ui" style="background:${g.avatarColor || '#af52de'}; width:40px; height:40px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg></div>`;
                slot.onclick = null;
            } else {
                const u = allUsers.find(user => user.id === activeChatTargetId);
                if(!u) return;
                document.getElementById('active-chat-name-target').innerText = u.name;
                document.getElementById('active-chat-status-target').innerText = u.role;
                slot.innerHTML = `<div class="avatar-ui" style="background:${u.color}; width:40px; height:40px; font-size:14px;">${u.name.substring(0,2).toUpperCase()}</div>`;
                slot.onclick = () => showUserProfileCard(u.id);
            }
        }

        function exitActiveChatView() {
            document.getElementById('app-layout').classList.remove('chat-opened');
            activeChatTargetId = null;
        }

        function triggerLocalSearchFilter() {
            searchString = document.getElementById('global-search-input').value.trim().toLowerCase();
            buildAppUIRenderers();
        }

        // =========================================================================
        // 📞 WebRTC ВИДЕОДВИЖОК
        // =========================================================================
        function listenIncomingCallsSubsystem() {
            if (!currentUserId) return;
            database.ref('calls').on('value', (snap) => {
                const data = snap.val() || {};
                for (let k in data) {
                    const c = data[k];
                    if (c.calleeId === currentUserId && c.status === 'ringing') {
                        currentCallRef = database.ref('calls/' + k);
                        const caller = allUsers.find(u => u.id === c.callerId);
                        document.getElementById('incoming-caller-name').innerText = caller ? caller.name : "Вызов";
                        document.getElementById('incoming-call-modal').classList.add('active');
                        break;
                    }
                }
            });
        }

        async function initiateOutgoingVideoCall() {
            const key = [currentUserId, activeChatTargetId].sort().join('__');
            currentCallRef = database.ref('calls/' + key);
            document.getElementById('video-call-overlay').classList.add('active');

            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }).catch(() => navigator.mediaDevices.getUserMedia({ video: false, audio: true }));
            document.getElementById('local-video-node').srcObject = localStream;

            peerConnection = new RTCPeerConnection(rtcIceConfig);
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            peerConnection.ontrack = (e) => document.getElementById('remote-video-node').srcObject = e.streams[0];

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            await currentCallRef.set({ id: key, callerId: currentUserId, calleeId: activeChatTargetId, status: 'ringing', offer: { type: offer.type, sdp: offer.sdp } });
            currentCallRef.child('answer').on('value', async (s) => {
                if (s.val() && peerConnection.signalingState !== "stable") await peerConnection.setRemoteDescription(new RTCSessionDescription(s.val()));
            });
        }

        async function acceptIncomingCallSession() {
            document.getElementById('incoming-call-modal').classList.remove('active');
            document.getElementById('video-call-overlay').classList.add('active');

            const callData = (await currentCallRef.get()).val();
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }).catch(() => navigator.mediaDevices.getUserMedia({ video: false, audio: true }));
            document.getElementById('local-video-node').srcObject = localStream;

            peerConnection = new RTCPeerConnection(rtcIceConfig);
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            peerConnection.ontrack = (e) => document.getElementById('remote-video-node').srcObject = e.streams[0];

            await peerConnection.setRemoteDescription(new RTCSessionDescription(callData.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            await currentCallRef.update({ status: 'connected', answer: { type: answer.type, sdp: answer.sdp } });
        }

        function declineIncomingCallSession() {
            document.getElementById('incoming-call-modal').classList.remove('active');
            if (currentCallRef) currentCallRef.remove();
        }

        function endCurrentActiveCallSession() {
            if (currentCallRef) currentCallRef.remove();
            document.getElementById('video-call-overlay').classList.remove('active');
            if (localStream) localStream.getTracks().forEach(t => t.stop());
        }

        function toggleLocalVideoMute() {
            if (localStream && localStream.getVideoTracks()[0]) {
                const track = localStream.getVideoTracks()[0];
                track.enabled = !track.enabled;
                document.getElementById('call-cam-toggle').style.background = track.enabled ? 'rgba(255,255,255,0.2)' : '#ff9500';
            }
        }
    </script>
</body>
</html>
