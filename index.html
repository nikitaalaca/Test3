<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COLLAGE CONNECT PREMIUM</title>
    <style>
        :root {
            --bg-main: #f4f6f9;
            --panel-bg: rgba(255, 255, 255, 0.55);
            --panel-border: rgba(255, 255, 255, 0.7);
            --inner-border: rgba(0, 0, 0, 0.06);
            --text-primary: #1c1c1e;
            --text-secondary: #8e8e93;
            --accent: #0071e3;
            --accent-gradient: linear-gradient(135deg, #0071e3 0%, #34aadc 100%);
            --bubble-in: rgba(255, 255, 255, 0.9);
            --bubble-out: #0071e3;
            --bubble-out-text: #ffffff;
            --shadow-premium: 0 20px 40px rgba(0, 0, 0, 0.04);
            --shadow-smooth: 0 8px 32px rgba(31, 38, 135, 0.06);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --spring: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            --smooth: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            --sidebar-width: 350px;
            --success: #34c759;
            --danger: #ff3b30;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-font-smoothing: antialiased; }
        body, html { width: 100%; height: 100%; background: var(--bg-main); color: var(--text-primary); overflow: hidden; position: relative; }

        .ambient-glow { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(0,113,227,0.12) 0%, rgba(52,170,220,0) 70%); top: -150px; left: -150px; z-index: 1; pointer-events: none; }
        .ambient-glow-2 { position: absolute; width: 450px; height: 450px; background: radial-gradient(circle, rgba(52,199,89,0.08) 0%, rgba(255,255,255,0) 70%); bottom: -100px; right: -100px; z-index: 1; pointer-events: none; }

        #app-layout { display: flex; width: 100vw; height: 100vh; position: relative; z-index: 2; }
        .glass-panel { background: var(--panel-bg); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid var(--panel-border); box-shadow: var(--shadow-smooth); }

        #sidebar-container { width: var(--sidebar-width); height: 100%; display: flex; flex-direction: column; z-index: 10; flex-shrink: 0; transition: var(--spring); }
        #main-chat-container { flex: 1; height: 100%; display: flex; flex-direction: column; position: relative; z-index: 5; border-left: 1px solid var(--inner-border); }

        @media (max-width: 768px) {
            #sidebar-container { width: 100vw; position: absolute; left: 0; top: 0; bottom: 0; z-index: 10; transform: translateX(0); }
            #main-chat-container { width: 100vw; position: absolute; left: 0; top: 0; bottom: 0; z-index: 20; transform: translateX(100vw); }
            #app-layout.chat-opened #sidebar-container { transform: translateX(-20vw); filter: blur(5px); opacity: 0.5; }
            #app-layout.chat-opened #main-chat-container { transform: translateX(0); }
            .mobile-back-btn { display: flex !important; }
        }

        .sidebar-header { padding: 24px 20px 16px; display: flex; align-items: center; justify-content: space-between; }
        .brand-title { font-size: 22px; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; }
        .dev-tag { font-size: 10px; font-weight: 700; background: rgba(0,0,0,0.05); color: var(--text-secondary); padding: 4px 7px; border-radius: 6px; letter-spacing: 0.5px; -webkit-text-fill-color: initial; }
        
        .search-box { padding: 0 16px 16px; }
        .search-inner { display: flex; align-items: center; background: rgba(0,0,0,0.04); padding: 10px 14px; border-radius: var(--radius-sm); border: 1px solid transparent; transition: var(--smooth); }
        .search-inner:focus-within { background: #fff; border-color: rgba(0,113,227,0.3); box-shadow: 0 0 0 3px rgba(0,113,227,0.08); }
        .search-inner input { border: none; background: transparent; outline: none; width: 100%; margin-left: 8px; color: var(--text-primary); font-size: 15px; }

        .tab-bar { display: flex; padding: 0 16px 12px; gap: 4px; border-bottom: 1px solid var(--inner-border); }
        .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-secondary); font-size: 13.5px; font-weight: 600; border-radius: var(--radius-sm); cursor: pointer; transition: var(--smooth); }
        .tab-btn.active { background: rgba(0,113,227,0.08); color: var(--accent); }

        .scroller-content { flex: 1; overflow-y: auto; padding: 10px 16px; display: none; }
        .scroller-content.active { display: block; }

        .item-row { display: flex; align-items: center; padding: 12px; border-radius: var(--radius-md); cursor: pointer; transition: var(--smooth); margin-bottom: 4px; border: 1px solid transparent; position: relative; }
        .item-row:hover { background: rgba(255,255,255,0.6); transform: translateY(-1px); }
        .item-row.active { background: #fff; border-color: rgba(0,113,227,0.12); box-shadow: var(--shadow-smooth); }
        
        .avatar-ui { width: 44px; height: 44px; border-radius: 50%; color: white; font-weight: 700; display: flex; align-items: center; justify-content: center; font-size: 14px; position: relative; flex-shrink: 0; }
        .status-dot { position: absolute; width: 12px; height: 12px; background: #cdcdf1; border: 2.5px solid #fff; border-radius: 50%; bottom: 0; right: 0; transition: var(--smooth); }
        .status-dot.online { background: var(--success); }

        .row-meta { flex: 1; margin-left: 12px; min-width: 0; }
        .row-title { font-weight: 600; font-size: 15px; color: var(--text-primary); display: flex; justify-content: space-between; align-items: center; }
        .row-sub { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
        .typing-text { color: var(--success) !important; font-weight: 500; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .chat-header { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--inner-border); background: rgba(255,255,255,0.2); }
        .chat-messages-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: rgba(235,238,242,0.3); }

        .msg-container { display: flex; flex-direction: column; max-width: 75%; animation: msgSlide 0.3s cubic-bezier(0.1, 1, 0.1, 1); }
        @keyframes msgSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-container.incoming { align-self: flex-start; }
        .msg-container.outgoing { align-self: flex-end; }
        
        .msg-bubble-main { padding: 10px 14px; border-radius: var(--radius-md); font-size: 15px; line-height: 1.4; box-shadow: 0 2px 8px rgba(0,0,0,0.02); position: relative; }
        .incoming .msg-bubble-main { background: var(--bubble-in); color: var(--text-primary); border-top-left-radius: 4px; border: 1px solid rgba(0,0,0,0.03); }
        .outgoing .msg-bubble-main { background: var(--accent-gradient); color: var(--bubble-out-text); border-top-right-radius: 4px; }
        
        .msg-media-preview { max-width: 260px; max-height: 200px; border-radius: var(--radius-sm); margin-bottom: 4px; display: block; object-fit: cover; }
        .msg-file-badge { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.05); padding: 8px 12px; border-radius: var(--radius-sm); margin-bottom: 4px; text-decoration: none; color: inherit; font-size: 13px; font-weight: 500; }
        .outgoing .msg-file-badge { background: rgba(255,255,255,0.15); color: #fff; }
        .msg-time { font-size: 10px; margin-top: 3px; opacity: 0.6; text-align: right; }

        #attachment-preview-zone { display: none; padding: 10px 20px; background: #fff; border-top: 1px solid var(--inner-border); align-items: center; gap: 10px; }
        .preview-pill { position: relative; background: var(--bg-main); padding: 6px 30px 6px 12px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; border: 1px solid var(--inner-border); }
        .preview-pill .close-btn { position: absolute; right: 8px; cursor: pointer; font-size: 15px; color: var(--danger); top: 50%; transform: translateY(-50%); }

        .chat-input-bar { padding: 14px 20px calc(14px + env(safe-area-inset-bottom)); border-top: 1px solid var(--inner-border); background: #fff; }
        .input-row-container { display: flex; align-items: center; gap: 8px; }
        .chat-input-bar input[type="text"] { flex: 1; padding: 12px 16px; border: 1px solid transparent; border-radius: var(--radius-md); background: var(--bg-main); color: var(--text-primary); font-size: 15px; outline: none; transition: var(--smooth); }
        .chat-input-bar input[type="text"]:focus { background: #fff; border-color: rgba(0,113,227,0.2); box-shadow: var(--shadow-smooth); }
        
        .circle-action-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--bg-main); color: var(--text-primary); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: var(--smooth); }
        .circle-action-btn:hover { transform: scale(1.05); background: rgba(0,0,0,0.06); }
        .circle-action-btn.primary { background: var(--accent-gradient); color: white; box-shadow: 0 4px 12px rgba(0,113,227,0.2); }
        .mobile-back-btn { display: none; background: transparent; border: none; color: var(--accent); padding-right: 8px; cursor: pointer; }

        .fullscreen-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-main); z-index: 999; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .fullscreen-overlay.active { opacity: 1; pointer-events: auto; }
        .auth-card { width: 90%; max-width: 380px; padding: 28px; border-radius: var(--radius-lg); box-shadow: var(--shadow-premium); background: #fff; border: 1px solid var(--panel-border); }
        
        .onboarding-container { display: none; flex-direction: column; text-align: center; }
        .onboarding-container.active { display: flex; }
        .onboarding-slides { position: relative; height: 200px; overflow: hidden; margin-bottom: 12px; }
        .onboarding-slide { position: absolute; width: 100%; height: 100%; top: 0; left: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transform: translateX(30px); transition: all 0.4s ease; }
        .onboarding-slide.current { opacity: 1; transform: translateX(0); }
        .onboarding-icon { width: 64px; height: 64px; background: rgba(0,113,227,0.06); color: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 14px; font-size: 24px; }
        .onboarding-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 20px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(0,0,0,0.1); transition: var(--smooth); }
        .dot.active { background: var(--accent); width: 16px; border-radius: 3px; }

        #settings-modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.12); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 800; display: none; align-items: center; justify-content: center; }
        #settings-modal-overlay.active { display: flex; }
        .settings-card { width: 88%; max-width: 360px; background: #fff; border: 1px solid var(--panel-border); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-premium); }

        #video-call-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #0c0c0e; z-index: 900; display: none; flex-direction: column; }
        #video-call-overlay.active { display: flex; }
        .remote-video-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .local-video-frame { position: absolute; top: calc(20px + env(safe-area-inset-top)); right: 20px; width: 100px; height: 150px; object-fit: cover; z-index: 5; border-radius: var(--radius-sm); border: 2px solid rgba(255,255,255,0.2); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        
        .call-controls-bar { position: absolute; bottom: calc(30px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 16px; background: rgba(255,255,255,0.12); padding: 12px 24px; border-radius: 40px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15); }
        .call-btn { width: 52px; height: 52px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; font-weight: 600; font-size: 14px; }
        .call-btn.hangup { background: var(--danger); }
        .call-btn.toggle { background: rgba(255,255,255,0.15); }

        #incoming-call-modal { position: fixed; top: calc(15px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%) translateY(-200%); width: 92%; max-width: 380px; background: rgba(255,255,255,0.8); border: 1px solid var(--panel-border); border-radius: var(--radius-md); box-shadow: var(--shadow-premium); z-index: 950; padding: 16px; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); transition: var(--spring); }
        #incoming-call-modal.active { transform: translateX(-50%) translateY(0); }
        .inc-btn { border: none; padding: 10px 16px; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; font-size: 13px; }
        .inc-btn.accept { background: var(--success); color: white; }
        .inc-btn.decline { background: var(--danger); color: white; }

        .premium-input { width: 100%; padding: 12px; background: var(--bg-main); border: 1px solid transparent; border-radius: var(--radius-sm); color: var(--text-primary); outline: none; margin-bottom: 12px; font-size: 14px; }
        .premium-input:focus { background: white; border-color: var(--accent); }
        .empty-chat-stub { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); text-align: center; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>
    <div class="ambient-glow-2"></div>

    <!-- ЭКРАН ВХОДА И ОНБОРДИНГА -->
    <div id="auth-screen-layer" class="fullscreen-overlay active">
        <div class="auth-card" id="auth-main-card-node"></div>
    </div>

    <!-- МОДАЛКА НАСТРОЕК -->
    <div id="settings-modal-overlay" onclick="closeProfileSettingsModal()">
        <div class="settings-card" onclick="event.stopPropagation()">
            <h3 style="margin-bottom:14px; font-weight:700;">Настройки профиля</h3>
            <label style="font-size:11px; color:var(--text-secondary); font-weight:700; display:block; margin-bottom:4px;">ВАШЕ ИМЯ</label>
            <input type="text" id="settings-name-input" class="premium-input">
            <label style="font-size:11px; color:var(--text-secondary); font-weight:700; display:block; margin-bottom:4px;">ДОЛЖНОСТЬ</label>
            <input type="text" id="settings-role-input" class="premium-input">
            <button class="circle-action-btn primary" style="width:100%; border-radius:10px; font-weight:600;" onclick="saveProfileSettingsChanges()">Сохранить</button>
            <button class="tab-btn" style="width:100%; margin-top:8px; color:var(--danger); font-weight:700;" onclick="executeLogoutSystem()">Выйти из аккаунта</button>
        </div>
    </div>

    <!-- ИНТЕРФЕЙС ЗВОНКА -->
    <div id="video-call-overlay">
        <video id="remote-video-node" class="remote-video-frame" autoplay playsinline></video>
        <video id="local-video-node" class="local-video-frame" autoplay playsinline muted></video>
        <div class="call-controls-bar">
            <button class="call-btn toggle" onclick="toggleLocalVideoMute()" id="call-cam-toggle">CAM</button>
            <button class="call-btn hangup" onclick="endCurrentActiveCallSession()">🛑</button>
        </div>
    </div>

    <!-- ПЛАШКА ВХОДЯЩЕГО ВЫЗОВА -->
    <div id="incoming-call-modal">
        <div>
            <div style="font-weight:700; font-size:15px;" id="incoming-caller-name">Звонок...</div>
            <div style="font-size:12px; color:var(--text-secondary); margin-top:1px;">Входящий видеовызов</div>
        </div>
        <div style="display:flex; gap:8px;">
            <button class="inc-btn decline" onclick="declineIncomingCallSession()">Отклонить</button>
            <button class="inc-btn accept" onclick="acceptIncomingCallSession()">Ответить</button>
        </div>
    </div>

    <!-- РАБОЧЕЕ ПРОСТРАНСТВО -->
    <div id="app-layout">
        <aside id="sidebar-container" class="glass-panel">
            <div class="sidebar-header">
                <span class="brand-title">COLLAGE <span class="dev-tag">EGORKIN</span></span>
                <div id="my-avatar-anchor" style="cursor:pointer;" onclick="openProfileSettingsModal()"></div>
            </div>
            <div class="search-box">
                <div class="search-inner">
                    <input type="text" id="global-search-input" placeholder="Поиск по коллегам и чатам..." oninput="triggerLocalSearchFilter()">
                </div>
            </div>
            <nav class="tab-bar">
                <button class="tab-btn active" id="tab-btn-chats" onclick="switchSidebarTab('chats')">Личные</button>
                <button class="tab-btn" id="tab-btn-groups" onclick="switchSidebarTab('groups')">Группы</button>
                <button class="tab-btn" id="tab-btn-contacts" onclick="switchSidebarTab('contacts')">Команда</button>
            </nav>
            <div id="tab-content-chats" class="scroller-content active"></div>
            <div id="tab-content-groups" class="scroller-content">
                <button class="premium-input" style="background:rgba(0,113,227,0.08); color:var(--accent); font-weight:600; border:none; margin-top:5px; cursor:pointer;" onclick="createNewGroupChannel()">+ Создать группу</button>
                <div id="groups-list-root"></div>
            </div>
            <div id="tab-content-contacts" class="scroller-content"></div>
        </aside>

        <main id="main-chat-container" class="glass-panel">
            <div id="active-chat-subsystem" style="display:none; flex-direction:column; height:100%;">
                <header class="chat-header">
                    <div style="display:flex; align-items:center; min-width:0;">
                        <button class="mobile-back-btn" onclick="exitActiveChatView()">⬅</button>
                        <div id="active-chat-avatar-slot"></div>
                        <div style="margin-left:12px; min-width:0;">
                            <div class="row-title" id="active-chat-name-target">...</div>
                            <div class="row-sub" id="active-chat-status-target">Offline</div>
                        </div>
                    </div>
                    <div style="display:flex; gap:6px;">
                        <button class="circle-action-btn primary" id="header-call-btn" onclick="initiateOutgoingVideoCall()">📹</button>
                        <button class="circle-action-btn" style="color:var(--danger);" onclick="deleteCurrentChatHistory()">🗑</button>
                    </div>
                </header>

                <div class="chat-messages-area" id="chat-messages-flow-root"></div>

                <div id="attachment-preview-zone">
                    <div class="preview-pill" id="preview-pill-text">Файл <span class="close-btn" onclick="clearSelectedAttachmentSlot()">×</span></div>
                </div>

                <footer class="chat-input-bar">
                    <div class="input-row-container">
                        <button class="circle-action-btn" onclick="document.getElementById('hidden-file-picker').click()">📎</button>
                        <input type="file" id="hidden-file-picker" style="display:none;" onchange="handleFileSelectionPipeline(event)">
                        <input type="text" id="chat-core-input-field" placeholder="Сообщение..." oninput="handleUserTypingBroadcast()" onkeypress="if(event.key==='Enter') dispatchMessagePacket()">
                        <button class="circle-action-btn primary" onclick="dispatchMessagePacket()">➔</button>
                    </div>
                </footer>
            </div>

            <div id="empty-chat-stub-layer" class="empty-chat-stub">
                <h3 style="font-weight:600; color:var(--text-secondary); font-size:15px;">Выберите ветку обсуждения для старта</h3>
            </div>
        </main>
    </div>

    <!-- Внедрение Web SDK по вашей архитектуре -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // Данные со скриншота image.png интегрированы полностью в неизменном виде
        const firebaseConfig = {
            apiKey: "AIzaSyCUbD08gGbhrkGIGgsIzHTEWeNMTTU_efY",
            authDomain: "yw-83b3e.firebaseapp.com",
            databaseURL: "https://yw-83b3e-default-rtdb.firebaseio.com",
            projectId: "yw-83b3e",
            storageBucket: "yw-83b3e.firebasestorage.app",
            messagingSenderId: "513977614231",
            appId: "1:513977614231:web:0a04427784e8259fdeced2",
            measurementId: "G-H4YJ6NC4E9"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentUserId = localStorage.getItem('premium_session_uid') || null;
        let allUsers = [];
        let allGroups = [];
        let activeTab = 'chats';
        let activeChatTargetId = null;
        let isGroupMode = false;
        let onboardingCurrentStep = 0;
        let tempRegistrationPayload = null;
        let currentSelectedFileBase64 = null;
        let currentSelectedFileName = null;
        let currentSelectedFileType = null;
        let searchString = "";
        let typingTimeout = null;

        let localStream = null;
        let peerConnection = null;
        let currentCallRef = null;
        const rtcIceConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] };

        window.addEventListener('DOMContentLoaded', () => { initializeEcosystemCore(); });
        
        function initializeEcosystemCore() {
            database.ref('users').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                allUsers = Object.values(data);
                buildAppUIRenderers();
                setupPresenceEngine();
                listenIncomingCallsSubsystem();
            });

            database.ref('groups').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                allGroups = Object.keys(data).map(k => ({id: k, ...data[k]}));
                if(activeTab === 'groups') renderGroupsTab();
            });

            if (currentUserId) {
                document.getElementById('auth-screen-layer').classList.remove('active');
            } else {
                drawAuthUIForm(false);
            }
        }

        // КОРПОРАТИВНЫЙ ОНДИСПАТЧ СТАТУСОВ (PRESENCE ENGINE)
        function setupPresenceEngine() {
            if (!currentUserId) return;
            const myStatusRef = database.ref(`users/${currentUserId}/online`);
            database.ref('.info/connected').on('value', (snapshot) => {
                if (snapshot.val() === false) return;
                myStatusRef.onDisconnect().set(false).then(() => {
                    myStatusRef.set(true);
                });
            });
        }

        function handleUserTypingBroadcast() {
            if (!currentUserId || !activeChatTargetId || isGroupMode) return;
            database.ref(`users/${currentUserId}/typingTo`).set(activeChatTargetId);
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                database.ref(`users/${currentUserId}/typingTo`).set(false);
            }, 1800);
        }

        function drawAuthUIForm(isRegister) {
            const container = document.getElementById('auth-main-card-node');
            if (!isRegister) {
                container.innerHTML = `
                    <h2 style="font-weight:800; font-size:22px; margin-bottom:4px; letter-spacing:-0.5px;">ВХОД В СИСТЕМУ</h2>
                    <p style="color:var(--text-secondary); font-size:13px; margin-bottom:16px;">Коллаж Коннект Премиум</p>
                    <input type="text" id="f-login" class="premium-input" placeholder="Корпоративный логин">
                    <input type="password" id="f-pass" class="premium-input" placeholder="Пароль">
                    <button class="circle-action-btn primary" style="width:100%; border-radius:12px; font-weight:600;" onclick="executeLoginFlow()">Авторизоваться</button>
                    <div style="text-align:center; font-size:13.5px; color:var(--accent); margin-top:14px; cursor:pointer; font-weight:500;" onclick="drawAuthUIForm(true)">Создать новую карточку</div>
                `;
            } else {
                container.innerHTML = `
                    <h2 style="font-weight:800; font-size:22px; margin-bottom:4px;">РЕГИСТРАЦИЯ</h2>
                    <p style="color:var(--text-secondary); font-size:13px; margin-bottom:16px;">Заполните профиль сотрудника</p>
                    <input type="text" id="f-reg-login" class="premium-input" placeholder="Логин (латиница)">
                    <input type="text" id="f-reg-name" class="premium-input" placeholder="Имя и Фамилия">
                    <input type="text" id="f-reg-role" class="premium-input" placeholder="Отдел / Должность">
                    <input type="password" id="f-reg-pass" class="premium-input" placeholder="Пароль">
                    <button class="circle-action-btn primary" style="width:100%; border-radius:12px; font-weight:600;" onclick="startOnboardingPipeline()">Продолжить ➔</button>
                    <div style="text-align:center; font-size:13.5px; color:var(--accent); margin-top:14px; cursor:pointer; font-weight:500;" onclick="drawAuthUIForm(false)">Вернуться ко входу</div>
                `;
            }
        }

        function startOnboardingPipeline() {
            const login = document.getElementById('f-reg-login').value.trim().toLowerCase();
            const name = document.getElementById('f-reg-name').value.trim();
            const role = document.getElementById('f-reg-role').value.trim();
            const pass = document.getElementById('f-reg-pass').value.trim();
            if(!login || !name || !role || !pass) { alert('Пожалуйста, заполните все поля!'); return; }
            tempRegistrationPayload = { login, name, role, pass };
            onboardingCurrentStep = 0;
            renderOnboardingSliderHTML();
        }

        function renderOnboardingSliderHTML() {
            const container = document.getElementById('auth-main-card-node');
            container.innerHTML = `
                <div class="onboarding-container active">
                    <div class="onboarding-slides">
                        <div class="onboarding-slide ${onboardingCurrentStep===0?'current':''}">
                            <div class="onboarding-icon">💼</div>
                            <h3 style="font-size:18px; font-weight:700; margin-bottom:6px;">Экосистема Коллаж</h3>
                            <p style="color:var(--text-secondary); font-size:13px; padding:0 10px; line-height:1.4;">Премиальный мессенджер со сквозным шифрованием и WebRTC медиаканалами высокого разрешения.</p>
                        </div>
                        <div class="onboarding-slide ${onboardingCurrentStep===1?'current':''}">
                            <div class="onboarding-icon">📹</div>
                            <h3 style="font-size:18px; font-weight:700; margin-bottom:6px;">Прямые видеозвонки</h3>
                            <p style="color:var(--text-secondary); font-size:13px; padding:0 10px; line-height:1.4;">Общайтесь без серверов-посредников. Трафик идет peer-to-peer напрямую между устройствами.</p>
                        </div>
                        <div class="onboarding-slide ${onboardingCurrentStep===2?'current':''}">
                            <div class="onboarding-icon">📁</div>
                            <h3 style="font-size:18px; font-weight:700; margin-bottom:6px;">Обмен документами</h3>
                            <p style="color:var(--text-secondary); font-size:13px; padding:0 10px; line-height:1.4;">Мгновенная передача изображений, отчетов и бинарных файлов прямо внутри рабочих диалогов.</p>
                        </div>
                    </div>
                    <div class="onboarding-dots">
                        <div class="dot ${onboardingCurrentStep===0?'active':''}"></div>
                        <div class="dot ${onboardingCurrentStep===1?'active':''}"></div>
                        <div class="dot ${onboardingCurrentStep===2?'active':''}"></div>
                    </div>
                    <button class="circle-action-btn primary" style="width:100%; border-radius:12px; font-weight:600;" onclick="nextOnboardingStepSwipe()">
                        ${onboardingCurrentStep === 2 ? 'Завершить регистрацию' : 'Дальше'}
                    </button>
                </div>
            `;
        }

        function nextOnboardingStepSwipe() {
            if (onboardingCurrentStep < 2) { onboardingCurrentStep++; renderOnboardingSliderHTML(); } 
            else { finalizeUserRegistrationDB(); }
        }

        function finalizeUserRegistrationDB() {
            const uid = "uid_" + Date.now();
            const colors = ["#0071e3", "#ff2d55", "#34c759", "#ff9500", "#af52de", "#5ac8fa"];
            const color = colors[Math.floor(Math.random() * colors.length)];
            const packet = { id: uid, login: tempRegistrationPayload.login, name: tempRegistrationPayload.name, role: tempRegistrationPayload.role, pass: tempRegistrationPayload.pass, color: color, online: true, typingTo: false };
            database.ref('users/' + uid).set(packet).then(() => {
                currentUserId = uid;
                localStorage.setItem('premium_session_uid', uid);
                document.getElementById('auth-screen-layer').classList.remove('active');
                initializeEcosystemCore();
            });
        }

        function executeLoginFlow() {
            const login = document.getElementById('f-login').value.trim().toLowerCase();
            const pass = document.getElementById('f-pass').value.trim();
            const matched = allUsers.find(u => u.login === login && u.pass === pass);
            if(!matched) { alert('Учетные данные не найдены!'); return; }
            currentUserId = matched.id;
            localStorage.setItem('premium_session_uid', matched.id);
            document.getElementById('auth-screen-layer').classList.remove('active');
            initializeEcosystemCore();
        }

        function openProfileSettingsModal() {
            const me = allUsers.find(u => u.id === currentUserId);
            if(!me) return;
            document.getElementById('settings-name-input').value = me.name || '';
            document.getElementById('settings-role-input').value = me.role || '';
            document.getElementById('settings-modal-overlay').classList.add('active');
        }

        function closeProfileSettingsModal() { document.getElementById('settings-modal-overlay').classList.remove('active'); }
        function saveProfileSettingsChanges() {
            const n = document.getElementById('settings-name-input').value.trim();
            const r = document.getElementById('settings-role-input').value.trim();
            if(n && r) database.ref(`users/${currentUserId}`).update({ name: n, role: r }).then(() => closeProfileSettingsModal());
        }
        function executeLogoutSystem() { localStorage.removeItem('premium_session_uid'); location.reload(); }

        function handleFileSelectionPipeline(event) {
            const file = event.target.files[0];
            if (!file) return;
            currentSelectedFileName = file.name;
            currentSelectedFileType = file.type;
            const reader = new FileReader();
            reader.onload = function(e) {
                currentSelectedFileBase64 = e.target.result;
                document.getElementById('preview-pill-text').innerHTML = `${file.name.substring(0,20)}... <span class="close-btn" onclick="clearSelectedAttachmentSlot()">×</span>`;
                document.getElementById('attachment-preview-zone').style.display = 'flex';
            };
            reader.readAsDataURL(file);
        }

        function clearSelectedAttachmentSlot() {
            currentSelectedFileBase64 = null; currentSelectedFileName = null; currentSelectedFileType = null;
            document.getElementById('attachment-preview-zone').style.display = 'none';
            document.getElementById('hidden-file-picker').value = '';
        }

        function dispatchMessagePacket() {
            const input = document.getElementById('chat-core-input-field');
            const txt = input.value.trim();
            if(!txt && !currentSelectedFileBase64) return;
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const msgNode = { senderId: currentUserId, text: txt, time: time };
            if (currentSelectedFileBase64) { msgNode.fileData = currentSelectedFileBase64; msgNode.fileName = currentSelectedFileName; msgNode.fileType = currentSelectedFileType; }

            if(isGroupMode) {
                database.ref(`groups/${activeChatTargetId}/messages`).push(msgNode);
            } else {
                const chatKey = [currentUserId, activeChatTargetId].sort().join('__');
                database.ref('messages/' + chatKey).push(msgNode);
            }
            input.value = '';
            clearSelectedAttachmentSlot();
            if(!isGroupMode) database.ref(`users/${currentUserId}/typingTo`).set(false);
        }

        function createNewGroupChannel() {
            const name = prompt("Введите название новой группы:");
            if(!name || !name.trim()) return;
            database.ref('groups').push({ name: name.trim(), creator: currentUserId });
        }

        function deleteCurrentChatHistory() {
            if(!activeChatTargetId) return;
            if(!confirm("Вы уверены, что хотите полностью стереть историю переписки?")) return;
            if(isGroupMode) {
                database.ref(`groups/${activeChatTargetId}/messages`).remove();
            } else {
                const chatKey = [currentUserId, activeChatTargetId].sort().join('__');
                database.ref('messages/' + chatKey).remove();
            }
        }

        function buildAppUIRenderers() {
            const me = allUsers.find(u => u.id === currentUserId);
            if(!me) return;
            document.getElementById('my-avatar-anchor').innerHTML = `<div class="avatar-ui" style="background:${me.color}; width:36px; height:36px; font-size:12px;">${me.name.substring(0,2).toUpperCase()}</div>`;
            if (activeTab === 'chats') renderChatsTab();
            if (activeTab === 'contacts') renderContactsTab();
            if (activeTab === 'groups') renderGroupsTab();
            if (activeChatTargetId) updateActiveChatHeader();
        }

        function switchSidebarTab(target) {
            activeTab = target;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-btn-' + target).classList.add('active');
            document.getElementById('tab-content-chats').className = "scroller-content";
            document.getElementById('tab-content-groups').className = "scroller-content";
            document.getElementById('tab-content-contacts').className = "scroller-content";
            document.getElementById('tab-content-' + target).className = "scroller-content active";
            buildAppUIRenderers();
        }

        function renderContactsTab() {
            const root = document.getElementById('tab-content-contacts'); root.innerHTML = '';
            allUsers.filter(u => u.id !== currentUserId).forEach(u => {
                if(searchString && !u.name.toLowerCase().includes(searchString)) return;
                const row = document.createElement('div');
                row.className = `item-row ${(!isGroupMode && activeChatTargetId === u.id) ? 'active' : ''}`;
                row.onclick = () => openChatWithUser(u.id, false);
                row.innerHTML = `
                    <div class="avatar-ui" style="background:${u.color}">${u.name.substring(0,2).toUpperCase()}<div class="status-dot ${u.online?'online':''}"></div></div>
                    <div class="row-meta"><div class="row-title">${u.name}</div><div class="row-sub">${u.role}</div></div>
                `;
                root.appendChild(row);
            });
        }

        function renderGroupsTab() {
            const root = document.getElementById('groups-list-root'); root.innerHTML = '';
            allGroups.forEach(g => {
                if(searchString && !g.name.toLowerCase().includes(searchString)) return;
                const row = document.createElement('div');
                row.className = `item-row ${(isGroupMode && activeChatTargetId === g.id) ? 'active' : ''}`;
                row.onclick = () => openChatWithUser(g.id, true);
                row.innerHTML = `
                    <div class="avatar-ui" style="background:#8e8e93">👥</div>
                    <div class="row-meta"><div class="row-title">${g.name}</div><div class="row-sub">Общий корпоративный канал</div></div>
                `;
                root.appendChild(row);
            });
        }

        function renderChatsTab() {
            const root = document.getElementById('tab-content-chats'); root.innerHTML = '';
            database.ref('messages').once('value', (snapshot) => {
                const allMsgs = snapshot.val() || {};
                allUsers.filter(u => u.id !== currentUserId).forEach(u => {
                    const chatKey = [currentUserId, u.id].sort().join('__');
                    if(!allMsgs[chatKey]) return;
                    if(searchString && !u.name.toLowerCase().includes(searchString)) return;

                    const typingUser = allUsers.find(usr => usr.id === u.id && usr.typingTo === currentUserId);
                    const subText = typingUser ? `<span class="typing-text">печатает...</span>` : 'История переписки';

                    const row = document.createElement('div');
                    row.className = `item-row ${(!isGroupMode && activeChatTargetId === u.id) ? 'active' : ''}`;
                    row.onclick = () => openChatWithUser(u.id, false);
                    row.innerHTML = `
                        <div class="avatar-ui" style="background:${u.color}">${u.name.substring(0,2).toUpperCase()}<div class="status-dot ${u.online?'online':''}"></div></div>
                        <div class="row-meta"><div class="row-title">${u.name}</div><div class="row-sub">${subText}</div></div>
                    `;
                    root.appendChild(row);
                });
            });
        }

        let msgListener = null;
        function openChatWithUser(id, groupModeFlag) {
            activeChatTargetId = id;
            isGroupMode = groupModeFlag;
            document.getElementById('empty-chat-stub-layer').style.display = 'none';
            document.getElementById('active-chat-subsystem').style.display = 'flex';
            document.getElementById('app-layout').classList.add('chat-opened');
            
            document.getElementById('header-call-btn').style.display = isGroupMode ? 'none' : 'flex';
            buildAppUIRenderers();

            if(msgListener) msgListener.off();

            if(isGroupMode) {
                msgListener = database.ref(`groups/${id}/messages`);
            } else {
                const chatKey = [currentUserId, id].sort().join('__');
                msgListener = database.ref('messages/' + chatKey);
            }

            msgListener.on('value', (snapshot) => {
                const data = snapshot.val() || {};
                const list = Object.keys(data).map(k => data[k]);
                renderMessagesFlow(list);
            });
        }

        function renderMessagesFlow(list) {
            const flow = document.getElementById('chat-messages-flow-root'); flow.innerHTML = '';
            list.forEach(m => {
                const isMe = m.senderId === currentUserId;
                const container = document.createElement('div');
                container.className = `msg-container ${isMe ? 'outgoing' : 'incoming'}`;
                
                let fileHTML = '';
                if(m.fileData) {
                    if(m.fileType && m.fileType.startsWith('image/')) {
                        fileHTML = `<img src="${m.fileData}" class="msg-media-preview" onclick="window.open('${m.fileData}')">`;
                    } else {
                        fileHTML = `<a href="${m.fileData}" download="${m.fileName || 'file'}" class="msg-file-badge">📄 ${m.fileName || 'Файл'}</a>`;
                    }
                }

                let senderNameLabel = '';
                if(isGroupMode && !isMe) {
                    const srcUser = allUsers.find(u => u.id === m.senderId);
                    senderNameLabel = `<div style="font-size:11px; font-weight:700; color:var(--accent); margin-bottom:2px;">${srcUser ? srcUser.name : 'Коллега'}</div>`;
                }

                container.innerHTML = `
                    <div class="msg-bubble-main">
                        ${senderNameLabel}
                        ${fileHTML}
                        <div style="${m.text ? '' : 'display:none;'}">${m.text || ''}</div>
                        <div class="msg-time">${m.time}</div>
                    </div>
                `;
                flow.appendChild(container);
            });
            flow.scrollTop = flow.scrollHeight;
        }

        function updateActiveChatHeader() {
            if(isGroupMode) {
                const targetGroup = allGroups.find(g => g.id === activeChatTargetId);
                if(!targetGroup) return;
                document.getElementById('active-chat-name-target').innerText = targetGroup.name;
                document.getElementById('active-chat-status-target').innerText = "Общий канал";
                document.getElementById('active-chat-avatar-slot').innerHTML = `<div class="avatar-ui" style="background:#8e8e93; width:38px; height:38px;">👥</div>`;
            } else {
                const targetUser = allUsers.find(u => u.id === activeChatTargetId);
                if(!targetUser) return;
                
                const isTyping = targetUser.typingTo === currentUserId;
                document.getElementById('active-chat-name-target').innerText = targetUser.name;
                document.getElementById('active-chat-status-target').innerHTML = isTyping ? `<span class="typing-text">печатает...</span>` : (targetUser.online ? "Online" : "Offline");
                document.getElementById('active-chat-avatar-slot').innerHTML = `<div class="avatar-ui" style="background:${targetUser.color}; width:38px; height:38px; font-size:13px;">${targetUser.name.substring(0,2).toUpperCase()}</div>`;
            }
        }

        function exitActiveChatView() { document.getElementById('app-layout').classList.remove('chat-opened'); activeChatTargetId = null; }
        function triggerLocalSearchFilter() { searchString = document.getElementById('global-search-input').value.trim().toLowerCase(); buildAppUIRenderers(); }

        // =========================================================================
        // УЛЬТИМАТИВНЫЙ WEBRTC СИГНАЛИНГ ДВИЖОК С АВТООЧИСТКОЙ ПОТОКОВ
        // =========================================================================
        function listenIncomingCallsSubsystem() {
            if (!currentUserId) return;
            database.ref('calls').off('value'); 
            database.ref('calls').on('value', async (snapshot) => {
                const data = snapshot.val() || {};
                for (let key in data) {
                    const callObj = data[key];
                    if (callObj.calleeId === currentUserId && callObj.status === 'ringing') {
                        currentCallRef = database.ref('calls/' + key);
                        const caller = allUsers.find(u => u.id === callObj.callerId);
                        document.getElementById('incoming-caller-name').innerText = caller ? caller.name : "Вызов";
                        document.getElementById('incoming-call-modal').classList.add('active');
                        
                        currentCallRef.on('value', (innerSnap) => {
                            if(!innerSnap.exists() || innerSnap.val().status === 'ended') closeCallOverlayUI();
                        });
                        break;
                    }
                }
            });
        }

        async function initiateOutgoingVideoCall() {
            if (!activeChatTargetId || isGroupMode) return;
            const chatKey = [currentUserId, activeChatTargetId].sort().join('__');
            currentCallRef = database.ref('calls/' + chatKey);
            document.getElementById('video-call-overlay').classList.add('active');
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video-node').srcObject = localStream;
            } catch (err) {
                localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
            }

            peerConnection = new RTCPeerConnection(rtcIceConfig);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            peerConnection.ontrack = (e) => { document.getElementById('remote-video-node').srcObject = e.streams[0]; };
            peerConnection.onicecandidate = (e) => { if (e.candidate && currentCallRef) currentCallRef.child('callerCandidates').push(e.candidate.toJSON()); };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            await currentCallRef.set({ id: chatKey, callerId: currentUserId, calleeId: activeChatTargetId, status: 'ringing', offer: { type: offer.type, sdp: offer.sdp } });

            currentCallRef.child('answer').on('value', async (snap) => {
                const ans = snap.val();
                if (ans && peerConnection && peerConnection.signalingState !== "stable") await peerConnection.setRemoteDescription(new RTCSessionDescription(ans));
            });

            currentCallRef.child('calleeCandidates').on('child_added', (snap) => {
                const data = snap.val();
                if (data && peerConnection && peerConnection.remoteDescription) peerConnection.addIceCandidate(new RTCIceCandidate(data));
            });
        }

        async function acceptIncomingCallSession() {
            document.getElementById('incoming-call-modal').classList.remove('active');
            document.getElementById('video-call-overlay').classList.add('active');
            if (!currentCallRef) return;
            const snap = await currentCallRef.get();
            const callData = snap.val();
            if (!callData || !callData.offer) { closeCallOverlayUI(); return; }

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video-node').srcObject = localStream;
            } catch (err) {
                localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
            }

            peerConnection = new RTCPeerConnection(rtcIceConfig);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            peerConnection.ontrack = (e) => { document.getElementById('remote-video-node').srcObject = e.streams[0]; };
            peerConnection.onicecandidate = (e) => { if (e.candidate && currentCallRef) currentCallRef.child('calleeCandidates').push(e.candidate.toJSON()); };

            await peerConnection.setRemoteDescription(new RTCSessionDescription(callData.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            await currentCallRef.update({ status: 'connected', answer: { type: answer.type, sdp: answer.sdp } });
            
            currentCallRef.child('callerCandidates').on('child_added', (cSnap) => {
                const data = cSnap.val();
                if (data && peerConnection && peerConnection.remoteDescription) peerConnection.addIceCandidate(new RTCIceCandidate(data));
            });
        }

        function declineIncomingCallSession() {
            document.getElementById('incoming-call-modal').classList.remove('active');
            if (currentCallRef) currentCallRef.update({ status: 'ended' }).then(() => { setTimeout(() => { if (currentCallRef) currentCallRef.remove(); }, 1000); });
        }

        function endCurrentActiveCallSession() {
            if (currentCallRef) currentCallRef.update({ status: 'ended' }).then(() => { setTimeout(() => { if (currentCallRef) currentCallRef.remove(); }, 1000); });
            closeCallOverlayUI();
        }

        function closeCallOverlayUI() {
            document.getElementById('video-call-overlay').classList.remove('active');
            document.getElementById('incoming-call-modal').classList.remove('active');
            if (document.getElementById('local-video-node')) document.getElementById('local-video-node').srcObject = null;
            if (document.getElementById('remote-video-node')) document.getElementById('remote-video-node').srcObject = null;
            if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
        }

        function toggleLocalVideoMute() {
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.enabled = !videoTrack.enabled;
                    document.getElementById('call-cam-toggle').style.background = videoTrack.enabled ? 'rgba(255,255,255,0.15)' : 'var(--danger)';
                }
            }
        }
    </script>
</body>
