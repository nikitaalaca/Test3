<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Collage Premium Ecosystem</title>
    <style>
        :root {
            --bg-main: #f5f7fa;
            --panel-bg: rgba(255, 255, 255, 0.45);
            --panel-border: rgba(255, 255, 255, 0.6);
            --inner-border: rgba(0, 0, 0, 0.06);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent: #0071e3;
            --accent-gradient: linear-gradient(135deg, #0071e3 0%, #34aadc 100%);
            --bubble-in: rgba(255, 255, 255, 0.8);
            --bubble-out: #0071e3;
            --bubble-out-text: #ffffff;
            --shadow-premium: 0 20px 50px rgba(0, 0, 0, 0.05);
            --shadow-smooth: 0 8px 32px rgba(31, 38, 135, 0.07);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --spring-transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            --smooth-transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            --sidebar-width: 360px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
        body, html { width: 100%; height: 100%; background: var(--bg-main); color: var(--text-primary); overflow: hidden; position: relative; }

        .ambient-glow { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,113,227,0.1) 0%, rgba(52,170,220,0) 70%); top: -200px; left: -200px; z-index: 1; pointer-events: none; }
        
        #app-layout { display: flex; width: 100vw; height: 100vh; height: 100dvh; position: relative; z-index: 2; overflow: hidden; will-change: transform; }
        .glass-panel { background: var(--panel-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid var(--panel-border); box-shadow: var(--shadow-smooth); transform: translateZ(0); }

        #sidebar-container { width: var(--sidebar-width); height: 100%; display: flex; flex-direction: column; z-index: 10; flex-shrink: 0; transition: var(--spring-transition); will-change: transform; }
        #main-chat-container { flex: 1; height: 100%; display: flex; flex-direction: column; position: relative; z-index: 5; transition: var(--spring-transition); border-left: 1px solid var(--inner-border); will-change: transform; }

        @media (max-width: 768px) {
            #sidebar-container { width: 100vw; position: absolute; left: 0; top: 0; bottom: 0; z-index: 10; transform: translateX(0); }
            #main-chat-container { width: 100vw; position: absolute; left: 0; top: 0; bottom: 0; z-index: 20; transform: translateX(100vw); }
            #app-layout.chat-opened #sidebar-container { transform: translateX(-25vw); filter: blur(4px); opacity: 0.6; }
            #app-layout.chat-opened #main-chat-container { transform: translateX(0); }
            .mobile-back-btn { display: flex !important; }
        }

        .sidebar-header { padding: 24px 20px 16px; display: flex; align-items: center; justify-content: space-between; }
        .brand-title { font-size: 24px; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; }
        
        .search-box { padding: 0 16px 16px; display: flex; gap: 8px; }
        .search-inner { flex: 1; display: flex; align-items: center; background: rgba(0,0,0,0.04); padding: 10px 14px; border-radius: var(--radius-sm); border: 1px solid transparent; transition: var(--smooth-transition); }
        .search-inner:focus-within { background: rgba(255,255,255,0.8); border-color: rgba(0,113,227,0.3); }
        .search-inner input { border: none; background: transparent; outline: none; width: 100%; margin-left: 8px; color: var(--text-primary); font-size: 15px; }

        .tab-bar { display: flex; padding: 0 16px 12px; gap: 6px; border-bottom: 1px solid var(--inner-border); }
        .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-secondary); font-size: 14px; font-weight: 600; border-radius: var(--radius-sm); cursor: pointer; transition: var(--smooth-transition); }
        .tab-btn.active { background: rgba(0,113,227,0.08); color: var(--accent); }

        .scroller-content { flex: 1; overflow-y: auto; padding: 10px 16px; display: none; will-change: transform; }
        .scroller-content.active { display: block; }

        .item-row { display: flex; align-items: center; padding: 12px; border-radius: var(--radius-md); cursor: pointer; transition: var(--smooth-transition); margin-bottom: 6px; border: 1px solid transparent; position: relative; }
        .item-row:hover { background: rgba(255,255,255,0.6); transform: translateY(-1px); }
        .item-row.active { background: rgba(255,255,255,0.9); border-color: rgba(0,113,227,0.15); box-shadow: var(--shadow-smooth); }
        
        .avatar-ui { width: 46px; height: 46px; border-radius: 50%; color: white; font-weight: 700; display: flex; align-items: center; justify-content: center; font-size: 14px; background-size: cover; background-position: center; flex-shrink: 0; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05); }

        .row-meta { flex: 1; margin-left: 14px; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
        .row-header-line { display: flex; justify-content: space-between; align-items: center; }
        .row-title { font-weight: 600; font-size: 15px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .row-time-lbl { font-size: 11px; color: var(--text-secondary); margin-left: 6px; }
        .row-sub-line { display: flex; justify-content: space-between; align-items: center; margin-top: 3px; }
        .row-sub { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; padding-right: 8px; }
        
        .unread-badge-count { background: var(--accent); color: white; font-size: 11px; font-weight: 700; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }

        .chat-header { padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--inner-border); }
        .chat-messages-area { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; will-change: transform; }

        .msg-container { display: flex; flex-direction: column; max-width: 70%; }
        .msg-container.incoming { align-self: flex-start; }
        .msg-container.outgoing { align-self: flex-end; }
        
        .msg-bubble-main { padding: 12px 16px; border-radius: var(--radius-md); font-size: 15px; line-height: 1.45; word-break: break-word; position: relative; }
        .incoming .msg-bubble-main { background: var(--bubble-in); color: var(--text-primary); border-top-left-radius: 4px; border: 1px solid var(--panel-border); }
        .outgoing .msg-bubble-main { background: var(--accent-gradient); color: var(--bubble-out-text); border-top-right-radius: 4px; }
        .msg-time { font-size: 10px; margin-top: 4px; opacity: 0.6; text-align: right; }
        
        .msg-media-preview { max-width: 100%; border-radius: var(--radius-sm); margin-bottom: 6px; display: block; }
        .msg-file-badge { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.05); padding: 10px 14px; border-radius: var(--radius-sm); margin-bottom: 6px; text-decoration: none; color: inherit; font-size: 13.5px; }

        .chat-input-bar { padding: 16px 24px calc(16px + env(safe-area-inset-bottom)); border-top: 1px solid var(--inner-border); display: flex; flex-direction: column; gap: 10px; }
        .input-row-container { display: flex; align-items: center; gap: 10px; }
        .chat-input-bar input[type="text"] { flex: 1; padding: 14px 18px; border: 1px solid transparent; border-radius: var(--radius-md); background: rgba(0,0,0,0.04); color: var(--text-primary); font-size: 15px; outline: none; transition: var(--smooth-transition); }
        .chat-input-bar input[type="text"]:focus { background: rgba(255,255,255,0.9); border-color: rgba(0,113,227,0.2); }
        
        .circle-action-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: rgba(0,0,0,0.04); color: var(--text-primary); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: var(--spring-transition); }
        .circle-action-btn:hover { transform: scale(1.05); }
        .circle-action-btn.primary { background: var(--accent-gradient); color: white; }

        .fullscreen-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-main); z-index: 999; display: none; align-items: center; justify-content: center; }
        .fullscreen-overlay.active { display: flex; }
        .auth-card { width: 92%; max-width: 420px; padding: 32px; border-radius: var(--radius-lg); background: rgba(255,255,255,0.7); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid var(--panel-border); box-shadow: var(--shadow-premium); }

        .modal-overlay-system { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.15); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 800; display: none; align-items: center; justify-content: center; }
        .modal-overlay-system.active { display: flex; }
        .generic-modal-card { width: 90%; max-width: 440px; background: rgba(255,255,255,0.85); border: 1px solid var(--panel-border); border-radius: var(--radius-lg); padding: 28px; box-shadow: var(--shadow-premium); }

        #video-call-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #09090b; z-index: 900; display: none; flex-direction: column; justify-content: space-between; }
        #video-call-overlay.active { display: flex; }
        .remote-video-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .local-video-frame { position: absolute; top: calc(20px + env(safe-area-inset-top)); right: 20px; width: 120px; height: 180px; object-fit: cover; z-index: 5; border-radius: var(--radius-md); border: 2px solid rgba(255,255,255,0.25); }
        .call-controls-bar { position: absolute; bottom: calc(40px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 20px; background: rgba(255,255,255,0.15); padding: 14px 28px; border-radius: 40px; backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.2); }
        .call-btn { width: 56px; height: 56px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; }
        .call-btn.hangup { background: #ff3b30; }
        .call-btn.toggle { background: rgba(255,255,255,0.2); }

        .premium-input { width: 100%; padding: 14px; background: rgba(0,0,0,0.04); border: 1px solid transparent; border-radius: var(--radius-sm); color: var(--text-primary); outline: none; margin-bottom: 14px; font-size: 15px; }
        .premium-input:focus { background: white; border-color: var(--accent); }
        .empty-chat-stub { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); text-align: center; }
        
        .checkbox-member-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--inner-border); }
        .checkbox-member-row input { width: 18px; height: 18px; }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <div id="auth-screen-layer" class="fullscreen-overlay active">
        <div class="auth-card" id="auth-main-card-node"></div>
    </div>

    <div id="settings-modal-overlay" class="modal-overlay-system" onclick="closeProfileSettingsModal()">
        <div class="generic-modal-card" onclick="event.stopPropagation()">
            <h3 style="margin-bottom: 16px; font-size: 20px; font-weight: 700;">Настройки профиля</h3>
            
            <label style="font-size:11px; color:var(--text-secondary); font-weight:700; display:block; margin-bottom:6px;">ФОТО ПРОФИЛЯ</label>
            <div style="display:flex; align-items:center; gap:16px; margin-bottom:16px;">
                <div id="settings-avatar-preview" class="avatar-ui" style="width:64px; height:64px; font-size:20px;"></div>
                <input type="file" id="avatar-file-input" accept="image/*" style="display:none;" onchange="processAvatarSelection(event)">
                <button class="tab-btn" style="background:rgba(0,0,0,0.04); padding:8px 12px;" onclick="document.getElementById('avatar-file-input').click()">Выбрать фото</button>
            </div>

            <label style="font-size:11px; color:var(--text-secondary); font-weight:700; display:block; margin-bottom:6px;">ВАШЕ ИМЯ</label>
            <input type="text" id="settings-name-input" class="premium-input">
            <label style="font-size:11px; color:var(--text-secondary); font-weight:700; display:block; margin-bottom:6px;">ОТДЕЛ / ДОЛЖНОСТЬ</label>
            <input type="text" id="settings-role-input" class="premium-input">
            <button class="circle-action-btn primary" style="width:100%; border-radius:12px; font-weight:600;" onclick="saveProfileSettingsChanges()">Сохранить изменения</button>
            <button class="tab-btn" style="width:100%; margin-top:12px; color:#ff3b30; font-weight: 700;" onclick="executeLogoutSystem()">Выйти из системы</button>
        </div>
    </div>

    <div id="group-modal-overlay" class="modal-overlay-system" onclick="closeGroupChatModal()">
        <div class="generic-modal-card" onclick="event.stopPropagation()">
            <h3 id="group-modal-title" style="margin-bottom: 16px; font-size: 20px; font-weight: 700;">Создание командного чата</h3>
            <label style="font-size:11px; color:var(--text-secondary); font-weight:700; display:block; margin-bottom:6px;">НАЗВАНИЕ КОМАНДЫ</label>
            <input type="text" id="group-name-input" class="premium-input" placeholder="Например: Разработка">
            
            <label style="font-size:11px; color:var(--text-secondary); font-weight:700; display:block; margin-bottom:6px;">ВЫБЕРИТЕ УЧАСТНИКОВ</label>
            <div id="group-members-selectors-list" style="max-height: 200px; overflow-y: auto; margin-bottom: 20px; padding-right: 4px;"></div>

            <button id="group-submit-btn" class="circle-action-btn primary" style="width:100%; border-radius:12px; font-weight:600;" onclick="commitGroupChatAction()">Создать команду</button>
        </div>
    </div>

    <div id="video-call-overlay">
        <video id="remote-video-node" class="remote-video-frame" autoplay playsinline></video>
        <video id="local-video-node" class="local-video-frame" autoplay playsinline muted></video>
        <div class="call-controls-bar">
            <button class="call-btn toggle" onclick="toggleLocalVideoMute()" id="call-cam-toggle">CAM</button>
            <button class="call-btn hangup" onclick="endCurrentActiveCallSession()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transform: rotate(135deg);"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
            </button>
        </div>
    </div>

    <div id="app-layout">
        <aside id="sidebar-container" class="glass-panel">
            <div class="sidebar-header">
                <span class="brand-title">Коллаж</span>
                <div id="my-avatar-anchor" style="cursor:pointer;" onclick="openProfileSettingsModal()"></div>
            </div>
            <div class="search-box">
                <div class="search-inner">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="global-search-input" placeholder="Поиск..." oninput="triggerLocalSearchFilter()">
                </div>
                <button class="circle-action-btn primary" style="width:40px; height:40px; border-radius:10px;" onclick="openCreateGroupModal()" title="Создать команду">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
            <nav class="tab-bar">
                <button class="tab-btn active" id="tab-btn-chats" onclick="switchSidebarTab('chats')">Чаты</button>
                <button class="tab-btn" id="tab-btn-contacts" onclick="switchSidebarTab('contacts')">Коллеги</button>
            </nav>
            <div id="tab-content-chats" class="scroller-content active"></div>
            <div id="tab-content-contacts" class="scroller-content"></div>
        </aside>

        <main id="main-chat-container" class="glass-panel">
            <div id="active-chat-subsystem" style="display:none; flex-direction:column; height:100%;">
                <header class="chat-header">
                    <div style="display:flex; align-items:center; min-width:0;">
                        <button class="mobile-back-btn" style="display:none; background:transparent; border:none; color:var(--accent); padding-right:12px;" onclick="exitActiveChatView()">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        </button>
                        <div id="active-chat-avatar-slot"></div>
                        <div style="margin-left:14px; min-width:0;">
                            <div class="row-title" id="active-chat-name-target">...</div>
                            <div class="row-sub" id="active-chat-status-target">...</div>
                        </div>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button id="header-edit-group-btn" class="circle-action-btn" style="display:none;" onclick="openEditGroupModal()" title="Управление командой">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4Z"></path></svg>
                        </button>
                        <button id="header-call-btn" class="circle-action-btn primary" onclick="initiateOutgoingVideoCall()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                        </button>
                    </div>
                </header>

                <div class="chat-messages-area" id="chat-messages-flow-root"></div>

                <div id="attachment-preview-zone" style="display:none; padding:10px 24px; background:rgba(255,255,255,0.9); border-top:1px solid var(--inner-border); align-items:center; justify-content:between;">
                    <div id="preview-pill-text" style="font-size:13px; font-weight:600; color:var(--accent);"></div>
                    <button class="tab-btn" style="color:#ff3b30;" onclick="clearSelectedAttachmentSlot()">Удалить</button>
                </div>

                <footer class="chat-input-bar">
                    <div class="input-row-container">
                        <button class="circle-action-btn" onclick="document.getElementById('hidden-file-picker').click()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transform: rotate(45deg);"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                        </button>
                        <input type="file" id="hidden-file-picker" style="display:none;" onchange="handleFileSelectionPipeline(event)">
                        
                        <input type="text" id="chat-core-input-field" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') dispatchMessagePacket('text')">
                        
                        <button id="voice-record-action-btn" class="circle-action-btn" onclick="toggleVoiceRecordingProcess()" title="Записать голосовое">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 1v10c2.21 0 4-1.79 4-4s-1.79-4-4-4z"></path><path d="M19 10v1a7 7 0 0 1-14 0v-1"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                        </button>

                        <button class="circle-action-btn primary" onclick="dispatchMessagePacket('text')">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </footer>
            </div>

            <div id="empty-chat-stub-layer" class="empty-chat-stub">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="1.5" style="opacity:0.2; margin-bottom:12px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <h3 style="font-weight:600; color:var(--text-secondary); font-size:16px;">Выберите или создайте чат</h3>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUbD08gGbhrkGIGgsIZhTEWNTTU_efY",
            authDomain: "yw-83b3e.firebaseapp.com",
            databaseURL: "https://yw-83b3e-default-rtdb.firebaseio.com",
            projectId: "yw-83b3e",
            storageBucket: "yw-83b3e.firebasestorage.app",
            messagingSenderId: "513977614231",
            appId: "1:513977614231:web:0a04427784e8259fdeced2"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentUserId = localStorage.getItem('premium_session_uid') || null;
        let allUsers = [];
        let activeTab = 'chats';
        let activeChatTargetId = null; 
        let searchString = "";

        // Потоки файлов
        let currentSelectedFileBase64 = null;
        let currentSelectedFileName = null;
        let currentSelectedFileType = null;

        // Переменные диктофона
        let voiceMediaRecorder = null;
        let voiceAudioChunks = [];
        let isVoiceRecordingActive = false;

        // Инициализация WebRTC
        let localStream = null;
        let peerConnection = null;
        let currentCallRef = null;
        const rtcIceConfig = { iceServers: [{ urls: ['stun:stun.l.google.com:19302'] }] };

        window.addEventListener('DOMContentLoaded', () => { initializeEcosystemCore(); });

        function initializeEcosystemCore() {
            database.ref('users').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                allUsers = Object.values(data);
                buildAppUIRenderers();
            });

            if (currentUserId) {
                document.getElementById('auth-screen-layer').classList.remove('active');
                subscribeToChatsRealtimeMetadata();
            } else {
                drawAuthUIForm(false);
            }
        }

        function drawAuthUIForm(isRegister) {
            const container = document.getElementById('auth-main-card-node');
            if (!isRegister) {
                container.innerHTML = `
                    <h2 style="font-weight:800; font-size:24px; margin-bottom:6px;">Вход</h2>
                    <input type="text" id="f-login" class="premium-input" placeholder="Логин">
                    <input type="password" id="f-pass" class="premium-input" placeholder="Пароль">
                    <button class="circle-action-btn primary" style="width:100%; border-radius:14px; font-weight:600;" onclick="executeLoginFlow()">Войти</button>
                    <div style="text-align:center; font-size:14px; color:var(--accent); margin-top:16px; cursor:pointer;" onclick="drawAuthUIForm(true)">Регистрация</div>
                `;
            } else {
                container.innerHTML = `
                    <h2 style="font-weight:800; font-size:24px; margin-bottom:6px;">Регистрация</h2>
                    <input type="text" id="f-reg-login" class="premium-input" placeholder="Логин">
                    <input type="text" id="f-reg-name" class="premium-input" placeholder="Имя и Фамилия">
                    <input type="text" id="f-reg-role" class="premium-input" placeholder="Должность">
                    <input type="password" id="f-reg-pass" class="premium-input" placeholder="Пароль">
                    <button class="circle-action-btn primary" style="width:100%; border-radius:14px; font-weight:600;" onclick="executeRegistrationFlow()">Создать профиль</button>
                    <div style="text-align:center; font-size:14px; color:var(--accent); margin-top:16px; cursor:pointer;" onclick="drawAuthUIForm(false)">Назад ко входу</div>
                `;
            }
        }

        function executeRegistrationFlow() {
            const login = document.getElementById('f-reg-login').value.trim().toLowerCase();
            const name = document.getElementById('f-reg-name').value.trim();
            const role = document.getElementById('f-reg-role').value.trim();
            const pass = document.getElementById('f-reg-pass').value.trim();
            if(!login || !name || !role || !pass) return;

            const uid = "uid_" + Date.now();
            const packet = { id: uid, login, name, role, pass, color: "#0071e3", avatar: "" };

            database.ref('users/' + uid).set(packet).then(() => {
                currentUserId = uid;
                localStorage.setItem('premium_session_uid', uid);
                document.getElementById('auth-screen-layer').classList.remove('active');
                subscribeToChatsRealtimeMetadata();
                initializeEcosystemCore();
            });
        }

        function executeLoginFlow() {
            const login = document.getElementById('f-login').value.trim().toLowerCase();
            const pass = document.getElementById('f-pass').value.trim();
            const matched = allUsers.find(u => u.login === login && u.pass === pass);
            if(!matched) { alert('Ошибка авторизации'); return; }

            currentUserId = matched.id;
            localStorage.setItem('premium_session_uid', matched.id);
            document.getElementById('auth-screen-layer').classList.remove('active');
            subscribeToChatsRealtimeMetadata();
            initializeEcosystemCore();
        }

        // РАБОТА С АВАТАРКАМИ ПРОФИЛЯ
        function openProfileSettingsModal() {
            const me = allUsers.find(u => u.id === currentUserId);
            if(!me) return;
            document.getElementById('settings-name-input').value = me.name || '';
            document.getElementById('settings-role-input').value = me.role || '';
            
            const targetPreview = document.getElementById('settings-avatar-preview');
            if(me.avatar) {
                targetPreview.style.backgroundImage = `url(${me.avatar})`;
                targetPreview.innerText = '';
            } else {
                targetPreview.style.backgroundImage = 'none';
                targetPreview.style.backgroundColor = me.color || '#0071e3';
                targetPreview.innerText = me.name.substring(0,2).toUpperCase();
            }
            
            document.getElementById('settings-modal-overlay').classList.add('active');
        }

        function closeProfileSettingsModal() {
            document.getElementById('settings-modal-overlay').classList.remove('active');
        }

        function processAvatarSelection(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Img = e.target.result;
                document.getElementById('settings-avatar-preview').style.backgroundImage = `url(${base64Img})`;
                document.getElementById('settings-avatar-preview').innerText = '';
                document.getElementById('settings-avatar-preview').dataset.blob = base64Img;
            };
            reader.readAsDataURL(file);
        }

        function saveProfileSettingsChanges() {
            const newName = document.getElementById('settings-name-input').value.trim();
            const newRole = document.getElementById('settings-role-input').value.trim();
            const uploadedAvatar = document.getElementById('settings-avatar-preview').dataset.blob;
            if(!newName || !newRole) return;

            const updates = { name: newName, role: newRole };
            if (uploadedAvatar) updates.avatar = uploadedAvatar;

            database.ref('users/' + currentUserId).update(updates).then(() => {
                closeProfileSettingsModal();
            });
        }

        function executeLogoutSystem() {
            localStorage.removeItem('premium_session_uid');
            location.reload();
        }

        // КОМАНДНЫЕ ЧАТЫ (ГРУППЫ)
        let groupEditingId = null;
        function openCreateGroupModal() {
            groupEditingId = null;
            document.getElementById('group-modal-title').innerText = "Создание командного чата";
            document.getElementById('group-name-input').value = '';
            document.getElementById('group-submit-btn').innerText = "Создать команду";
            
            renderGroupMembersSelectionList([]);
            document.getElementById('group-modal-overlay').classList.add('active');
        }

        function openEditGroupModal() {
            if (!activeChatTargetId || !activeChatTargetId.startsWith('group_')) return;
            groupEditingId = activeChatTargetId;
            
            document.getElementById('group-modal-title').innerText = "Управление командой";
            document.getElementById('group-submit-btn').innerText = "Сохранить изменения";

            database.ref('chats/' + activeChatTargetId).once('value', (snap) => {
                const groupData = snap.val();
                if(!groupData) return;
                document.getElementById('group-name-input').value = groupData.name;
                const existingMembers = Object.keys(groupData.members || {});
                renderGroupMembersSelectionList(existingMembers);
                document.getElementById('group-modal-overlay').classList.add('active');
            });
        }

        function closeGroupChatModal() {
            document.getElementById('group-modal-overlay').classList.remove('active');
        }

        function renderGroupMembersSelectionList(checkedUids) {
            const container = document.getElementById('group-members-selectors-list');
            container.innerHTML = '';
            allUsers.forEach(u => {
                if (u.id === currentUserId) return;
                const isChecked = checkedUids.includes(u.id) ? 'checked' : '';
                const row = document.createElement('div');
                row.className = 'checkbox-member-row';
                row.innerHTML = `
                    <input type="checkbox" id="cb-user-${u.id}" value="${u.id}" ${isChecked}>
                    <label style="font-size:14px; font-weight:500;" for="cb-user-${u.id}">${u.name} (${u.role})</label>
                `;
                container.appendChild(row);
            });
        }

        function commitGroupChatAction() {
            const name = document.getElementById('group-name-input').value.trim();
            if(!name) return;

            const membersPacket = { [currentUserId]: true };
            allUsers.forEach(u => {
                const el = document.getElementById(`cb-user-${u.id}`);
                if(el && el.checked) membersPacket[u.id] = true;
            });

            if(groupEditingId) {
                // Редактирование
                database.ref('chats/' + groupEditingId).update({
                    name: name,
                    members: membersPacket
                }).then(() => {
                    closeGroupChatModal();
                    openChatSession(groupEditingId);
                });
            } else {
                // Создание новой команды
                const groupId = 'group_' + Date.now();
                const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                const meta = {
                    id: groupId,
                    type: 'group',
                    name: name,
                    members: membersPacket,
                    lastMessage: "Команда создана",
                    lastTime: time,
                    lastSender: currentUserId
                };

                database.ref('chats/' + groupId).set(meta).then(() => {
                    closeGroupChatModal();
                    openChatSession(groupId);
                });
            }
        }

        // ОПТИМИЗИРОВАННАЯ КЛИЕНТСКАЯ СИНХРОНИЗАЦИЯ ЧАТОВ
        function subscribeToChatsRealtimeMetadata() {
            database.ref('chats').on('value', () => {
                buildAppUIRenderers();
            });
        }

        function buildAppUIRenderers() {
            const me = allUsers.find(u => u.id === currentUserId);
            if(!me) return;
            
            // Рендер аватарки в шапке
            const anchor = document.getElementById('my-avatar-anchor');
            if(me.avatar) {
                anchor.innerHTML = `<div class="avatar-ui" style="background-image:url(${me.avatar}); width:38px; height:38px;"></div>`;
            } else {
                anchor.innerHTML = `<div class="avatar-ui" style="background:${me.color}; width:38px; height:38px; font-size:13px;">${me.name.substring(0,2).toUpperCase()}</div>`;
            }
            
            if (activeTab === 'chats') renderChatsTab();
            if (activeTab === 'contacts') renderContactsTab();
            if (activeChatTargetId) updateActiveChatHeader();
        }

        function switchSidebarTab(target) {
            activeTab = target;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-btn-' + target).classList.add('active');
            buildAppUIRenderers();
        }

        function renderContactsTab() {
            const root = document.getElementById('tab-content-contacts');
            root.className = "scroller-content active";
            document.getElementById('tab-content-chats').className = "scroller-content";
            root.innerHTML = '';

            allUsers.filter(u => u.id !== currentUserId).forEach(u => {
                if(searchString && !u.name.toLowerCase().includes(searchString)) return;
                
                const row = document.createElement('div');
                row.className = `item-row ${activeChatTargetId === u.id ? 'active' : ''}`;
                row.onclick = () => openChatSession(u.id);
                
                let avatarHTML = u.avatar ? `<div class="avatar-ui" style="background-image:url(${u.avatar})"></div>` : `<div class="avatar-ui" style="background:${u.color}">${u.name.substring(0,2).toUpperCase()}</div>`;

                row.innerHTML = `
                    ${avatarHTML}
                    <div class="row-meta">
                        <div class="row-title">${u.name}</div>
                        <div class="row-sub">${u.role}</div>
                    </div>
                `;
                root.appendChild(row);
            });
        }

        function renderChatsTab() {
            const root = document.getElementById('tab-content-chats');
            root.className = "scroller-content active";
            document.getElementById('tab-content-contacts').className = "scroller-content";
            root.innerHTML = '';

            database.ref('chats').once('value', (snapshot) => {
                const chatsData = snapshot.val() || {};
                
                Object.values(chatsData).forEach(chat => {
                    // Проверка доступа к чату (ЛС или участник группы)
                    const isDirect = chat.type === 'direct' || !chat.type;
                    let isParticipant = false;
                    let chatTitle = "";
                    let avatarHTML = "";

                    if (isDirect) {
                        const parts = chat.id.split('__');
                        if (parts.includes(currentUserId)) {
                            isParticipant = true;
                            const companionId = parts.find(id => id !== currentUserId) || currentUserId;
                            const companion = allUsers.find(u => u.id === companionId);
                            if (companion) {
                                chatTitle = companion.name;
                                avatarHTML = companion.avatar ? `<div class="avatar-ui" style="background-image:url(${companion.avatar})"></div>` : `<div class="avatar-ui" style="background:${companion.color}">${companion.name.substring(0,2).toUpperCase()}</div>`;
                            }
                        }
                    } else if (chat.type === 'group') {
                        if (chat.members && chat.members[currentUserId]) {
                            isParticipant = true;
                            chatTitle = chat.name;
                            // Строгая буквенная аватарка для командных чатов
                            avatarHTML = `<div class="avatar-ui" style="background:#53535a;">${chat.name.substring(0,2).toUpperCase()}</div>`;
                        }
                    }

                    if (!isParticipant) return;
                    if (searchString && !chatTitle.toLowerCase().includes(searchString)) return;

                    // Вычисление превью последнего сообщения
                    let previewPrefix = "";
                    if(chat.lastSender) {
                        previewPrefix = chat.lastSender === currentUserId ? "Вы: " : "";
                    }
                    const textSnapshot = chat.lastMessage || "Нет сообщений";

                    // Вычисление счетчика непрочитанных
                    let unreadBadgeHTML = "";
                    if (chat.unread && chat.unread[currentUserId]) {
                        unreadBadgeHTML = `<div class="unread-badge-count">${chat.unread[currentUserId]}</div>`;
                    }

                    const row = document.createElement('div');
                    row.className = `item-row ${activeChatTargetId === chat.id ? 'active' : ''}`;
                    row.onclick = () => openChatSession(chat.id);
                    row.innerHTML = `
                        ${avatarHTML}
                        <div class="row-meta">
                            <div class="row-header-line">
                                <div class="row-title">${chatTitle}</div>
                                <div class="row-time-lbl">${chat.lastTime || ''}</div>
                            </div>
                            <div class="row-sub-line">
                                <div class="row-sub">${previewPrefix}${textSnapshot}</div>
                                ${unreadBadgeHTML}
                            </div>
                        </div>
                    `;
                    root.appendChild(row);
                });
            });
        }

        let msgListener = null;
        function openChatSession(id) {
            activeChatTargetId = id;
            document.getElementById('empty-chat-stub-layer').style.display = 'none';
            document.getElementById('active-chat-subsystem').style.display = 'flex';
            document.getElementById('app-layout').classList.add('chat-opened');

            // Сброс счетчика непрочитанных при открытии чата
            database.ref(`chats/${id}/unread/${currentUserId}`).set(0);

            // Кнопка настройки доступна только в командных чатах
            document.getElementById('header-edit-group-btn').style.display = id.startsWith('group_') ? 'block' : 'none';

            buildAppUIRenderers();

            if(msgListener) msgListener.off();
            msgListener = database.ref('messages/' + id);
            msgListener.on('value', (snapshot) => {
                const data = snapshot.val() || {};
                renderMessagesFlow(Object.values(data));
            });
        }

        function renderMessagesFlow(list) {
            const flow = document.getElementById('chat-messages-flow-root');
            flow.innerHTML = '';
            list.forEach(m => {
                const isMe = m.senderId === currentUserId;
                const container = document.createElement('div');
                container.className = `msg-container ${isMe ? 'outgoing' : 'incoming'}`;
                
                let mediaPayloadHTML = '';
                if(m.fileData) {
                    if(m.fileType && m.fileType.startsWith('image/')) {
                        mediaPayloadHTML = `<img src="${m.fileData}" class="msg-media-preview" alt="Image">`;
                    } else if (m.fileType && m.fileType.startsWith('audio/')) {
                        // Чистый аудиоплеер для голосовых сообщений
                        mediaPayloadHTML = `<audio src="${m.fileData}" controls style="max-width:100%; margin-bottom:6px; outline:none;"></audio>`;
                    } else {
                        mediaPayloadHTML = `
                            <a href="${m.fileData}" download="${m.fileName || 'file'}" class="msg-file-badge">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                                <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:160px;">${m.fileName || 'Документ'}</span>
                            </a>`;
                    }
                }

                // Отображение имени отправителя в командных чатах
                let nameLabelHTML = "";
                if(!isMe && activeChatTargetId.startsWith('group_')) {
                    const sender = allUsers.find(u => u.id === m.senderId);
                    if(sender) {
                        nameLabelHTML = `<div style="font-size:11px; font-weight:700; color:var(--accent); margin-bottom:4px;">${sender.name}</div>`;
                    }
                }

                container.innerHTML = `
                    <div class="msg-bubble-main">
                        ${nameLabelHTML}
                        ${mediaPayloadHTML}
                        <div style="${m.text ? '' : 'display:none;'}">${m.text || ''}</div>
                        <div class="msg-time">${m.time}</div>
                    </div>
                `;
                flow.appendChild(container);
            });
            flow.scrollTop = flow.scrollHeight;
        }

        function updateActiveChatHeader() {
            const targetHeader = document.getElementById('active-chat-name-target');
            const targetSub = document.getElementById('active-chat-status-target');
            const avatarSlot = document.getElementById('active-chat-avatar-slot');

            if(activeChatTargetId.startsWith('group_')) {
                database.ref('chats/' + activeChatTargetId).once('value', (snap) => {
                    const group = snap.val();
                    if(!group) return;
                    targetHeader.innerText = group.name;
                    targetSub.innerText = `Командный чат: ${Object.keys(group.members || {}).length} участников`;
                    avatarSlot.innerHTML = `<div class="avatar-ui" style="background:#53535a; width:40px; height:40px; font-size:14px;">${group.name.substring(0,2).toUpperCase()}</div>`;
                });
            } else {
                const companion = allUsers.find(u => u.id === activeChatTargetId);
                if(!companion) return;
                targetHeader.innerText = companion.name;
                targetSub.innerText = companion.role;
                avatarSlot.innerHTML = companion.avatar ? `<div class="avatar-ui" style="background-image:url(${companion.avatar}); width:40px; height:40px;"></div>` : `<div class="avatar-ui" style="background:${companion.color}; width:40px; height:40px; font-size:14px;">${companion.name.substring(0,2).toUpperCase()}</div>`;
            }
        }

        // ОТПРАВКА СООБЩЕНИЙ (БЫСТРАЯ СЕТЕВАЯ МОДЕЛЬ METADATA)
        function dispatchMessagePacket(customType = 'text', customBlob = null, customName = null) {
            const input = document.getElementById('chat-core-input-field');
            const text = input.value.trim();
            if(!text && !currentSelectedFileBase64 && !customBlob) return;

            // Если ЛС и метаструктура ветки чата еще не создана
            if(!activeChatTargetId.startsWith('group_')) {
                const directMetaPacket = { id: activeChatTargetId, type: 'direct', members: { [currentUserId]: true, [activeChatTargetId]: true } };
                database.ref('chats/' + activeChatTargetId).update(directMetaPacket);
            }

            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const msgNode = { senderId: currentUserId, text: text, time: time };

            let lastMessageString = text;

            if (customType === 'audio' && customBlob) {
                msgNode.fileData = customBlob;
                msgNode.fileType = 'audio/webm';
                msgNode.fileName = 'Голосовое сообщение';
                lastMessageString = "Голосовое сообщение";
            } else if (currentSelectedFileBase64) {
                msgNode.fileData = currentSelectedFileBase64;
                msgNode.fileName = currentSelectedFileName;
                msgNode.fileType = currentSelectedFileType;
                lastMessageString = currentSelectedFileName;
            }

            // Запись сообщения в ленту
            database.ref('messages/' + activeChatTargetId).push(msgNode);

            // Обновление глобального легковесного индекса чатов
            database.ref('chats/' + activeChatTargetId).once('value', (snap) => {
                const meta = snap.val() || {};
                const currentUnread = meta.unread || {};
                const membersList = Object.keys(meta.members || {});

                // Инкремент непрочитанных для всех, кроме автора сообщения
                membersList.forEach(mId => {
                    if(mId !== currentUserId) {
                        currentUnread[mId] = (currentUnread[mId] || 0) + 1;
                    }
                });

                database.ref('chats/' + activeChatTargetId).update({
                    lastMessage: lastMessageString,
                    lastTime: time,
                    lastSender: currentUserId,
                    unread: currentUnread
                });
            });

            input.value = '';
            clearSelectedAttachmentSlot();
        }

        // РАБОТА С ЗАПИСЬЮ ГОЛОСОВЫХ СООБЩЕНИЙ
        function toggleVoiceRecordingProcess() {
            const btn = document.getElementById('voice-record-action-btn');
            if (!isVoiceRecordingActive) {
                navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                    voiceMediaRecorder = new MediaRecorder(stream);
                    voiceAudioChunks = [];
                    
                    voiceMediaRecorder.ondataavailable = e => voiceAudioChunks.push(e.data);
                    voiceMediaRecorder.onstop = () => {
                        const audioBlob = new Blob(voiceAudioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            dispatchMessagePacket('audio', reader.result);
                        };
                        reader.readAsDataURL(audioBlob);
                        stream.getTracks().forEach(t => t.stop());
                    };

                    voiceMediaRecorder.start();
                    isVoiceRecordingActive = true;
                    btn.style.background = '#ff3b30';
                    btn.style.color = '#ffffff';
                }).catch(() => {
                    alert('Доступ к микрофону заблокирован.');
                });
            } else {
                voiceMediaRecorder.stop();
                isVoiceRecordingActive = false;
                btn.style.background = 'rgba(0,0,0,0.04)';
                btn.style.color = 'var(--text-primary)';
            }
        }

        function handleFileSelectionPipeline(event) {
            const file = event.target.files[0];
            if (!file) return;
            currentSelectedFileName = file.name;
            currentSelectedFileType = file.type;

            const reader = new FileReader();
            reader.onload = function(e) {
                currentSelectedFileBase64 = e.target.result;
                document.getElementById('preview-pill-text').innerText = file.name;
                document.getElementById('attachment-preview-zone').style.display = 'flex';
            };
            reader.readAsDataURL(file);
        }

        function clearSelectedAttachmentSlot() {
            currentSelectedFileBase64 = null;
            document.getElementById('attachment-preview-zone').style.display = 'none';
            document.getElementById('hidden-file-picker').value = '';
        }

        function exitActiveChatView() {
            document.getElementById('app-layout').classList.remove('chat-opened');
            activeChatTargetId = null;
        }

        function triggerLocalSearchFilter() {
            searchString = document.getElementById('global-search-input').value.trim().toLowerCase();
            buildAppUIRenderers();
        }

        // =========================================================================
        // WebRTC МЕДИА-ДВИЖОК ДЛЯ ЗВОНКОВ
        // =========================================================================
        async function initiateOutgoingVideoCall() {
            if (!activeChatTargetId || activeChatTargetId.startsWith('group_')) {
                alert('Групповые звонки временно недоступны.');
                return;
            }
            currentCallRef = database.ref('calls/' + currentUserId);
            document.getElementById('video-call-overlay').classList.add('active');

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video-node').srcObject = localStream;
            } catch {
                localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
            }

            peerConnection = new RTCPeerConnection(rtcIceConfig);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = (e) => {
                document.getElementById('remote-video-node').srcObject = e.streams[0];
            };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            await currentCallRef.set({
                callerId: currentUserId,
                calleeId: activeChatTargetId,
                status: 'ringing',
                offer: { type: offer.type, sdp: offer.sdp }
            });
        }

        function endCurrentActiveCallSession() {
            if(currentCallRef) currentCallRef.remove();
            document.getElementById('video-call-overlay').classList.remove('active');
            if(localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
            if(peerConnection) { peerConnection.close(); peerConnection = null; }
        }

        function toggleLocalVideoMute() {
            if (localStream && localStream.getVideoTracks()[0]) {
                const track = localStream.getVideoTracks()[0];
                track.enabled = !track.enabled;
                document.getElementById('call-cam-toggle').style.background = track.enabled ? 'rgba(255,255,255,0.2)' : '#ff9500';
            }
        }
