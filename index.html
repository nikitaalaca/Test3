<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Настройки интеграции с iOS Apple Home Screen -->
    <meta name="apple-mobile-web-app-title" content="ЧАТЫ CC">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180' width='180' height='180'><rect width='180' height='180' rx='42' fill='%231c1c1e'/><circle cx='90' cy='90' r='52' fill='none' stroke='url(%23glow)' stroke-width='10'/><defs><linearGradient id='glow' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%230071e3'/><stop offset='100%25' stop-color='%2334aadc'/></linearGradient></defs><text x='90' y='102' font-family='-apple-system,BlinkMacSystemFont,sans-serif' font-weight='800' font-size='32' fill='%23ffffff' text-anchor='middle' letter-spacing='-0.5'>CC</text></svg>">

    <title>Premium Ecosystem Workspace</title>
    <style>
        :root {
            --bg-main: #f5f7fa;
            --panel-bg: rgba(255, 255, 255, 0.6);
            --panel-border: rgba(255, 255, 255, 0.45);
            --inner-border: rgba(0, 0, 0, 0.05);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent: #0071e3;
            --accent-gradient: linear-gradient(135deg, #0071e3 0%, #34aadc 100%);
            --bubble-in: #ffffff;
            --bubble-out: #0071e3;
            --bubble-out-text: #ffffff;
            --shadow-premium: 0 20px 50px rgba(0, 0, 0, 0.04);
            --shadow-smooth: 0 8px 32px rgba(0, 0, 0, 0.03);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --spring-transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --sidebar-width: 360px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
        body, html { width: 100%; height: 100%; background: var(--bg-main); color: var(--text-primary); overflow: hidden; position: relative; }

        #app-layout { display: flex; width: 100vw; height: 100vh; height: 100dvh; position: relative; overflow: hidden; }
        .glass-panel { background: var(--panel-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid var(--panel-border); box-shadow: var(--shadow-smooth); transform: translateZ(0); will-change: transform; }

        #sidebar-container { width: var(--sidebar-width); height: 100%; display: flex; flex-direction: column; z-index: 10; flex-shrink: 0; position: relative; }
        #main-chat-container { flex: 1; height: 100%; display: flex; flex-direction: column; position: relative; z-index: 5; border-left: 1px solid var(--inner-border); background: rgba(255, 255, 255, 0.2); }

        @media (max-width: 768px) {
            #sidebar-container { width: 100vw; position: absolute; left: 0; top: 0; bottom: 0; z-index: 10; transition: var(--spring-transition); }
            #main-chat-container { width: 100vw; position: absolute; left: 0; top: 0; bottom: 0; z-index: 20; transform: translateX(100vw); transition: var(--spring-transition); }
            #app-layout.chat-opened #sidebar-container { transform: translateX(-30vw); opacity: 0; pointer-events: none; }
            #app-layout.chat-opened #main-chat-container { transform: translateX(0); }
            .mobile-back-btn { display: flex !important; }
        }

        .sidebar-header { padding: 24px 20px 16px; display: flex; align-items: center; justify-content: space-between; }
        .brand-title { font-size: 24px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.5px; display: flex; align-items: center; }
        
        .shimmer-cc {
            background: linear-gradient(90deg, #ff2d55, #ff9500, #4cd964, #0071e3, #ff2d55);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: cc-glow 3s linear infinite;
            font-weight: 900;
            margin-left: 6px;
            display: inline-block;
        }
        @keyframes cc-glow { to { background-position: 200% center; } }

        .search-box { padding: 0 20px 16px; display: flex; align-items: center; gap: 10px; }
        .search-inner { flex: 1; display: flex; align-items: center; background: rgba(0,0,0,0.04); padding: 10px 14px; border-radius: var(--radius-sm); border: 1px solid transparent; }
        .search-inner:focus-within { background: #fff; border-color: rgba(0,113,227,0.2); }
        .search-inner input { border: none; background: transparent; outline: none; width: 100%; margin-left: 8px; color: var(--text-primary); font-size: 15px; }

        .circle-action-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: rgba(0,0,0,0.04); color: var(--text-primary); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: var(--spring-transition); }
        .circle-action-btn:hover { transform: scale(1.04); background: rgba(0,0,0,0.06); }
        .circle-action-btn.primary { background: var(--accent-gradient); color: white; }

        /* iOS TAB BAR DOCK */
        .ios-tab-dock {
            position: absolute;
            bottom: 24px;
            left: 16px;
            right: 16px;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(30px) saturate(210%);
            -webkit-backdrop-filter: blur(30px) saturate(210%);
            border: 0.5px solid rgba(255, 255, 255, 0.45);
            border-radius: 32px;
            padding: 8px 6px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 12px 38px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.02);
            z-index: 100;
        }
        .dock-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            background: none;
            border: none;
            color: #8e8e93;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--spring-transition);
            flex: 1;
            height: 44px;
            border-radius: 20px;
        }
        .dock-item.active { color: var(--accent); }
        .dock-item .icon-wrapper { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
        .dock-item svg { width: 23px; height: 23px; stroke-width: 2.1; fill: none; transition: transform 0.2s ease; }
        .dock-item:active svg { transform: scale(0.9); }

        .scroller-content { flex: 1; overflow-y: auto; padding: 10px 16px 110px; display: none; -webkit-overflow-scrolling: touch; }
        .scroller-content.active { display: block; }

        .item-row { display: flex; align-items: center; padding: 12px 14px; border-radius: var(--radius-md); cursor: pointer; transition: all 0.2s ease; margin-bottom: 6px; border: 1px solid transparent; }
        .item-row:hover { background: rgba(255,255,255,0.7); }
        .item-row.active { background: #ffffff; border-color: rgba(0,113,227,0.08); box-shadow: var(--shadow-smooth); }
        
        .avatar-ui { width: 46px; height: 46px; border-radius: 50%; color: white; font-weight: 700; display: flex; align-items: center; justify-content: center; font-size: 14px; background-size: cover; background-position: center; flex-shrink: 0; }

        .row-meta { flex: 1; margin-left: 14px; min-width: 0; display: flex; flex-direction: column; }
        .row-header-line { display: flex; justify-content: space-between; align-items: center; }
        .row-title { font-weight: 600; font-size: 15px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .row-time-lbl { font-size: 11px; color: var(--text-secondary); margin-left: 6px; }
        .row-sub-line { display: flex; justify-content: space-between; align-items: center; margin-top: 3px; }
        .row-sub { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; padding-right: 8px; }
        
        .unread-badge-count { background: var(--accent); color: white; font-size: 11px; font-weight: 700; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        /* ПОДПИСЬ РАЗРАБОТЧИКА */
        .dev-branding {
            text-align: center;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            color: rgba(0, 0, 0, 0.2);
            padding: 8px 0;
            text-transform: uppercase;
            position: absolute;
            bottom: 4px;
            left: 0;
            right: 0;
            pointer-events: none;
            z-index: 10;
        }

        .chat-header { height: 76px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--inner-border); background: rgba(255,255,255,0.3); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .chat-messages-area { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; -webkit-overflow-scrolling: touch; }

        .msg-container { display: flex; flex-direction: column; max-width: 75%; }
        .msg-container.incoming { align-self: flex-start; }
        .msg-container.outgoing { align-self: flex-end; }
        
        .msg-bubble-main { padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-break: break-word; }
        .incoming .msg-bubble-main { background: var(--bubble-in); color: var(--text-primary); border-top-left-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .outgoing .msg-bubble-main { background: var(--accent-gradient); color: var(--bubble-out-text); border-top-right-radius: 4px; }
        .msg-time { font-size: 10px; margin-top: 4px; opacity: 0.5; text-align: right; }
        
        .audio-wrapper { display: flex; align-items: center; gap: 10px; min-width: 200px; padding: 4px 0; }
        .audio-wrapper audio { height: 32px; max-width: 100%; }

        .chat-input-bar { padding: 16px 24px calc(16px + env(safe-area-inset-bottom)); border-top: 1px solid var(--inner-border); background: rgba(255,255,255,0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .input-row-container { display: flex; align-items: center; gap: 12px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .chat-input-bar input[type="text"] { flex: 1; padding: 14px 18px; border: 1px solid transparent; border-radius: var(--radius-md); background: rgba(0,0,0,0.04); color: var(--text-primary); font-size: 15px; outline: none; transition: all 0.2s; }
        .chat-input-bar input[type="text"]:focus { background: #fff; border-color: rgba(0,113,227,0.15); }

        @media (max-width: 480px) {
            .chat-input-bar { padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); }
            .input-row-container { gap: 6px; }
            .chat-input-bar input[type="text"] { padding: 10px 12px; font-size: 14px; border-radius: 12px; }
            .circle-action-btn { width: 38px; height: 38px; }
        }

        .fullscreen-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-main); z-index: 999; display: none; align-items: center; justify-content: center; }
        .fullscreen-overlay.active { display: flex; }
        .auth-card { width: 90%; max-width: 400px; padding: 32px; border-radius: var(--radius-lg); background: #ffffff; box-shadow: var(--shadow-premium); }

        .modal-overlay-system { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.12); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 800; display: none; align-items: center; justify-content: center; }
        .modal-overlay-system.active { display: flex; }
        .generic-modal-card { width: 90%; max-width: 440px; background: #ffffff; border-radius: var(--radius-lg); padding: 28px; box-shadow: var(--shadow-premium); }

        .premium-input { width: 100%; padding: 14px; background: rgba(0,0,0,0.04); border: 1px solid transparent; border-radius: var(--radius-sm); color: var(--text-primary); outline: none; margin-bottom: 14px; font-size: 15px; }
        .premium-input:focus { background: white; border-color: var(--accent); }
        .empty-chat-stub { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); text-align: center; }
        .checkbox-member-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--inner-border); }
    </style>
</head>
<body>

    <div id="auth-screen-layer" class="fullscreen-overlay active">
        <div class="auth-card" id="auth-main-card-node"></div>
    </div>

    <!-- НАСТРОЙКИ ПРОФИЛЯ -->
    <div id="settings-modal-overlay" class="modal-overlay-system" onclick="closeProfileSettingsModal()">
        <div class="generic-modal-card" onclick="event.stopPropagation()">
            <h3 style="margin-bottom: 20px; font-size: 20px; font-weight: 700;">Настройки профиля</h3>
            
            <label style="font-size:11px; color:var(--text-secondary); font-weight:700; display:block; margin-bottom:8px;">ФОТО ПРОФИЛЯ</label>
            <div style="display:flex; align-items:center; gap:16px; margin-bottom:20px;">
                <div id="settings-avatar-preview" class="avatar-ui" style="width:64px; height:64px; font-size:20px;"></div>
                <input type="file" id="avatar-file-input" accept="image/*" style="display:none;" onchange="processAvatarSelection(event)">
                <button style="background:rgba(0,0,0,0.04); padding:8px 14px; border:none; border-radius:8px; cursor:pointer; font-weight:600;" onclick="document.getElementById('avatar-file-input').click()">Изменить фото</button>
            </div>

            <label style="font-size:11px; color:var(--text-secondary); font-weight:700; display:block; margin-bottom:6px;">ВАШЕ ИМЯ</label>
            <input type="text" id="settings-name-input" class="premium-input">
            <label style="font-size:11px; color:var(--text-secondary); font-weight:700; display:block; margin-bottom:6px;">ОТДЕЛ / ДОЛЖНОСТЬ</label>
            <input type="text" id="settings-role-input" class="premium-input">
            
            <button class="circle-action-btn primary" style="width:100%; border-radius:12px; font-weight:600;" onclick="saveProfileSettingsChanges()">Сохранить изменения</button>
            <button style="width:100%; margin-top:12px; color:#ff3b30; font-weight:700; background:none; border:none; cursor:pointer; padding:8px;" onclick="executeLogoutSystem()">Выйти из аккаунта</button>
        </div>
    </div>

    <!-- КОМАНДНЫЕ ЧАТЫ -->
    <div id="group-modal-overlay" class="modal-overlay-system" onclick="closeGroupChatModal()">
        <div class="generic-modal-card" onclick="event.stopPropagation()">
            <h3 id="group-modal-title" style="margin-bottom: 16px; font-size: 20px; font-weight: 700;">Создание командного чата</h3>
            <label style="font-size:11px; color:var(--text-secondary); font-weight:700; display:block; margin-bottom:6px;">НАЗВАНИЕ КОМАНДЫ</label>
            <input type="text" id="group-name-input" class="premium-input" placeholder="Отдел разработки">
            
            <label style="font-size:11px; color:var(--text-secondary); font-weight:700; display:block; margin-bottom:6px;">ВЫБЕРИТЕ УЧАСТНИКОВ</label>
            <div id="group-members-selectors-list" style="max-height: 180px; overflow-y: auto; margin-bottom: 20px;"></div>

            <button id="group-submit-btn" class="circle-action-btn primary" style="width:100%; border-radius:12px; font-weight:600;" onclick="commitGroupChatAction()">Создать чат</button>
        </div>
    </div>

    <!-- ГЛАВНЫЙ ИНТЕРФЕЙС -->
    <div id="app-layout">
        <aside id="sidebar-container" class="glass-panel">
            <div class="sidebar-header">
                <span class="brand-title">ЧАТЫ<span class="shimmer-cc">CC</span></span>
                <div id="my-avatar-anchor" style="cursor:pointer;" onclick="openProfileSettingsModal()"></div>
            </div>
            
            <div class="search-box">
                <div class="search-inner">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="global-search-input" placeholder="Поиск..." oninput="triggerLocalSearchFilter()">
                </div>
                <button class="circle-action-btn primary" onclick="openCreateGroupModal()" title="Создать командный чат">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
            
            <div id="tab-content-chats" class="scroller-content active"></div>
            <div id="tab-content-contacts" class="scroller-content"></div>

            <!-- БРЕНДИНГ РАЗРАБОТЧИКА -->
            <div class="dev-branding">BY EGORKIN DEV</div>

            <!-- iOS TAB BAR -->
            <nav class="ios-tab-dock">
                <button class="dock-item active" id="dock-btn-chats" onclick="switchSidebarTab('chats')">
                    <div class="icon-wrapper">
                        <svg viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.123 2.994 2.707 3.227 1.129.166 2.27.293 3.423.379.35.026.67.21.865.501L12 21l2.755-4.133a1.14 1.14 0 0 1 .865-.501c1.154-.086 2.294-.213 3.423-.379 1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v5.03Z" /></svg>
                    </div>
                    <span>Чаты</span>
                </button>
                <button class="dock-item" id="dock-btn-contacts" onclick="switchSidebarTab('contacts')">
                    <div class="icon-wrapper">
                        <svg viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" /></svg>
                    </div>
                    <span>Коллеги</span>
                </button>
                <button class="dock-item" id="dock-btn-settings" onclick="switchSidebarTab('settings')">
                    <div class="icon-wrapper">
                        <svg viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.43l-1.003.767a1.123 1.123 0 0 0-.417 1.03c.004.074.006.148.006.222 0 .074-.002.148-.006.222a1.123 1.123 0 0 0 .417 1.03l1.003.767a1.125 1.125 0 0 1 .26 1.43l-1.296 2.247a1.125 1.125 0 0 1-1.37.49l-1.216-.456a1.125 1.125 0 0 0-1.07.124c-.073.044-.146.087-.22.128-.332.183-.582.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281a1.125 1.125 0 0 0-.646-.87c-.074-.04-.148-.083-.22-.127a1.124 1.124 0 0 0-1.074-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.43l1.004-.767a1.122 1.122 0 0 0 .416-1.03c-.004-.074-.006-.148-.006-.222 0-.074.002-.148.006-.222a1.122 1.122 0 0 0-.416-1.03l-1.004-.767a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.49l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /></svg>
                    </div>
                    <span>Настройки</span>
                </button>
            </nav>
        </aside>

        <main id="main-chat-container">
            <div id="active-chat-subsystem" style="display:none; flex-direction:column; height:100%;">
                <header class="chat-header">
                    <div style="display:flex; align-items:center; min-width:0;">
                        <button class="mobile-back-btn" style="display:none; background:transparent; border:none; color:var(--accent); padding-right:16px;" onclick="exitActiveChatView()">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        </button>
                        <div id="active-chat-avatar-slot"></div>
                        <div style="margin-left:14px; min-width:0;">
                            <div class="row-title" id="active-chat-name-target">...</div>
                            <div class="row-sub" id="active-chat-status-target">...</div>
                        </div>
                    </div>
                    <!-- БЛОК УПРАВЛЕНИЯ В ШАПКЕ ЧАТА -->
                    <div style="display:flex; align-items:center; gap:10px;">
                        <!-- ВОЗВРАЩЕННАЯ КНОПКА ВИДЕОВЫЗОВА -->
                        <button id="header-video-call-btn" class="circle-action-btn" onclick="startVideoCallProcess()" title="Начать видеозвонок">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                        </button>
                        <button id="header-edit-group-btn" class="circle-action-btn" style="display:none;" onclick="openEditGroupModal()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4Z"></path></svg>
                        </button>
                    </div>
                </header>

                <div class="chat-messages-area" id="chat-messages-flow-root"></div>

                <div id="attachment-preview-zone" style="display:none; padding:12px 24px; background:#fff; border-top:1px solid var(--inner-border); align-items:center; justify-content:space-between;">
                    <div id="preview-pill-text" style="font-size:13px; font-weight:600; color:var(--accent); text-overflow:ellipsis; overflow:hidden; white-space:nowrap; max-width:70%;"></div>
                    <button style="color:#ff3b30; padding:0 8px; background:none; border:none; cursor:pointer;" onclick="clearSelectedAttachmentSlot()">Удалить</button>
                </div>

                <footer class="chat-input-bar">
                    <div class="input-row-container">
                        <button class="circle-action-btn" onclick="document.getElementById('hidden-file-picker').click()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transform: rotate(45deg);"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                        </button>
                        <input type="file" id="hidden-file-picker" style="display:none;" onchange="handleFileSelectionPipeline(event)">
                        
                        <input type="text" id="chat-core-input-field" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') dispatchMessagePacket('text')">
                        
                        <button id="voice-record-action-btn" class="circle-action-btn" onclick="toggleVoiceRecordingProcess()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 1v10c2.21 0 4-1.79 4-4s-1.79-4-4-4z"></path><path d="M19 10v1a7 7 0 0 1-14 0v-1"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                        </button>

                        <button class="circle-action-btn primary" onclick="dispatchMessagePacket('text')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </footer>
            </div>

            <div id="empty-chat-stub-layer" class="empty-chat-stub">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="1.5" style="opacity:0.2; margin-bottom:12px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <h3 style="font-weight:600; color:var(--text-secondary); font-size:16px;">Выберите диалог или коллегу для начала общения</h3>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUbD08gGbhrkGIGgsIZhTEWNTTU_efY",
            authDomain: "yw-83b3e.firebaseapp.com",
            databaseURL: "https://yw-83b3e-default-rtdb.firebaseio.com",
            projectId: "yw-83b3e",
            storageBucket: "yw-83b3e.firebasestorage.app",
            messagingSenderId: "513977614231",
            appId: "1:513977614231:web:0a04427784e8259fdeced2"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentUserId = localStorage.getItem('premium_session_uid') || null;
        let allUsers = [];
        let activeTab = 'chats';
        let activeChatTargetId = null; 
        let searchString = "";

        let currentSelectedFileBase64 = null;
        let currentSelectedFileName = null;
        let currentSelectedFileType = null;

        let voiceMediaRecorder = null;
        let voiceAudioChunks = [];
        let isVoiceRecordingActive = false;

        window.addEventListener('DOMContentLoaded', () => { initializeEcosystemCore(); });

        function initializeEcosystemCore() {
            database.ref('users').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                allUsers = Object.values(data);
                buildAppUIRenderers();
            });

            if (currentUserId) {
                document.getElementById('auth-screen-layer').classList.remove('active');
                subscribeToChatsRealtimeMetadata();
            } else {
                drawAuthUIForm(false);
            }
        }

        function drawAuthUIForm(isRegister) {
            const container = document.getElementById('auth-main-card-node');
            if (!isRegister) {
                container.innerHTML = `
                    <h2 style="font-weight:800; font-size:24px; margin-bottom:16px;">Вход в систему</h2>
                    <input type="text" id="f-login" class="premium-input" placeholder="Логин">
                    <input type="password" id="f-pass" class="premium-input" placeholder="Пароль">
                    <button class="circle-action-btn primary" style="width:100%; border-radius:14px; font-weight:600;" onclick="executeLoginFlow()">Войти</button>
                    <div style="text-align:center; font-size:14px; color:var(--accent); margin-top:16px; cursor:pointer;" onclick="drawAuthUIForm(true)">Регистрация нового аккаунта</div>
                `;
            } else {
                container.innerHTML = `
                    <h2 style="font-weight:800; font-size:24px; margin-bottom:16px;">Регистрация</h2>
                    <input type="text" id="f-reg-login" class="premium-input" placeholder="Логин">
                    <input type="text" id="f-reg-name" class="premium-input" placeholder="Имя и Фамилия">
                    <input type="text" id="f-reg-role" class="premium-input" placeholder="Должность / Отдел">
                    <input type="password" id="f-reg-pass" class="premium-input" placeholder="Пароль">
                    <button class="circle-action-btn primary" style="width:100%; border-radius:14px; font-weight:600;" onclick="executeRegistrationFlow()">Создать профиль</button>
                    <div style="text-align:center; font-size:14px; color:var(--accent); margin-top:16px; cursor:pointer;" onclick="drawAuthUIForm(false)">Назад</div>
                `;
            }
        }

        function executeRegistrationFlow() {
            const login = document.getElementById('f-reg-login').value.trim().toLowerCase();
            const name = document.getElementById('f-reg-name').value.trim();
            const role = document.getElementById('f-reg-role').value.trim();
            const pass = document.getElementById('f-reg-pass').value.trim();
            if(!login || !name || !role || !pass) return;

            const uid = "uid_" + Date.now();
            const colors = ["#0071e3", "#34aadc", "#4cd964", "#ff9500", "#5856d6", "#ff2d55"];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            const packet = { id: uid, login, name, role, pass, color: randomColor, avatar: "" };

            database.ref('users/' + uid).set(packet).then(() => {
                currentUserId = uid;
                localStorage.setItem('premium_session_uid', uid);
                document.getElementById('auth-screen-layer').classList.remove('active');
                subscribeToChatsRealtimeMetadata();
            });
        }

        function executeLoginFlow() {
            const login = document.getElementById('f-login').value.trim().toLowerCase();
            const pass = document.getElementById('f-pass').value.trim();
            const matched = allUsers.find(u => u.login === login && u.pass === pass);
            if(!matched) { alert('Неверный логин или пароль'); return; }

            currentUserId = matched.id;
            localStorage.setItem('premium_session_uid', matched.id);
            document.getElementById('auth-screen-layer').classList.remove('active');
            subscribeToChatsRealtimeMetadata();
        }

        function openProfileSettingsModal() {
            const me = allUsers.find(u => u.id === currentUserId);
            if(!me) return;
            document.getElementById('settings-name-input').value = me.name || '';
            document.getElementById('settings-role-input').value = me.role || '';
            
            const targetPreview = document.getElementById('settings-avatar-preview');
            if(me.avatar) {
                targetPreview.style.backgroundImage = `url(${me.avatar})`;
                targetPreview.innerText = '';
            } else {
                targetPreview.style.backgroundImage = 'none';
                targetPreview.style.backgroundColor = me.color || '#0071e3';
                targetPreview.innerText = me.name.substring(0,2).toUpperCase();
            }
            document.getElementById('settings-avatar-preview').dataset.blob = me.avatar || '';
            document.getElementById('settings-modal-overlay').classList.add('active');
        }

        function closeProfileSettingsModal() {
            document.getElementById('settings-modal-overlay').classList.remove('active');
            document.getElementById('dock-btn-settings').classList.remove('active');
            const currentActiveBtn = document.getElementById('dock-btn-' + activeTab);
            if(currentActiveBtn) currentActiveBtn.classList.add('active');
        }

        function processAvatarSelection(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Img = e.target.result;
                const preview = document.getElementById('settings-avatar-preview');
                preview.style.backgroundImage = `url(${base64Img})`;
                preview.innerText = '';
                preview.dataset.blob = base64Img;
            };
            reader.readAsDataURL(file);
        }

        function saveProfileSettingsChanges() {
            const newName = document.getElementById('settings-name-input').value.trim();
            const newRole = document.getElementById('settings-role-input').value.trim();
            const uploadedAvatar = document.getElementById('settings-avatar-preview').dataset.blob;
            if(!newName || !newRole) return;

            const updates = { name: newName, role: newRole, avatar: uploadedAvatar || "" };
            database.ref('users/' + currentUserId).update(updates).then(() => {
                closeProfileSettingsModal();
            });
        }

        function executeLogoutSystem() {
            localStorage.removeItem('premium_session_uid');
            location.reload();
        }

        function openCreateGroupModal() {
            document.getElementById('group-modal-title').innerText = "Создание командного чата";
            document.getElementById('group-name-input').value = '';
            document.getElementById('group-submit-btn').innerText = "Создать чат";
            renderGroupMembersSelectionList([]);
            document.getElementById('group-modal-overlay').classList.add('active');
        }

        function openEditGroupModal() {
            if (!activeChatTargetId || !activeChatTargetId.startsWith('group_')) return;
            document.getElementById('group-modal-title').innerText = "Управление командой";
            document.getElementById('group-submit-btn').innerText = "Сохранить";

            database.ref('chats/' + activeChatTargetId).once('value', (snap) => {
                const groupData = snap.val();
                if(!groupData) return;
                document.getElementById('group-name-input').value = groupData.name;
                renderGroupMembersSelectionList(Object.keys(groupData.members || {}));
                document.getElementById('group-modal-overlay').classList.add('active');
            });
        }

        function closeGroupChatModal() {
            document.getElementById('group-modal-overlay').classList.remove('active');
        }

        function renderGroupMembersSelectionList(checkedUids) {
            const container = document.getElementById('group-members-selectors-list');
            container.innerHTML = '';
            allUsers.forEach(u => {
                if (u.id === currentUserId) return;
                const isChecked = checkedUids.includes(u.id) ? 'checked' : '';
                const row = document.createElement('div');
                row.className = 'checkbox-member-row';
                row.innerHTML = `
                    <input type="checkbox" id="cb-user-${u.id}" value="${u.id}" ${isChecked} style="width:18px; height:18px;">
                    <label style="font-size:14px; font-weight:500; margin-left:10px;" for="cb-user-${u.id}">${u.name} — <span style="color:var(--text-secondary);">${u.role}</span></label>
                `;
                container.appendChild(row);
            });
        }

        function commitGroupChatAction() {
            const name = document.getElementById('group-name-input').value.trim();
            if(!name) return;

            const membersPacket = { [currentUserId]: true };
            allUsers.forEach(u => {
                const el = document.getElementById(`cb-user-${u.id}`);
                if(el && el.checked) membersPacket[u.id] = true;
            });

            const isEditing = activeChatTargetId && activeChatTargetId.startsWith('group_') && document.getElementById('group-modal-title').innerText.includes("Управление");
            const groupId = isEditing ? activeChatTargetId : 'group_' + Date.now();
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            const meta = {
                id: groupId,
                type: 'group',
                name: name,
                members: membersPacket,
                lastMessage: isEditing ? "Настройки группы обновлены" : "Командный чат создан",
                lastTime: time,
                lastSender: currentUserId
            };

            database.ref('chats/' + groupId).update(meta).then(() => {
                closeGroupChatModal();
                openChatSession(groupId);
            });
        }

        function subscribeToChatsRealtimeMetadata() {
            database.ref('chats').on('value', () => {
                buildAppUIRenderers();
            });
        }

        function buildAppUIRenderers() {
            const me = allUsers.find(u => u.id === currentUserId);
            if(!me) return;
            
            const anchor = document.getElementById('my-avatar-anchor');
            if(me.avatar) {
                anchor.innerHTML = `<div class="avatar-ui" style="background-image:url(${me.avatar}); width:40px; height:40px;"></div>`;
            } else {
                anchor.innerHTML = `<div class="avatar-ui" style="background:${me.color}; width:40px; height:40px; font-size:13px;">${me.name.substring(0,2).toUpperCase()}</div>`;
            }
            
            if (activeTab === 'chats') renderChatsTab();
            if (activeTab === 'contacts') renderContactsTab();
            if (activeChatTargetId) updateActiveChatHeader();
        }

        function switchSidebarTab(target) {
            if (target === 'settings') {
                document.querySelectorAll('.dock-item').forEach(b => b.classList.remove('active'));
                document.getElementById('dock-btn-settings').classList.add('active');
                openProfileSettingsModal();
                return;
            }

            activeTab = target;
            document.querySelectorAll('.dock-item').forEach(b => b.classList.remove('active'));
            const targetBtn = document.getElementById('dock-btn-' + target);
            if(targetBtn) targetBtn.classList.add('active');
            
            buildAppUIRenderers();
        }

        function renderContactsTab() {
            const root = document.getElementById('tab-content-contacts');
            root.className = "scroller-content active";
            document.getElementById('tab-content-chats').className = "scroller-content";
            root.innerHTML = '';

            allUsers.filter(u => u.id !== currentUserId).forEach(u => {
                if(searchString && !u.name.toLowerCase().includes(searchString)) return;
                
                const row = document.createElement('div');
                row.className = `item-row ${activeChatTargetId === u.id ? 'active' : ''}`;
                row.onclick = () => openChatSession(u.id);
                
                let avatarHTML = u.avatar ? `<div class="avatar-ui" style="background-image:url(${u.avatar})"></div>` : `<div class="avatar-ui" style="background:${u.color}">${u.name.substring(0,2).toUpperCase()}</div>`;

                row.innerHTML = `
                    ${avatarHTML}
                    <div class="row-meta">
                        <div class="row-title">${u.name}</div>
                        <div class="row-sub">${u.role}</div>
                    </div>
                `;
                root.appendChild(row);
            });
        }

        function renderChatsTab() {
            const root = document.getElementById('tab-content-chats');
            root.className = "scroller-content active";
            document.getElementById('tab-content-contacts').className = "scroller-content";
            root.innerHTML = '';

            database.ref('chats').once('value', (snapshot) => {
                const chatsData = snapshot.val() || {};
                const renderedTargetsTrack = new Set();

                const sortedChatIds = Object.keys(chatsData).sort((a, b) => {
                    const timeA = chatsData[a].lastTime || "";
                    const timeB = chatsData[b].lastTime || "";
                    return timeB.localeCompare(timeA);
                });
                
                sortedChatIds.forEach(chatId => {
                    const chat = chatsData[chatId];
                    if (!chat) return;

                    const isGroup = chat.type === 'group';
                    let isParticipant = false;
                    let chatTitle = "Диалог";
                    let avatarHTML = "";
                    let globalUniqueKey = chatId; 

                    if (chat.members && chat.members[currentUserId]) {
                        isParticipant = true;
                    } else {
                        if (chatId.split('__').includes(currentUserId)) {
                            isParticipant = true;
                        }
                    }

                    if (!isParticipant) return;

                    if (isGroup) {
                        chatTitle = chat.name || "Группа";
                        avatarHTML = `<div class="avatar-ui" style="background:#53535a;">${chatTitle.substring(0,2).toUpperCase()}</div>`;
                        globalUniqueKey = chatId; 
                    } else {
                        const parts = chatId.split('__');
                        const companionId = parts.find(id => id !== currentUserId) || Object.keys(chat.members || {}).find(id => id !== currentUserId) || currentUserId;
                        
                        if (renderedTargetsTrack.has(companionId)) return;
                        globalUniqueKey = companionId;

                        const companion = allUsers.find(u => u.id === companionId);
                        if (companion) {
                            chatTitle = companion.name;
                            avatarHTML = companion.avatar ? `<div class="avatar-ui" style="background-image:url(${companion.avatar})"></div>` : `<div class="avatar-ui" style="background:${companion.color}">${companion.name.substring(0,2).toUpperCase()}</div>`;
                        } else {
                            chatTitle = "Пользователь";
                            avatarHTML = `<div class="avatar-ui" style="background:#86868b;">?</div>`;
                        }
                    }

                    renderedTargetsTrack.add(globalUniqueKey);
                    if (searchString && !chatTitle.toLowerCase().includes(searchString)) return;

                    let previewPrefix = chat.lastSender ? (chat.lastSender === currentUserId ? "Вы: " : "") : "";
                    let unreadBadgeHTML = (chat.unread && chat.unread[currentUserId]) ? `<div class="unread-badge-count">${chat.unread[currentUserId]}</div>` : "";

                    const row = document.createElement('div');
                    row.className = `item-row ${activeChatTargetId === chatId ? 'active' : ''}`;
                    row.onclick = () => openChatSession(chatId);
                    row.innerHTML = `
                        ${avatarHTML}
                        <div class="row-meta">
                            <div class="row-header-line">
                                <div class="row-title">${chatTitle}</div>
                                <div class="row-time-lbl">${chat.lastTime || ''}</div>
                            </div>
                            <div class="row-sub-line">
                                <div class="row-sub">${previewPrefix}${chat.lastMessage || 'Нет сообщений'}</div>
                                ${unreadBadgeHTML}
                            </div>
                        </div>
                    `;
                    root.appendChild(row);
                });
            });
        }

        let msgListener = null;
        function openChatSession(targetId) {
            let chatId = targetId;
            if (!targetId.startsWith('group_') && !targetId.includes('__')) {
                const sortedIds = [currentUserId, targetId].sort();
                chatId = sortedIds[0] + '__' + sortedIds[1];
            }

            activeChatTargetId = chatId;
            document.getElementById('empty-chat-stub-layer').style.display = 'none';
            document.getElementById('active-chat-subsystem').style.display = 'flex';
            document.getElementById('app-layout').classList.add('chat-opened');

            database.ref(`chats/${chatId}/unread/${currentUserId}`).set(0);
            document.getElementById('header-edit-group-btn').style.display = chatId.startsWith('group_') ? 'block' : 'none';

            buildAppUIRenderers();

            if(msgListener) msgListener.off();
            msgListener = database.ref('messages/' + chatId);
            msgListener.on('value', (snapshot) => {
                const data = snapshot.val() || {};
                renderMessagesFlow(Object.values(data));
            });
        }

        function renderMessagesFlow(list) {
            const flow = document.getElementById('chat-messages-flow-root');
            flow.innerHTML = '';
            list.forEach(m => {
                const isMe = m.senderId === currentUserId;
                const container = document.createElement('div');
                container.className = `msg-container ${isMe ? 'outgoing' : 'incoming'}`;
                
                let mediaPayloadHTML = '';
                if(m.fileData) {
                    if(m.fileType && m.fileType.startsWith('image/')) {
                        mediaPayloadHTML = `<img src="${m.fileData}" style="max-width:100%; border-radius:12px; margin-bottom:6px; display:block;">`;
                    } else if (m.fileType && m.fileType.startsWith('audio/')) {
                        mediaPayloadHTML = `
                            <div class="audio-wrapper">
                                <audio src="${m.fileData}" controls controlsList="nodownload"></audio>
                            </div>`;
                    } else {
                        mediaPayloadHTML = `
                            <a href="${m.fileData}" download="${m.fileName || 'file'}" style="display:flex; align-items:center; gap:8px; background:rgba(0,0,0,0.05); padding:10px; border-radius:8px; text-decoration:none; color:inherit; font-size:13px; margin-bottom:6px;">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path></svg>
                                <span>${m.fileName}</span>
                            </a>`;
                    }
                }

                let nameLabelHTML = "";
                if(!isMe && activeChatTargetId.startsWith('group_')) {
                    const sender = allUsers.find(u => u.id === m.senderId);
                    if(sender) {
                        nameLabelHTML = `<div style="font-size:11px; font-weight:700; color:var(--accent); margin-bottom:2px;">${sender.name}</div>`;
                    }
                }

                container.innerHTML = `
                    <div class="msg-bubble-main">
                        ${nameLabelHTML}
                        ${mediaPayloadHTML}
                        <div style="${m.text ? '' : 'display:none;'}">${m.text || ''}</div>
                        <div class="msg-time">${m.time}</div>
                    </div>
                `;
                flow.appendChild(container);
            });
            flow.scrollTop = flow.scrollHeight;
        }

        function updateActiveChatHeader() {
            const targetHeader = document.getElementById('active-chat-name-target');
            const targetSub = document.getElementById('active-chat-status-target');
            const avatarSlot = document.getElementById('active-chat-avatar-slot');

            if(activeChatTargetId.startsWith('group_')) {
                database.ref('chats/' + activeChatTargetId).once('value', (snap) => {
                    const group = snap.val();
                    if(!group) return;
                    targetHeader.innerText = group.name;
                    targetSub.innerText = `Команда: ${Object.keys(group.members || {}).length} участников`;
                    avatarSlot.innerHTML = `<div class="avatar-ui" style="background:#53535a; width:40px; height:40px;">${group.name.substring(0,2).toUpperCase()}</div>`;
                });
            } else {
                const parts = activeChatTargetId.split('__');
                const companionId = parts.find(id => id !== currentUserId) || currentUserId;
                const companion = allUsers.find(u => u.id === companionId);
                if(!companion) return;
                targetHeader.innerText = companion.name;
                targetSub.innerText = companion.role;
                avatarSlot.innerHTML = companion.avatar ? `<div class="avatar-ui" style="background-image:url(${companion.avatar}); width:40px; height:40px;"></div>` : `<div class="avatar-ui" style="background:${companion.color}; width:40px; height:40px;">${companion.name.substring(0,2).toUpperCase()}</div>`;
            }
        }

        function dispatchMessagePacket(customType = 'text', customBlob = null) {
            const input = document.getElementById('chat-core-input-field');
            const text = input.value.trim();
            if(!text && !currentSelectedFileBase64 && !customBlob) return;

            if(!activeChatTargetId.startsWith('group_')) {
                const parts = activeChatTargetId.split('__');
                const uids = { [parts[0]]: true, [parts[1]]: true };
                database.ref('chats/' + activeChatTargetId).update({ id: activeChatTargetId, type: 'direct', members: uids });
            }

            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const msgNode = { senderId: currentUserId, text: text, time: time };
            let lastMsgString = text;

            if (customType === 'audio' && customBlob) {
                msgNode.fileData = customBlob;
                msgNode.fileType = 'audio/mp4';
                msgNode.fileName = 'Голосовое сообщение';
                lastMsgString = "Голосовое сообщение";
            } else if (currentSelectedFileBase64) {
                msgNode.fileData = currentSelectedFileBase64;
                msgNode.fileName = currentSelectedFileName;
                msgNode.fileType = currentSelectedFileType;
                lastMsgString = currentSelectedFileName;
            }

            database.ref('messages/' + activeChatTargetId).push(msgNode);

            database.ref('chats/' + activeChatTargetId).once('value', (snap) => {
                const meta = snap.val() || {};
                const currentUnread = meta.unread || {};
                Object.keys(meta.members || {}).forEach(mId => {
                    if(mId !== currentUserId) currentUnread[mId] = (currentUnread[mId] || 0) + 1;
                });

                database.ref('chats/' + activeChatTargetId).update({
                    lastMessage: lastMsgString,
                    lastTime: time,
                    lastSender: currentUserId,
                    unread: currentUnread
                });
            });

            input.value = '';
            clearSelectedAttachmentSlot();
        }

        // ФУНКЦИЯ ДЛЯ ЗАПУСКА ВИДЕОВЫЗОВА
        function startVideoCallProcess() {
            alert('Инициализация защищенного видеовызова CC...');
        }

        function toggleVoiceRecordingProcess() {
            const btn = document.getElementById('voice-record-action-btn');
            if (!isVoiceRecordingActive) {
                navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                    let options = {};
                    if (MediaRecorder.isTypeSupported('audio/mp4')) {
                        options = { mimeType: 'audio/mp4' };
                    } else if (MediaRecorder.isTypeSupported('audio/webm')) {
                        options = { mimeType: 'audio/webm' };
                    }

                    voiceMediaRecorder = new MediaRecorder(stream, options);
                    voiceAudioChunks = [];
                    
                    voiceMediaRecorder.ondataavailable = e => { if (e.data.size > 0) voiceAudioChunks.push(e.data); };
                    voiceMediaRecorder.onstop = () => {
                        const audioBlob = new Blob(voiceAudioChunks, { type: options.mimeType || 'audio/aac' });
                        const reader = new FileReader();
                        reader.onloadend = () => { dispatchMessagePacket('audio', reader.result); };
                        reader.readAsDataURL(audioBlob);
                        stream.getTracks().forEach(t => t.stop());
                    };

                    voiceMediaRecorder.start(10);
                    isVoiceRecordingActive = true;
                    btn.style.background = '#ff3b30';
                    btn.style.color = '#ffffff';
                }).catch(() => { alert('Не удалось получить доступ к микрофону.'); });
            } else {
                if(voiceMediaRecorder && voiceMediaRecorder.state !== 'inactive') {
                    voiceMediaRecorder.stop();
                }
                isVoiceRecordingActive = false;
                btn.style.background = 'rgba(0,0,0,0.04)';
                btn.style.color = 'var(--text-primary)';
            }
        }

        function handleFileSelectionPipeline(event) {
            const file = event.target.files[0];
            if (!file) return;
            currentSelectedFileName = file.name;
            currentSelectedFileType = file.type;

            const reader = new FileReader();
            reader.onload = function(e) {
                currentSelectedFileBase64 = e.target.result;
                document.getElementById('preview-pill-text').innerText = file.name;
                document.getElementById('attachment-preview-zone').style.display = 'flex';
            };
            reader.readAsDataURL(file);
        }

        function clearSelectedAttachmentSlot() {
            currentSelectedFileBase64 = null;
            document.getElementById('attachment-preview-zone').style.display = 'none';
            document.getElementById('hidden-file-picker').value = '';
        }

        function exitActiveChatView() {
            document.getElementById('app-layout').classList.remove('chat-opened');
            activeChatTargetId = null;
            buildAppUIRenderers();
        }

        function triggerLocalSearchFilter() {
            searchString = document.getElementById('global-search-input').value.trim().toLowerCase();
            buildAppUIRenderers();
        }
    </script>
</body>
